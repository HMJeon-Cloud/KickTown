function loadBoard(){
  state.boardLoading = true; render();
  API.run('getPosts').then(function(list){ state.posts = list||[]; state.boardLoading=false; render(); })
    .catch(function(){ state.boardLoading=false; render(); toast('게시판을 불러오지 못했습니다'); });
}
function setBoardTab(t){ state.boardTab=t; render(); }
function relTime(iso){
  if(!iso) return '';
  var d=new Date(iso); if(isNaN(d)) return '';
  var s=Math.floor((Date.now()-d.getTime())/1000);
  if(s<60) return '방금';
  if(s<3600) return Math.floor(s/60)+'분 전';
  if(s<86400) return Math.floor(s/3600)+'시간 전';
  if(s<2592000) return Math.floor(s/86400)+'일 전';
  return (d.getMonth()+1)+'/'+d.getDate();
}
function viewBoard(){
  if(state.boardLoading) return '<div class="empty"><div class="ei">📋</div>불러오는 중...</div>';
  var tab = state.boardTab || 'notice';
  var seg = '<div class="qtabs" style="margin-bottom:14px;">'
    + '<button class="qtab '+(tab==='notice'?'on':'')+'" onclick="setBoardTab(\'notice\')">공지사항</button>'
    + '<button class="qtab '+(tab==='suggest'?'on':'')+'" onclick="setBoardTab(\'suggest\')">건의사항</button>'
    + '</div>';
  // 글쓰기 권한: 공지=임원, 건의=로그인 사용자
  var canWrite = (tab==='notice') ? isAdmin() : !!state.auth;
  var addBtn = canWrite ? '<button class="btn-add-match" onclick="openPostForm(\''+tab+'\')">＋ '+(tab==='notice'?'공지 작성':'건의 작성')+'</button>' : '';

  var list = (state.posts||[]).filter(function(p){return p.type===tab;});
  // 고정 먼저, 그다음 최신순
  list.sort(function(a,b){ if((b.pinned?1:0)!==(a.pinned?1:0)) return (b.pinned?1:0)-(a.pinned?1:0); return String(b.createdAt).localeCompare(String(a.createdAt)); });

  var body;
  if(!list.length){
    body = '<div class="empty"><div class="ei">'+(tab==='notice'?'📢':'💬')+'</div>'+(tab==='notice'?'등록된 공지가 없습니다.':'등록된 건의가 없습니다.')+'</div>';
  } else {
    body = '<div class="section" style="margin-top:12px;">' + list.map(function(p){
      var snippet = (p.body||'').length>70 ? esc(p.body.slice(0,70))+'…' : esc(p.body||'');
      return '<div class="post-card" onclick="openPostDetail(\''+p.id+'\')">'
        + '<div class="pc-top">'+(p.pinned?'<span class="pin oswald">고정</span>':'')+'<span class="pc-title">'+esc(p.title)+'</span></div>'
        + '<p class="pc-body">'+snippet+'</p>'
        + '<div class="pc-meta"><span>'+esc(p.author||'')+'</span><span>'+relTime(p.createdAt)+'</span></div>'
        + '</div>';
    }).join('') + '</div>';
  }
  var note = tab==='notice' ? '임원진이 작성하는 공지입니다.' : '팀원 누구나 의견을 남길 수 있습니다.';
  return addBtn + seg + body + '<p class="hint">'+note+'</p>';
}
function openPostForm(type){
  var canWrite = (type==='notice') ? isAdmin() : !!state.auth;
  if(!canWrite){ toast(type==='notice'?'공지는 임원만 작성할 수 있습니다':'로그인이 필요합니다'); return; }
  var label = type==='notice' ? '공지 작성' : '건의 작성';
  var html = '<div class="grabber"></div>'
   + '<div class="sheet-head"><h3>'+label+'</h3><button class="x" onclick="closeSheet()">✕</button></div>'
   + '<div class="sheet-body">'
   +   '<div class="field"><label>제목<span class="req">*</span></label><input id="pst_title" type="text" placeholder="제목을 입력하세요"></div>'
   +   '<div class="field"><label>내용<span class="req">*</span></label><textarea id="pst_body" rows="6" style="width:100%;padding:12px 13px;border:1.5px solid var(--line-strong);border-radius:12px;font-family:inherit;font-size:15px;resize:vertical;" placeholder="내용을 입력하세요"></textarea></div>'
   +   (type==='notice'&&isAdmin() ? '<div class="field">'+toggleRowGeneric('상단 고정','목록 맨 위에 고정합니다','post_pin',false)+'</div>' : '')
   +   '<button class="btn-primary" onclick="savePost(\''+type+'\')">등록하기</button>'
   + '</div>';
  showSheet(html);
  state.postPin = false;
}
function toggleRowGeneric(title, sub, key, on){
  return '<div class="tg-row" onclick="togglePostFlag(\''+key+'\')"><div style="flex:1;"><div style="font-weight:700;font-size:14px;">'+title+'</div><div style="font-size:11.5px;color:var(--steel);margin-top:2px;">'+sub+'</div></div>'
    + '<div class="tg '+(on?'on':'')+'" id="tg_'+key+'"><div class="tg-knob"></div></div></div>';
}
function togglePostFlag(key){ state.postPin=!state.postPin; var el=document.getElementById('tg_'+key); if(el) el.classList.toggle('on', state.postPin); }
function savePost(type){
  var title=(document.getElementById('pst_title').value||'').trim();
  var body=(document.getElementById('pst_body').value||'').trim();
  if(!title){ toast('제목을 입력하세요'); return; }
  if(!body){ toast('내용을 입력하세요'); return; }
  var pin = (type==='notice' && isAdmin()) ? !!state.postPin : false;
  var tmp = {id:'tmp'+Date.now(), type:type, title:title, body:body, author:(state.auth?state.auth.name:''), authorId:(state.auth?state.auth.playerId:''), pinned:pin, createdAt:new Date().toISOString()};
  state.posts = (state.posts||[]).concat([tmp]);
  closeSheet(); render(); toast('등록되었습니다');
  API.run('addPost', {type:type, title:title, body:body, author:tmp.author, authorId:tmp.authorId, pinned:pin}).then(function(list){ state.posts=list; if(state.screen==='board') render(); })
    .catch(function(){ toast('저장 실패 · 새로고침'); });
}
function openPostDetail(id){
  var p=(state.posts||[]).filter(function(x){return x.id===id;})[0];
  if(!p){ toast('글을 찾을 수 없습니다'); return; }
  var mine = state.auth && (p.authorId===state.auth.playerId);
  var canDelete = mine || isAdmin();
  var canPin = isAdmin();
  var actions = '';
  if(canPin || canDelete){
    actions = '<div style="display:flex;gap:9px;margin-top:16px;">'
      + (canPin ? '<button class="btn-ghost" style="flex:1;margin:0;" onclick="togglePinPost(\''+p.id+'\')">'+(p.pinned?'고정 해제':'상단 고정')+'</button>' : '')
      + (canDelete ? '<button class="btn-ghost btn-danger" style="flex:1;margin:0;" onclick="deletePostConfirm(\''+p.id+'\')">삭제</button>' : '')
      + '</div>';
  }
  var html = '<div class="grabber"></div>'
   + '<div class="sheet-head"><h3>'+(p.type==='notice'?'공지':'건의')+'</h3><button class="x" onclick="closeSheet()">✕</button></div>'
   + '<div class="sheet-body">'
   +   '<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;">'+(p.pinned?'<span class="pin oswald">고정</span>':'')+'<h2 style="font-size:19px;font-weight:800;margin:0;flex:1;">'+esc(p.title)+'</h2></div>'
   +   '<div style="font-size:12px;color:var(--steel-soft);margin-bottom:14px;">'+esc(p.author||'')+' · '+relTime(p.createdAt)+'</div>'
   +   '<p style="font-size:14.5px;line-height:1.7;color:var(--ink-soft);white-space:pre-wrap;">'+esc(p.body||'')+'</p>'
   +   actions
   + '</div>';
  showSheet(html);
}
function togglePinPost(id){
  if(!requireAdmin()) return;
  state.posts = (state.posts||[]).map(function(p){ return p.id===id ? Object.assign({}, p, {pinned:!p.pinned}) : p; });
  render(); openPostDetail(id);
  API.run('togglePin', id).then(function(list){ if(list) state.posts=list; if(state.screen==='board') render(); }).catch(function(){ toast('저장 실패 · 새로고침'); });
}
function deletePostConfirm(id){
  var p=(state.posts||[]).filter(function(x){return x.id===id;})[0];
  var mine = state.auth && p && (p.authorId===state.auth.playerId);
  if(!mine && !isAdmin()){ toast('작성자 또는 임원만 삭제할 수 있습니다'); return; }
  state.posts = (state.posts||[]).filter(function(x){return x.id!==id;});
  closeSheet(); render(); toast('삭제되었습니다');
  API.run('deletePost', id).then(function(list){ if(list) state.posts=list; if(state.screen==='board') render(); }).catch(function(){ toast('삭제 저장 실패 · 새로고침'); });
}
function post(t,pin,d,body){
  return '<div class="post"><div class="ph"><div style="display:flex;align-items:center;gap:7px;">'
   +(pin?'<span class="pin oswald">공지</span>':'')+'<span class="pt">'+t+'</span></div><span class="pd">'+d+'</span></div><p>'+body+'</p></div>';
}

/* ================= 8. 투표 ================= */
var POLL_STATUS = {open:{t:'진행중',c:'ps-open'}, closed:{t:'마감',c:'ps-closed'}, scheduled:{t:'예정',c:'ps-sch'}};
function loadPolls(){
  state.pollLoading = true; render();
  API.run('getPolls').then(function(list){ state.polls = list||[]; state.pollLoading=false; render(); })
    .catch(function(){ state.pollLoading=false; render(); toast('투표를 불러오지 못했습니다'); });
}
function fmtDeadline(iso){
  if(!iso) return '';
  var d = new Date(iso);
  if(isNaN(d)) return '';
  return (d.getMonth()+1)+'/'+d.getDate()+' '+('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
}
function viewPoll(){
  if(state.pollLoading) return '<div class="empty"><div class="ei">🗳️</div>불러오는 중...</div>';
  var addBtn = isAdmin() ? '<button class="btn-add-match" onclick="openPollForm()">＋ 새 투표 만들기</button>' : '';
  if(!state.polls.length){
    return addBtn + '<div class="empty"><div class="ei">🗳️</div>진행 중인 투표가 없습니다.<br>위 버튼으로 첫 투표를 만들어보세요.</div>';
  }
  var list = state.polls.map(function(p){
    var st = POLL_STATUS[p.status]||POLL_STATUS.open;
    var pct = p.totalMembers ? Math.round(p.voteCount/p.totalMembers*100) : 0;
    return '<div class="poll-card" onclick="openPollDetail(\''+p.id+'\')">'
      + '<div class="poll-top"><span class="poll-badge '+st.c+'">'+st.t+'</span>'
      +   (p.endAt?'<span class="poll-dl">~'+fmtDeadline(p.endAt)+' 마감</span>':'')+'</div>'
      + '<div class="poll-title">'+esc(p.title)+'</div>'
      + '<div class="poll-meta">'+p.voteCount+' / '+p.totalMembers+'명 참여 · 미투표 '+(p.totalMembers-p.voteCount)+'명</div>'
      + '<div class="poll-bar"><div class="poll-bar-fill" style="width:'+pct+'%;"></div></div>'
      + '</div>';
  }).join('');
  return addBtn + '<div class="section" style="margin-top:14px;">'+list+'</div>';
}

function openPollForm(){
  if(!requireAdmin()) return;
  state.pollOptDraft = ['',''];
  state.pollMulti = false; state.pollAnon = false;
  renderPollForm();
}
function dtLocal(dt){ var p=function(n){return ('0'+n).slice(-2);}; return dt.getFullYear()+'-'+p(dt.getMonth()+1)+'-'+p(dt.getDate())+'T'+p(dt.getHours())+':'+p(dt.getMinutes()); }
function renderPollForm(){
  var nowStr = dtLocal(new Date());
  var opts = state.pollOptDraft.map(function(o,i){
    return '<div class="opt-row"><input id="po_'+i+'" type="text" placeholder="항목 '+(i+1)+'" value="'+esc(o)+'" oninput="syncPollOpt('+i+',this.value)">'
      + (state.pollOptDraft.length>2?'<button class="opt-x" onclick="removePollOpt('+i+')">✕</button>':'')+'</div>';
  }).join('');
  var html = '<div class="grabber"></div>'
   + '<div class="sheet-head"><h3>새 투표 만들기</h3><button class="x" onclick="closeSheet()">✕</button></div>'
   + '<div class="sheet-body">'
   +   '<div class="field"><label>제목<span class="req">*</span></label><input id="pf_title" type="text" placeholder="예: 이번 주 회식 장소"></div>'
   +   '<div class="field"><label>투표 항목<span class="req">*</span> <span style="color:var(--steel-soft);font-weight:600;">(2개 이상)</span></label>'
   +     '<div id="pf_opts">'+opts+'</div>'
   +     '<button class="btn-ghost" style="margin-top:2px;" onclick="addPollOpt()">＋ 항목 추가</button></div>'
   +   '<div class="field"><label>마감 일정<span class="req">*</span></label>'
   +     '<div class="chips" style="margin-bottom:8px;"><div class="chip" onclick="setPollEnd(1)">1일 후</div><div class="chip" onclick="setPollEnd(3)">3일 후</div><div class="chip" onclick="setPollEnd(7)">7일 후</div></div>'
   +     '<input id="pf_end" type="datetime-local" style="width:100%;padding:12px 13px;border:1.5px solid var(--line-strong);border-radius:12px;font-family:inherit;font-size:15px;"></div>'
   +   '<div class="field"><label>시작 (선택)</label><input id="pf_start" type="datetime-local" value="'+nowStr+'" style="width:100%;padding:12px 13px;border:1.5px solid var(--line-strong);border-radius:12px;font-family:inherit;font-size:15px;"></div>'
   +   '<div class="field"><label>옵션</label>'
   +     toggleRow('중복 선택 허용','여러 항목에 투표 가능','pollMulti',state.pollMulti)
   +     toggleRow('익명 투표','누가 무엇에 투표했는지 숨김 (미투표자는 표시)','pollAnon',state.pollAnon)
   +   '</div>'
   +   '<button class="btn-primary" onclick="savePoll()">투표 만들기</button>'
   + '</div>';
  showSheet(html);
}
function toggleRow(title, sub, key, on){
  return '<div class="tg-row" onclick="togglePollOpt(\''+key+'\')"><div style="flex:1;"><div style="font-weight:700;font-size:14px;">'+title+'</div><div style="font-size:11.5px;color:var(--steel);margin-top:2px;">'+sub+'</div></div>'
    + '<div class="tg '+(on?'on':'')+'" id="tg_'+key+'"><div class="tg-knob"></div></div></div>';
}
function togglePollOpt(key){
  state[key]=!state[key];
  var el=document.getElementById('tg_'+key); if(el) el.classList.toggle('on', state[key]);
}
function setPollEnd(days){
  var d=new Date(); d.setDate(d.getDate()+days); d.setHours(23,59,0,0);
  var el=document.getElementById('pf_end'); if(el){ el.value=dtLocal(d); toast(days+'일 후로 설정'); }
}
function syncPollOpt(i,v){ state.pollOptDraft[i]=v; }
function stashPollForm(){
  state.pollOptDraft.forEach(function(_,i){ var el=document.getElementById('po_'+i); if(el) state.pollOptDraft[i]=el.value; });
  return {title:(document.getElementById('pf_title')||{}).value||'', s:(document.getElementById('pf_start')||{}).value||'', e:(document.getElementById('pf_end')||{}).value||''};
}
function restorePollForm(v){
  document.getElementById('pf_title').value=v.title;
  if(v.s) document.getElementById('pf_start').value=v.s;
  if(v.e) document.getElementById('pf_end').value=v.e;
}
function addPollOpt(){
  var v=stashPollForm();
  if(state.pollOptDraft.length>=8){ toast('항목은 최대 8개'); return; }
  state.pollOptDraft.push(''); renderPollForm(); restorePollForm(v);
}
function removePollOpt(i){
  var v=stashPollForm(); state.pollOptDraft.splice(i,1); renderPollForm(); restorePollForm(v);
}
function savePoll(){
  var title=(document.getElementById('pf_title').value||'').trim();
  var opts=state.pollOptDraft.map(function(_,i){var el=document.getElementById('po_'+i);return el?el.value.trim():'';}).filter(function(x){return x;});
  var start=document.getElementById('pf_start').value;
  var end=document.getElementById('pf_end').value;
  if(!title){ toast('제목을 입력하세요'); return; }
  if(opts.length<2){ toast('항목을 2개 이상 입력하세요'); return; }
  if(!end){ toast('마감 일정을 지정하세요'); return; }
  API.run('createPoll', {title:title, options:opts, startAt:start, endAt:end, multi:state.pollMulti, anon:state.pollAnon}).then(function(list){
    state.polls=list; closeSheet(); render(); toast('투표를 만들었습니다');
  }).catch(function(){ toast('생성에 실패했습니다'); });
}

function openPollDetail(pollId){
  state.currentPollId = pollId;
  API.run('getPollDetail', pollId, authId()).then(function(d){ renderPollDetail(d); }).catch(function(){ toast('불러오지 못했습니다'); });
}
function renderPollDetail(d){
  if(!d || !d.poll){ toast('투표를 찾을 수 없습니다'); return; }
  var p=d.poll; var st=POLL_STATUS[p.status]||POLL_STATUS.open;
  state.voteChoices = (d.myChoices||[]).slice();
  var max=Math.max.apply(null,d.results.map(function(r){return r.count;}).concat([1]));
  var bars=d.results.map(function(r){
    var pct = d.totalVotes? Math.round(r.count/d.totalVotes*100):0;
    var w = Math.round(r.count/max*100);
    return '<div class="pr-item"><div class="pr-head"><span class="pr-opt">'+esc(r.option)+'</span><span class="pr-cnt">'+r.count+'표 · '+pct+'%</span></div>'
      + '<div class="pr-bar"><div class="pr-fill" style="width:'+w+'%;"></div></div>'
      + (r.voters.length?'<div class="pr-voters">'+r.voters.map(esc).join(', ')+'</div>':'')
      + '</div>';
  }).join('');
  var nonV = d.nonVoters.length
    ? '<div class="pos-players">'+d.nonVoters.map(function(n){return '<span class="pchip" style="cursor:default;"><span class="nm">'+esc(n)+'</span></span>';}).join('')+'</div>'
    : '<p style="font-size:12.5px;color:var(--ok);margin:0;">전원 투표 완료 🎉</p>';

  var voteArea='';
  if(p.status==='open'){
    var optBtns=p.options.map(function(o){
      var sel = state.voteChoices.indexOf(o)>=0;
      return '<button class="vote-opt '+(sel?'on':'')+'" data-opt="'+esc(o).replace(/"/g,'')+'" onclick="pickVoteOpt(this,'+(p.multi?'true':'false')+')">'+esc(o)+'</button>';
    }).join('');
    var who = state.auth ? state.auth.name+'님으로 투표' : '투표하기';
    voteArea = '<div class="field" style="margin-top:16px;"><label>'+who+(p.multi?' · 중복 선택 가능':'')+'</label>'
      + '<div class="vote-opts">'+optBtns+'</div>'
      + '<button class="btn-primary" style="margin-top:12px;" onclick="submitVote(\''+p.id+'\')">'+(state.voteChoices.length?'투표 변경':'투표 제출')+'</button></div>';
  } else if(p.status==='scheduled'){
    voteArea = '<p class="hint" style="margin-top:14px;">아직 시작 전인 투표입니다.</p>';
  } else {
    voteArea = '<p class="hint" style="margin-top:14px;">마감된 투표입니다.</p>';
    // 마감 후 추가 참석 신청 (요청 2)
    if(state.auth){
      if(d.myExtra){
        var stTxt = d.myExtra.status==='approved' ? '✓ 추가 참석 승인됨' : '추가 참석 승인 대기 중';
        voteArea += '<div class="card" style="padding:12px 14px;margin-top:8px;font-size:13.5px;font-weight:700;color:'+(d.myExtra.status==='approved'?'var(--ok)':'var(--warn)')+';">'+stTxt+'</div>';
      } else {
        voteArea += '<button class="btn-ghost" style="margin-top:8px;" onclick="requestExtraJoin(\''+p.id+'\')">🙋 추가 참석 신청</button>';
      }
    }
  }
  // 추가 참석 신청 현황 (임원: 승인/거절)
  var extraSec='';
  var exs=(d.extras||[]);
  if(exs.length){
    var rows=exs.map(function(x){
      var badge = x.status==='approved' ? '<span class="poll-flag" style="background:var(--ok);">승인</span>'
                : x.status==='rejected' ? '<span class="poll-flag" style="background:var(--steel-soft);">거절</span>'
                : '<span class="poll-flag" style="background:var(--warn);">대기</span>';
      var btns = (isAdmin() && x.status==='pending')
        ? '<button class="btn-mini" onclick="openApproveExtra(\''+x.id+'\',\''+esc(x.name).replace(/'/g,'')+'\',\''+p.id+'\')">승인</button>'
          + '<button class="btn-mini ghost" onclick="rejectExtraGo(\''+x.id+'\')">거절</button>'
        : '';
      return '<div class="tg-row" style="cursor:default;"><div style="flex:1;font-weight:700;font-size:14px;">'+esc(x.name)+'</div>'+badge+btns+'</div>';
    }).join('');
    extraSec = '<div class="field" style="margin-top:14px;"><label>추가 참석 신청 · '+exs.length+'명</label>'+rows+'</div>';
  }
  // 투표 인원 스쿼드/경기 적용 (임원)
  var assignBtn = (isAdmin() && d.totalVotes>0)
    ? '<button class="btn-ghost" style="margin-top:14px;" onclick="openApplyToSquad(\''+p.id+'\')">⚽ 투표 인원 스쿼드 적용</button>'

    var html='<div class="grabber"></div>'
     + '<div class="sheet-head"><h3>경기별 참석자 인원 적용</h3><button class="x" onclick="closeSheet()">✕</button></div>'
     + '<div class="sheet-body">'

     +   '<div class="field"><label>경기<span class="req">*</span></label><select id="am_match">'+mopts+'</select></div>'
     +   '<div class="field"><label>참석으로 볼 항목<span class="req">*</span></label><div id="ap_opts" class="chips">'+oopts+'</div></div>'
     +   '<button class="btn-primary" onclick="runApplyToMatch()">참석 명단 지정</button>'
     + '</div>';
    showSheet(html);
  };
  if(p && p.options){ doIt(); }
  else { API.run('getPolls').then(function(pl){ state.polls=pl||[]; p=(pl||[]).filter(function(x){return x.id===pollId;})[0]; doIt(); }); }

function openVenueShare(matchId){
  var m = findMatchAny_(matchId);
  if(!m){ toast('경기를 찾을 수 없습니다'); return; }
  var name = m.venue || (ourTeamName_()+' 경기장');
  var hasXY = (m.lat!=null && m.lat!=='' && m.lng!=null && m.lng!=='');
  var lat = hasXY?Number(m.lat):null, lng = hasXY?Number(m.lng):null;
  var gUrl = hasXY ? ('https://www.google.com/maps?q='+lat+','+lng) : (m.venueUrl||'');
  var kUrl = hasXY ? ('https://map.kakao.com/link/map/'+encodeURIComponent(name)+','+lat+','+lng) : '';
  var kNavi = hasXY ? ('kakaomap://route?ep='+lat+','+lng+'&by=CAR') : '';
  var nUrl = hasXY ? ('nmap://route/car?dlat='+lat+'&dlng='+lng+'&dname='+encodeURIComponent(name)+'&appname=kicktown') : '';
  var tUrl = hasXY ? ('tmap://route?goalname='+encodeURIComponent(name)+'&goalx='+lng+'&goaly='+lat) : '';
  var shareUrl = kUrl || gUrl;

  function appTile(label, url, note, bg, glyph, bordered){
    if(!url) return '';
    return '<a class="app-item" href="'+esc(url)+'" target="_blank" rel="noopener">'
      + '<span class="app-ico'+(bordered?' bordered':'')+'" style="background:'+bg+';">'+glyph+'</span>'
      + '<span class="app-lbl">'+label+'</span>'
      + (note?'<span class="app-note">'+note+'</span>':'')
      + '</a>';
  }

function shareVenueLink(name, url){

  } else {
    copyVenueLink(url);
  }
}
function copyVenueLink(url){
  if(!url){ toast('링크가 없습니다'); return; }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){ toast('링크가 복사되었습니다'); }).catch(function(){ fallbackCopy_(url); });
  } else { fallbackCopy_(url); }
}
function fallbackCopy_(text){
  var ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta);
  ta.select(); try{ document.execCommand('copy'); toast('링크가 복사되었습니다'); }catch(e){ toast('복사 실패'); }
  document.body.removeChild(ta);
}

function pickEmblem(input){
  var file = input.files && input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var c=document.createElement('canvas'); var sz=96; c.width=sz; c.height=sz;
      var ctx=c.getContext('2d');
      var r=Math.min(sz/img.width, sz/img.height);
      var w=img.width*r, h=img.height*r;
      ctx.drawImage(img,(sz-w)/2,(sz-h)/2,w,h);
      clubEmblemData = c.toDataURL('image/png');
      var pv=document.getElementById('cb_prev'); if(pv){ pv.innerHTML='<img src="'+clubEmblemData+'" style="width:100%;height:100%;object-fit:contain;border-radius:12px;">'; pv.classList.remove('club-emblem-empty'); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function initVenueDisplayMap(){
  var el = document.getElementById('venue_map'); if(!el) return;
  var m = latestMatch(); if(!m) return;
  var lat = Number(m.lat), lng = Number(m.lng);
  if(isNaN(lat) || isNaN(lng)) return;
  el.innerHTML = '<div class="map-fallback">지도 불러오는 중...</div>';
  ensureKakao(function(okK){
    var box = document.getElementById('venue_map'); if(!box) return;
    var builtKakao = false;
    if(okK){
      try{
        box.innerHTML='';
        var map = new kakao.maps.Map(box, {center:new kakao.maps.LatLng(lat,lng), level:4});
        new kakao.maps.Marker({position:new kakao.maps.LatLng(lat,lng)}).setMap(map);

        builtKakao = true;
      }catch(e){ builtKakao = false; }
    }

          try{
            b2.innerHTML='';

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, crossOrigin:true}).addTo(lm);
            L.marker([lat,lng]).addTo(lm);

        }
      });
    }
  });
}

/* 카카오맵 JavaScript 키 (클라이언트 공개용 · 도메인 화이트리스트로 보호) */
var KAKAO_JS_KEY = '2d591b6ef9c70f94f369b7c55c91baa3';
/* 카카오 로그인 백엔드 base URL (OAuth 토큰 교환 서버 · 배포 후 입력, 예: https://xxx.vercel.app) */
var KAKAO_BACKEND = 'https://kick-town.vercel.app';
var venueMap=null, venueMarker=null, venuePick=null, leafletTried=false, kakaoTried=false;
var kakaoMap=null, kakaoMarker=null, mapProvider=null;

function ensureKakao(cb){
  var done=false, fin=function(ok){ if(done) return; done=true; cb(ok); };
  if(!KAKAO_JS_KEY){ fin(false); return; }
  if(window.kakao && window.kakao.maps && window.kakao.maps.Map){ fin(true); return; }
  var start=function(){ try{ kakao.maps.load(function(){ fin(!!(window.kakao&&kakao.maps&&kakao.maps.Map)); }); }catch(e){ fin(false); } };
  if(window.kakao && window.kakao.maps){ start(); return; }
  if(kakaoTried){ setTimeout(function(){ fin(!!(window.kakao&&window.kakao.maps&&window.kakao.maps.Map)); }, 3000); return; }
  kakaoTried=true;
  var s=document.createElement('script');
  s.src='https://dapi.kakao.com/v2/maps/sdk.js?appkey='+KAKAO_JS_KEY+'&libraries=services&autoload=false';
  s.onload=function(){ start(); };
  s.onerror=function(){ fin(false); };
  document.head.appendChild(s);
  setTimeout(function(){ fin(!!(window.kakao&&window.kakao.maps&&window.kakao.maps.Map)); }, 5000);
}
function ensureLeaflet(cb){
  var done=false; var fin=function(ok){ if(done) return; done=true; cb(ok); };
  if(typeof L !== 'undefined'){ fin(true); return; }
  var waited=0;
  var poll=setInterval(function(){
    if(typeof L !== 'undefined'){ clearInterval(poll); fin(true); return; }
    waited+=150;
    if(waited>=1500){ clearInterval(poll); tryFallbackCdn(); }
  }, 150);
  function tryFallbackCdn(){
    if(leafletTried){ setTimeout(function(){ fin(typeof L!=='undefined'); }, 2500); return; }
    leafletTried=true;
    var css=document.createElement('link'); css.rel='stylesheet';
    css.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css'; document.head.appendChild(css);
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
    s.onload=function(){ fin(typeof L!=='undefined'); };
    s.onerror=function(){ fin(false); };
    document.head.appendChild(s);
    setTimeout(function(){ fin(typeof L!=='undefined'); }, 5000);
  }
}
function initVenueMap(){
  var el = document.getElementById('g_map');
  if(!el) return;
  mapProvider=null; kakaoMap=null; kakaoMarker=null;
  el.innerHTML = '<div class="map-fallback">지도 불러오는 중...</div>';
  ensureKakao(function(okK){
    var box = document.getElementById('g_map'); if(!box) return;
    if(okK){ box.innerHTML=''; buildKakaoMap(box); return; }
    // 카카오 실패 → OSM 폴백
    ensureLeaflet(function(okL){
      var b2 = document.getElementById('g_map'); if(!b2) return;
      if(okL){ b2.innerHTML=''; buildVenueMap(b2); }
      else {
        b2.innerHTML = '<div class="map-fallback">지도를 불러오지 못했습니다.<br>아래 “지도 링크 직접 입력”을 이용하세요.<br><span style="font-size:10px;color:#9aa;opacity:.8;">현재 도메인: '+esc(location.hostname)+'</span></div>';
      }
    });
  });
}

/* ---- 카카오맵 ---- */
function buildKakaoMap(el){
  mapProvider='kakao';
  var start = venuePick || {lat:37.5665, lng:126.9780};
  kakaoMap = new kakao.maps.Map(el, {center:new kakao.maps.LatLng(start.lat, start.lng), level: venuePick?3:7});
  kakaoMarker = new kakao.maps.Marker({position:new kakao.maps.LatLng(start.lat, start.lng), draggable:true});
  if(venuePick) kakaoMarker.setMap(kakaoMap);
  kakao.maps.event.addListener(kakaoMap, 'click', function(e){ var ll=e.latLng; setKakaoMarker(ll.getLat(), ll.getLng(), true); });
  kakao.maps.event.addListener(kakaoMarker, 'dragend', function(){ var p=kakaoMarker.getPosition(); venuePick={lat:p.getLat(), lng:p.getLng()}; setVenueStatus(); reverseGeocode_(p.getLat(), p.getLng()); });
  [120,350,650].forEach(function(ms){ setTimeout(function(){ if(kakaoMap) kakaoMap.relayout(); }, ms); });
}
function setKakaoMarker(lat, lng, fillName){
  venuePick={lat:lat, lng:lng};
  var pos=new kakao.maps.LatLng(lat, lng);
  kakaoMarker.setPosition(pos); kakaoMarker.setMap(kakaoMap);
  setVenueStatus(); if(fillName) reverseGeocode_(lat, lng);
}
function reverseGeocode_(lat, lng){
  if(mapProvider!=='kakao' || !window.kakao || !kakao.maps.services) return;
  try{
    new kakao.maps.services.Geocoder().coord2Address(lng, lat, function(res, status){
      if(status===kakao.maps.services.Status.OK && res[0]){
        var nm=(res[0].road_address && res[0].road_address.building_name) || '';
        var v=document.getElementById('g_venue'); if(v && !v.value.trim() && nm) v.value=nm;
      }
    });
  }catch(e){}
}
function kakaoSearch_(q, box){
  try{
    new kakao.maps.services.Places().keywordSearch(q, function(data, status){
      if(!box) return;
      if(status!==kakao.maps.services.Status.OK || !data.length){ box.innerHTML='<div class="map-loading">검색 결과가 없습니다.</div>'; return; }
      window._venueHits={};
      box.innerHTML = data.slice(0,8).map(function(it,i){
        window._venueHits[i]={lat:Number(it.y), lng:Number(it.x), name:it.place_name};
        return '<div class="map-result" onclick="pickResultIdx('+i+')"><div class="mr-name">'+esc(it.place_name)+'</div><div class="mr-full">'+esc(it.road_address_name||it.address_name||'')+'</div></div>';
      }).join('');
    });
  }catch(e){ if(box) box.innerHTML='<div class="map-loading">검색에 실패했습니다.</div>'; }
}

/* ---- OSM (폴백) ---- */
function buildVenueMap(el){
  mapProvider='osm';
  if(venueMap){ try{ venueMap.remove(); }catch(e){} venueMap=null; venueMarker=null; }
  var start = venuePick || {lat:37.5665, lng:126.9780};
  venueMap = L.map(el, {zoomControl:true, attributionControl:false}).setView([start.lat, start.lng], venuePick?15:11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, crossOrigin:true}).addTo(venueMap);
  if(venuePick) placeMarker(venuePick.lat, venuePick.lng);
  venueMap.on('click', function(e){ placeMarker(e.latlng.lat, e.latlng.lng); setVenueStatus(); });
  [80,300,600].forEach(function(ms){ setTimeout(function(){ if(venueMap) venueMap.invalidateSize(); }, ms); });
}
function placeMarker(lat, lng){
  venuePick = {lat:lat, lng:lng};
  if(!venueMap) return;
  if(venueMarker){ venueMarker.setLatLng([lat,lng]); }
  else {
    venueMarker = L.marker([lat,lng], {draggable:true}).addTo(venueMap);
    venueMarker.on('dragend', function(){ var p=venueMarker.getLatLng(); venuePick={lat:p.lat,lng:p.lng}; setVenueStatus(); });
  }
}
function osmSearch_(q, box){
  var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=6&accept-language=ko&countrycodes=kr&q='+encodeURIComponent(q);
  fetch(url, {headers:{'Accept':'application/json'}}).then(function(r){return r.json();}).then(function(list){
    if(!box) return;
    if(!list || !list.length){ box.innerHTML = '<div class="map-loading">검색 결과가 없습니다.</div>'; return; }
    window._venueHits={};
    box.innerHTML = list.map(function(it,i){
      window._venueHits[i]={lat:Number(it.lat),lng:Number(it.lon),name:(it.display_name||'').split(',').slice(0,3).join(', ')};
      var short = (it.display_name||'').split(',').slice(0,3).join(', ');
      return '<div class="map-result" onclick="pickResultIdx('+i+')"><div class="mr-name">'+esc(short)+'</div><div class="mr-full">'+esc(it.display_name||'')+'</div></div>';
    }).join('');
  }).catch(function(){ if(box) box.innerHTML = '<div class="map-loading">검색에 실패했습니다. 네트워크 확인 후 다시 시도하세요.</div>'; });
}

/* ---- 공통 ---- */
function setVenueStatus(){
  var s = document.getElementById('g_map_status');
  if(s && venuePick) s.innerHTML = '📍 위치 지정됨 ('+venuePick.lat.toFixed(5)+', '+venuePick.lng.toFixed(5)+') · 마커를 끌어 조정';
}
function searchVenue(){
  var q = (document.getElementById('g_map_q')||{}).value;
  if(!q || !q.trim()){ toast('검색어를 입력하세요'); return; }
  var box = document.getElementById('g_map_results');

  if(mapProvider==='kakao' && window.kakao && kakao.maps.services){ kakaoSearch_(q.trim(), box); return; }
  osmSearch_(q.trim(), box);
}
function pickResultIdx(i){
  var h=(window._venueHits||{})[i]; if(!h) return;
  pickResult(h.lat, h.lng, h.name);
}
function pickResult(lat, lng, name){
  lat=Number(lat); lng=Number(lng);
  venuePick={lat:lat, lng:lng};
  if(mapProvider==='kakao' && kakaoMap){ kakaoMap.setCenter(new kakao.maps.LatLng(lat,lng)); kakaoMap.setLevel(3); setKakaoMarker(lat,lng,false); }
  else if(venueMap){ venueMap.setView([lat,lng], 16); placeMarker(lat,lng); }
  var v = document.getElementById('g_venue');
  if(v && !v.value.trim() && name) v.value = name;
  var box = document.getElementById('g_map_results'); if(box) box.innerHTML='';
  setVenueStatus();
}

  var lat = venuePick ? venuePick.lat : (prev.lat!=null?prev.lat:'');
  var lng = venuePick ? venuePick.lng : (prev.lng!=null?prev.lng:'');
  var url = venuePick ? ('https://www.google.com/maps?q='+venuePick.lat+','+venuePick.lng) : (prev.venueUrl||'');
  var data = {

  return '<button class="att-opt '+(cur===val?('on '+val):'')+'" data-pid="'+pid+'" data-val="'+val+'" onclick="pickAtt(\''+pid+'\',\''+val+'\')">'+label+'</button>';

function pickAtt(pid, val){
  state.formAtt[pid] = val;

  Array.prototype.forEach.call(row.querySelectorAll('.att-opt'), function(b){

  });

function saveResult(matchId){
  var our = parseInt(document.getElementById('r_our').value)||0;
  var opp = parseInt(document.getElementById('r_opp').value)||0;
  var stats = [];
  var att = [];
  state.players.forEach(function(p){
    var g = parseInt(document.getElementById('st_g_'+p.id).value)||0;
    var a = parseInt(document.getElementById('st_a_'+p.id).value)||0;
    if(g>0||a>0) stats.push({playerId:p.id, goals:g, assists:a});
    att.push({playerId:p.id, status:(state.formAtt[p.id]||'present')});
  });
  var btn=document.querySelector('.btn-primary'); if(btn){btn.textContent='저장 중...';btn.disabled=true;}
  API.run('recordMatchResult', matchId, our, opp).then(function(b){
    state.recMatches=b.matches; state.recStats=b.stats; state.recAtt=b.attendance||state.recAtt;
    return API.run('setMatchStats', matchId, stats);
  }).then(function(b2){
    state.recMatches=b2.matches; state.recStats=b2.stats; state.recAtt=b2.attendance||state.recAtt;
    return API.run('setMatchAttendance', matchId, att);
  }).then(function(b3){
    state.recMatches=b3.matches; state.recStats=b3.stats; state.recAtt=b3.attendance||[];
    closeSheet(); render(); toast('경기 결과를 저장했습니다');
  }).catch(function(){ if(btn){btn.textContent='다시 시도';btn.disabled=false;} toast('저장에 실패했습니다'); });
}

  var t = document.getElementById('toast');

}

/* ================= Firestore 데이터 계층 =================
 * 설계: 앱 시작 시 Firestore → 메모리(DB) 1회 로드.
 *   읽기 = 메모리에서 즉시(기존 mockHandler 재사용) → 매우 빠름

 *   비밀번호 = SHA-256 해시로 Firestore에 저장(평문 저장 안 함)

function fsWriteProbe_(){
  if(!window.db || !FS.enabled) return;

    db.collection('config').doc('app').set({probeAt:new Date().toISOString()}, {merge:true})
      .catch(function(e){

        window.__fsWriteErr=1;

function fsClean(x){ var c={}; for(var k in x){ if(k==='pw'||k==='pwHash'||k==='_row') continue; c[k]=x[k]; } return c; }
function fsSnapshot(keys){
  var s={}; keys.forEach(function(k){ var mm={}; (DB[k]||[]).forEach(function(x){ mm[FS_MAP[k].id(x)]=JSON.parse(JSON.stringify(x)); }); s[k]=mm; });
  return s;
}
function fsSyncDiff(k, beforeMap){
  var m=FS_MAP[k]; var after={}; (DB[k]||[]).forEach(function(x){ after[m.id(x)]=x; });
  var batch=db.batch(); var n=0;
  Object.keys(after).forEach(function(idv){
    var cur=after[idv], prev=beforeMap[idv];
    if(!prev || JSON.stringify(prev)!==JSON.stringify(cur)){ batch.set(db.collection(m.coll).doc(String(idv)), fsClean(cur), {merge:true}); n++; }
  });
  Object.keys(beforeMap).forEach(function(idv){ if(!after[idv]){ batch.delete(db.collection(m.coll).doc(String(idv))); n++; } });
  if(n) batch.commit().catch(function(e){ if(window.console)console.warn('fs sync '+k, e); toast('저장 동기화 실패 · 새로고침'); });
}

/* 해시 (Apps Script와 동일한 salt로 → 비밀번호 호환) */
function fsHash(pw){
  var enc=new TextEncoder().encode('FCJEMIRO#v1#'+String(pw));
  return crypto.subtle.digest('SHA-256', enc).then(function(buf){
    var hex=Array.prototype.map.call(new Uint8Array(buf), function(b){ return ('0'+b.toString(16)).slice(-2); }).join('');
    return 'v1:'+hex;
  });
}
/* ===== Firebase 이메일 인증 계정 ===== */

function mapAuthErr_(e){

  if(c==='auth/email-already-in-use') return '이미 가입된 이메일입니다';
  if(c==='auth/invalid-email') return '이메일 형식이 올바르지 않습니다';
  if(c==='auth/weak-password') return '비밀번호는 6자 이상이어야 합니다';
  if(c==='auth/user-not-found'||c==='auth/wrong-password'||c==='auth/invalid-credential') return '이메일 또는 비밀번호가 올바르지 않습니다';
  if(c==='auth/too-many-requests') return '시도가 많습니다. 잠시 후 다시 시도하세요';
  if(c==='auth/network-request-failed') return '네트워크 오류입니다';

/* 이메일 계정 정보를 owners에 얇게 저장 (uid 식별자) */
function upsertOwnerDoc_(uid, nm, email, provider){
  var o=(DB.owners||[]).filter(function(x){return x.id===uid;})[0];
  if(o){ if(nm) o.name=nm; if(email) o.email=email; o.provider=provider||o.provider; }
  else { o={id:uid, ownerId:email||uid, name:nm||'', email:email||'', provider:provider||'email', createdAt:new Date().toISOString()}; DB.owners.push(o); }
  var doc={id:o.id, ownerId:o.ownerId, name:o.name, email:o.email, provider:o.provider, createdAt:o.createdAt};
  if(window.db){ try{ db.collection('owners').doc(uid).set(doc, {merge:true}); }catch(e){} }

function emailSignup_(email, pw, nm){
  var A=authInst_(); if(!A) return Promise.resolve({ok:false, error:'인증 모듈을 사용할 수 없습니다'});
  email=String(email||'').trim(); nm=String(nm||'').trim();
  if(!email||!pw||!nm) return Promise.resolve({ok:false, error:'모든 항목을 입력하세요'});
  if(String(pw).length<6) return Promise.resolve({ok:false, error:'비밀번호는 6자 이상이어야 합니다'});
  return A.createUserWithEmailAndPassword(email, pw).then(function(cred){
    var u=cred.user;
    var em2=(u.email||email).toLowerCase();
    var p1=(u.updateProfile?u.updateProfile({displayName:nm}):Promise.resolve()).catch(function(){});
    var p2=(u.sendEmailVerification?u.sendEmailVerification():Promise.resolve()).catch(function(){});
    return Promise.all([p1,p2]).then(function(){
      upsertOwnerDoc_(u.uid, nm, em2, 'email');
      try{ A.signOut(); }catch(e){}
      return {ok:true, verifyPending:true, email:em2};
    });
  }).catch(function(e){ return {ok:false, error:mapAuthErr_(e)}; });
}
function emailLogin_(email, pw){
  var A=authInst_(); if(!A) return Promise.resolve({ok:false, error:'인증 모듈을 사용할 수 없습니다'});
  email=String(email||'').trim();
  if(!email||!pw) return Promise.resolve({ok:false, error:'이메일과 비밀번호를 입력하세요'});
  return A.signInWithEmailAndPassword(email, pw).then(function(cred){
    var u=cred.user;
    if(u && u.emailVerified===false){
      return {ok:false, needVerify:true, email:email, error:'이메일 인증이 필요합니다. 메일함을 확인해주세요'};

function fsQ(coll, field, val){

function fsIn(coll, field, ids){
  ids=(ids||[]).filter(function(x){return x!=null&&x!=='';});
  if(!ids.length) return Promise.resolve([]);
  var chunks=[]; for(var i=0;i<ids.length;i+=10) chunks.push(ids.slice(i,i+10));
  return Promise.all(chunks.map(function(ch){
    return db.collection(coll).where(field,'in',ch).get().then(function(snap){ var a=[]; snap.forEach(function(d){ a.push(d.data()||{}); }); return a; }).catch(function(){ return []; });
  })).then(function(rr){ var out=[]; rr.forEach(function(x){ out=out.concat(x); }); return out; });
}
function fsMerge(key, arr){

FS._kidMids={};   // cid -> {matchId:1} 이미 로드된 경기 kids (기간별 델타 로드)

function fsLoadMatchKids(cid, period){
  if(!cid) return Promise.resolve();
  var prev = FS._kidsQ[cid] || Promise.resolve();
  var next = prev.then(function(){ return fsLoadTeam(cid); }).then(function(){
    var loaded = FS._kidMids[cid] || (FS._kidMids[cid]={});
    // period 지정 시 그 시즌(YYYY 또는 YYYY-MM) 경기만, 없거나 '전체'면 전 경기
    var want=(DB.matches||[]).filter(function(m){
      if(m.clubId!==cid) return false;
      if(period && period!=='전체') return m.date && m.date.indexOf(period)===0;
      return true;
    }).map(function(m){return m.id;});
    var need=want.filter(function(id){ return !loaded[id]; });   // 아직 안 실린 것만
    if(!need.length) return;
    return Promise.all([ fsIn('playerStats','matchId',need), fsIn('attendance','matchId',need), fsIn('matchRoster','matchId',need) ])
      .then(function(r){ fsMerge('stats',r[0]); fsMerge('attendance',r[1]); fsMerge('matchRoster',r[2]); need.forEach(function(id){ loaded[id]=1; }); });
  });
  FS._kidsQ[cid] = next.catch(function(){});   // 오류가 나도 큐가 막히지 않게
  return next;
}

FS.run = function(fn, args){
  return FS.ready.then(function(){
    /* ── 필요한 범위만 선로딩 ── */
    var accId = (state.auth&&state.auth.ownerId)||null;
    var cid = window.ACTIVE_CLUB || state.activeClubId || null;
    var pre = Promise.resolve();
    if(fn==='ownerKakao'){ pre = fsQ('owners','kakaoId',String(args[0])).then(function(r){ fsMerge('owners',r); }); }
    else if(fn==='ownerLogin'||fn==='ownerSignup'){ pre = fsQ('owners','ownerId',String(args[0]||'').trim()).then(function(r){ fsMerge('owners',r); }); }
    else if(fn==='myMemberships'||fn==='myPendingJoins'){ pre = fsLoadMy(args[0]||accId); }
    else if(fn==='joinClub'){ pre = Promise.all([fsLoadTeam(args[0]), fsLoadMy(args[1])]); }
    else if(fn==='requestJoin'||fn==='cancelJoin'){ pre = Promise.all([fsLoadMy(args[1]||accId), fsLoadTeam(args[0])]); }
    else if(fn==='getJoinRequests'){ pre = fsQ2('joinRequests','clubId',args[0],'status','pending').then(function(r){ fsMerge('joins',r); return fsLoadTeam(args[0]); }); }
    else if(fn==='decideJoin'){ pre = db.collection('joinRequests').doc(String(args[0])).get().then(function(d){ if(d&&d.exists) fsMerge('joins',[d.data()]); var jr=(DB.joins||[]).filter(function(j){return j.id===args[0];})[0]; return jr?fsLoadTeam(jr.clubId):null; }).catch(function(){}); }
    else if(fn==='getRecordBundle'){ pre = fsLoadMatchKids(cid, args[0]); }
    else if(fn==='getPolls'||fn==='getPollDetail'){ pre = fsLoadPollKids(cid); }
    else if(fn==='getSquadDetail'){ pre = fsLoadSquadKids(args[0]); }
    else if(cid){ pre = fsLoadTeam(cid); var t=WRITE_TOUCH[fn]||[];
      if(t.indexOf('stats')>-1||t.indexOf('attendance')>-1||t.indexOf('matchRoster')>-1) pre=pre.then(function(){return fsLoadMatchKids(cid);});
      if(t.indexOf('votes')>-1) pre=pre.then(function(){return fsLoadPollKids(cid);});
      if((t.indexOf('members')>-1||t.indexOf('notes')>-1) && state.currentSquadId) pre=pre.then(function(){return fsLoadSquadKids(state.currentSquadId);});
    }
    return pre.then(function(){ return FS._dispatch(fn, args); });
  });
};
FS._dispatch = function(fn, args){
    if(fn==='ownerSignup') return fsOwnerSignup(args[0], args[1], args[2]);
    if(fn==='ownerLogin') return fsOwnerLogin(args[0], args[1]);
    if(fn==='ownerKakao') return fsOwnerKakao(args[0], args[1]);
    if(fn==='changePw') return fsChangePw(args[0], args[1], args[2]);
    if(fn==='resetOwnerPw') return fsResetOwnerPw(args[0], args[1], args[2]);
    if(fn==='setConfig'){ var rc=mockHandler(fn, args); fsSyncConfig(); return rc; }
    var touched=WRITE_TOUCH[fn];
    if(touched){
      var before=fsSnapshot(touched);
      var res=mockHandler(fn, args);
      touched.forEach(function(k){ fsSyncDiff(k, before[k]); });
      return res;
    }
    return mockHandler(fn, args);   // 읽기 (메모리 즉시)
};

  var ids = myClubIds();
  var last = state.auth && state.auth.lastClub;
  if(last && canEnterClub(last)){ enterClub(last); }
  else if(ids.length===1){ enterClub(ids[0]); }
  else { state.activeClubId=null; ACTIVE_CLUB=null; state.screen='club'; applyAppHeader(); render(); }
}
function enterClub(clubId){
  if(isGuest()){ toast('게스트는 팀에 입장할 수 없어요. 로그인 후 이용하세요.'); return; }
  if(!canEnterClub(clubId)){ toast('가입되지 않은 팀입니다'); return; }
  state.activeClubId = clubId; ACTIVE_CLUB = clubId; window.ACTIVE_CLUB = clubId;
  state.auth.lastClub = clubId; saveSession(state.auth);
  // 팀 전환 시 팀별 데이터 캐시 초기화
  state.players=[]; state.matches=[]; state.matchesLoaded=false;
  state.squadLoaded=false; state.recLoaded=false; state.pollLoaded=false; state.boardLoaded=false;
  SQUAD_CACHE={}; state.squadDetail=null; state.matchSquads=[]; state.currentMatch=null; state.currentSquadId=null; state.clubJoinReqs=null;
  applyClubHeader();
  state.screen='team';
  API.run('bootstrap');  // no-op warmup
  loadClubData_();
}
function loadClubData_(){
  state.loading=true; render();
  Promise.all([API.run('getPlayers'), API.run('getMatches')]).then(function(r){
    state.players=r[0]||[]; state.matches=r[1]||[]; state.matchesLoaded=true; state.loading=false;
    if(state.screen==='team') render();
  }).catch(function(){ state.loading=false; render(); });
}
</script>
</body>
</html>
