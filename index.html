/* ---- 카카오맵 ---- */
function buildKakaoMap(el){
  mapProvider='kakao';
  var start = venuePick || {lat:37.5665, lng:126.9780};
  kakaoMap = new kakao.maps.Map(el, {center:new kakao.maps.LatLng(start.lat, start.lng), level: venuePick?3:7});
  kakaoMarker = new kakao.maps.Marker({position:new kakao.maps.LatLng(start.lat, start.lng), draggable:true});
  if(venuePick) kakaoMarker.setMap(kakaoMap);
  kakao.maps.event.addListener(kakaoMap, 'click', function(e){ var ll=e.latLng; setKakaoMarker(ll.getLat(), ll.getLng(), true); });
  kakao.maps.event.addListener(kakaoMarker, 'dragend', function(){ var p=kakaoMarker.getPosition(); venuePick={lat:p.getLat(), lng:p.getLng()}; setVenueStatus(); reverseGeocode_(p.getLat(), p.getLng()); });
  [120,350,650].forEach(function(ms){ setTimeout(function(){ if(kakaoMap) kakaoMap.relayout(); }, ms); });
}
function setKakaoMarker(lat, lng, fillName){
  venuePick={lat:lat, lng:lng};
  var pos=new kakao.maps.LatLng(lat, lng);
  kakaoMarker.setPosition(pos); kakaoMarker.setMap(kakaoMap);
  setVenueStatus(); if(fillName) reverseGeocode_(lat, lng);
}
function reverseGeocode_(lat, lng){
  if(mapProvider!=='kakao' || !window.kakao || !kakao.maps.services) return;
  try{
    new kakao.maps.services.Geocoder().coord2Address(lng, lat, function(res, status){
      if(status===kakao.maps.services.Status.OK && res[0]){
        var nm=(res[0].road_address && res[0].road_address.building_name) || '';
        var v=document.getElementById('g_venue'); if(v && !v.value.trim() && nm) v.value=nm;
      }
    });
  }catch(e){}
}
function kakaoSearch_(q, box){
  try{
    new kakao.maps.services.Places().keywordSearch(q, function(data, status){
      if(!box) return;
      if(status!==kakao.maps.services.Status.OK || !data.length){ box.innerHTML='<div class="map-loading">검색 결과가 없습니다.</div>'; return; }
      window._venueHits={};
      box.innerHTML = data.slice(0,8).map(function(it,i){
        window._venueHits[i]={lat:Number(it.y), lng:Number(it.x), name:it.place_name};
        return '<div class="map-result" onclick="pickResultIdx('+i+')"><div class="mr-name">'+esc(it.place_name)+'</div><div class="mr-full">'+esc(it.road_address_name||it.address_name||'')+'</div></div>';
      }).join('');
    });
  }catch(e){ if(box) box.innerHTML='<div class="map-loading">검색에 실패했습니다.</div>'; }
}

/* ---- OSM (폴백) ---- */
function buildVenueMap(el){
  mapProvider='osm';
  if(venueMap){ try{ venueMap.remove(); }catch(e){} venueMap=null; venueMarker=null; }
  var start = venuePick || {lat:37.5665, lng:126.9780};
  venueMap = L.map(el, {zoomControl:true, attributionControl:false}).setView([start.lat, start.lng], venuePick?15:11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, crossOrigin:true}).addTo(venueMap);
  if(venuePick) placeMarker(venuePick.lat, venuePick.lng);
  venueMap.on('click', function(e){ placeMarker(e.latlng.lat, e.latlng.lng); setVenueStatus(); });
  [80,300,600].forEach(function(ms){ setTimeout(function(){ if(venueMap) venueMap.invalidateSize(); }, ms); });
}
function placeMarker(lat, lng){
  venuePick = {lat:lat, lng:lng};
  if(!venueMap) return;
  if(venueMarker){ venueMarker.setLatLng([lat,lng]); }
  else {
    venueMarker = L.marker([lat,lng], {draggable:true}).addTo(venueMap);
    venueMarker.on('dragend', function(){ var p=venueMarker.getLatLng(); venuePick={lat:p.lat,lng:p.lng}; setVenueStatus(); });
  }
}
function osmSearch_(q, box){
  var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=6&accept-language=ko&countrycodes=kr&q='+encodeURIComponent(q);
  fetch(url, {headers:{'Accept':'application/json'}}).then(function(r){return r.json();}).then(function(list){
    if(!box) return;
    if(!list || !list.length){ box.innerHTML = '<div class="map-loading">검색 결과가 없습니다.</div>'; return; }
    window._venueHits={};
    box.innerHTML = list.map(function(it,i){
      window._venueHits[i]={lat:Number(it.lat),lng:Number(it.lon),name:(it.display_name||'').split(',').slice(0,3).join(', ')};

function saveMatch(id){
  var date = document.getElementById('g_date').value;
  var opp = document.getElementById('g_opp').value.trim();
  if(!date || !opp){ toast('날짜와 상대팀은 필수입니다'); return; }
  var prev = id ? (state.matches.filter(function(x){return x.id===id;})[0]||{}) : {};
  var lat = venuePick ? venuePick.lat : (prev.lat!=null?prev.lat:'');
  var lng = venuePick ? venuePick.lng : (prev.lng!=null?prev.lng:'');
  var url = venuePick ? ('https://www.google.com/maps?q='+venuePick.lat+','+venuePick.lng) : (prev.venueUrl||'');
  var data = {
    date: date,
    time: document.getElementById('g_time').value,
    opponent: opp,
    venue: document.getElementById('g_venue').value.trim(),
    lat: lat, lng: lng,
    venueUrl: url
  };
  var fn = id ? 'updateMatch' : 'addMatch';
  if(id) data.id = id;
  closeSheet();
  toast(id?'경기를 수정했습니다':'경기를 등록했습니다');
  API.run(fn, data).then(function(list){
    state.matches = list;
    if(!id && list.length){
      var newest = list.filter(function(x){return x.date===date && x.opponent===opp;})[0] || list[0];
      state.squadMatchId = newest.id; state.currentSquadId = null;
    }
    return loadMatchSquads(state.squadMatchId);
  }).catch(function(){ toast('저장 실패 · 새로고침'); });
}
function deleteMatchConfirm(id){
  // 낙관적: 목록에서 즉시 제거
  state.matches = state.matches.filter(function(m){return m.id!==id;});
  if(state.squadMatchId===id){ state.squadMatchId = state.matches.length ? state.matches[0].id : null; state.currentSquadId=null; }
  closeSheet(); toast('경기를 삭제했습니다');

}

   +       '<span style="color:var(--steel-soft);font-weight:700;">:</span>'
   +       '<input id="r_opp" type="number" inputmode="numeric" min="0" value="'+(m.oppScore!==undefined&&m.oppScore!==''?m.oppScore:0)+'" style="width:60px;padding:12px;border:1.5px solid var(--line-strong);border-radius:12px;text-align:center;font-family:Oswald;font-weight:700;font-size:22px;">'

function attSeg(pid, val, label, cur){
  return '<button class="att-opt '+(cur===val?('on '+val):'')+'" data-pid="'+pid+'" data-val="'+val+'" onclick="pickAtt(\''+pid+'\',\''+val+'\')">'+label+'</button>';
}
function pickAtt(pid, val){
  state.formAtt[pid] = val;
  var row = document.querySelector('.res-row[data-pid="'+pid+'"] .att-seg');
  if(!row) return;
  Array.prototype.forEach.call(row.querySelectorAll('.att-opt'), function(b){
    var on = b.getAttribute('data-val')===val;
    b.className = 'att-opt' + (on ? (' on '+val) : '');
  });
}
function saveResult(matchId){
  var our = parseInt(document.getElementById('r_our').value)||0;
  var opp = parseInt(document.getElementById('r_opp').value)||0;
  var stats = [];
  var att = [];
  state.players.forEach(function(p){
    var g = parseInt(document.getElementById('st_g_'+p.id).value)||0;
    var a = parseInt(document.getElementById('st_a_'+p.id).value)||0;
    if(g>0||a>0) stats.push({playerId:p.id, goals:g, assists:a});
    att.push({playerId:p.id, status:(state.formAtt[p.id]||'present')});
  });
  var btn=document.querySelector('.btn-primary'); if(btn){btn.textContent='저장 중...';btn.disabled=true;}
  API.run('recordMatchResult', matchId, our, opp).then(function(b){
    state.recMatches=b.matches; state.recStats=b.stats; state.recAtt=b.attendance||state.recAtt;
    return API.run('setMatchStats', matchId, stats);
  }).then(function(b2){
    state.recMatches=b2.matches; state.recStats=b2.stats; state.recAtt=b2.attendance||state.recAtt;
    return API.run('setMatchAttendance', matchId, att);
  }).then(function(b3){
    state.recMatches=b3.matches; state.recStats=b3.stats; state.recAtt=b3.attendance||[];
    closeSheet(); render(); toast('경기 결과를 저장했습니다');
  }).catch(function(){ if(btn){btn.textContent='다시 시도';btn.disabled=false;} toast('저장에 실패했습니다'); });
}

}

function loginPeople_(){
  var src = state.loginNames || state.players || [];
  var seen={}, out=[];
  src.slice().sort(numSort).forEach(function(p){ if(!seen[p.name]){ seen[p.name]=1; out.push(p); } });
  return out;
}
function filterLoginList(){
  var q = ((document.getElementById('au_search')||{}).value||'').trim().toLowerCase();
  var box = document.getElementById('au_list'); if(!box) return;
  loginPid = null;
  var list = loginPeople_()
    .filter(function(p){ return !q || String(p.name).toLowerCase().indexOf(q)>=0; })
    .slice(0, 8);
  if(!list.length){ box.innerHTML='<div class="au-item" style="color:rgba(255,255,255,.5);cursor:default;">일치하는 이름이 없습니다</div>'; box.style.display='block'; return; }
  var exact = list.filter(function(p){ return String(p.name).toLowerCase()===q; });
  if(exact.length===1) loginPid = exact[0].name;
  box.innerHTML = list.map(function(p){
    return '<div class="au-item" onclick="pickLoginUser(\''+esc(p.name).replace(/'/g,'')+'\')"><span class="num">'+(p.num||'')+'</span>'+esc(p.name)+'</div>';
  }).join('');
  box.style.display='block';
}
function pickLoginUser(name){
  loginPid = name;
  var inp = document.getElementById('au_search'); if(inp) inp.value = name;
  var box = document.getElementById('au_list'); if(box) box.style.display='none';
  var pw = document.getElementById('au_pw'); if(pw) pw.focus();
}
function doLogin(){
  var name = loginPid;
  if(!name){
    var q = ((document.getElementById('au_search')||{}).value||'').trim();
    var hit = loginPeople_().filter(function(p){ return p.name===q; });
    if(hit.length===1) name = hit[0].name;
  }
  var pw = (document.getElementById('au_pw')||{}).value;
  if(!name){ toast('이름을 입력 후 목록에서 선택하세요'); return; }
  if(!pw){ toast('비밀번호를 입력하세요'); return; }
  var btn=document.querySelector('.auth-btn'); if(btn){btn.textContent='확인 중...';btn.disabled=true;}
  API.run('login', name, pw).then(function(r){
    if(!r || !r.ok){ if(btn){btn.textContent='로그인';btn.disabled=false;} toast((r&&r.error)||'로그인 실패'); return; }
    state.auth = {name:r.name, memberships:r.memberships||[], token:r.token};
    saveSession(state.auth);
    toast(r.name+'님 환영합니다');
    afterLogin_();
    if(r.firstLogin){ setTimeout(function(){ openMyPw(true); }, 700); }
  }).catch(function(){ if(btn){btn.textContent='로그인';btn.disabled=false;} toast('로그인에 실패했습니다'); });
}
function logout(){
  clearSession(); state.auth=null;

/* ================= Firestore 데이터 계층 =================
 * 설계: 앱 시작 시 Firestore → 메모리(DB) 1회 로드.
 *   읽기 = 메모리에서 즉시(기존 mockHandler 재사용) → 매우 빠름
 *   쓰기 = 메모리 반영 + Firestore에 백그라운드 미러링(변경분만)
 *   비밀번호 = SHA-256 해시로 Firestore에 저장(평문 저장 안 함)
 */
var FS = { enabled:false, loadFailed:false };
FS.ready = new Promise(function(res){ FS._resolve = res; });

var FS_MAP = {
  players:    {coll:'members',      id:function(x){return x.id;}},
  matches:    {coll:'matches',      id:function(x){return x.id;}},
  squads:     {coll:'squads',       id:function(x){return x.id;}},
  members:    {coll:'squadMembers', id:function(x){return x.squadId+'__'+x.playerId;}},
  notes:      {coll:'squadNotes',   id:function(x){return x.id;}},
  stats:      {coll:'playerStats',  id:function(x){return x.matchId+'__'+x.playerId;}},
  attendance: {coll:'attendance',   id:function(x){return x.matchId+'__'+x.playerId;}},
  polls:      {coll:'polls',        id:function(x){return x.id;}},
  votes:      {coll:'votes',        id:function(x){return x.id;}},
  posts:      {coll:'posts',        id:function(x){return x.id;}},
  clubs:      {coll:'clubs',        id:function(x){return x.id;}},
  extras:     {coll:'extraRequests',id:function(x){return x.id;}},
  matchRoster:{coll:'matchRoster',  id:function(x){return x.matchId+'__'+x.playerId;}}
};
var WRITE_TOUCH = {
  addPlayer:['players'], updatePlayer:['players'], deletePlayer:['players','members'], setMemberRole:['players'],
  addMatch:['matches'], updateMatch:['matches'], deleteMatch:['matches','squads','members','notes'], recordMatchResult:['matches'],
  createSquad:['squads'], deleteSquad:['squads','members','notes'], renameSquad:['squads'],
  setSquadMember:['members'], setSquadMemberPos:['members'], removeSquadMember:['members'],
  applyVotersToSquad:['members'], loadAllToSquad:['members'], setSquadPos:['members'], addGuest:['members'],
  addNote:['notes'], deleteNote:['notes'],
  setMatchStats:['stats'], setMatchAttendance:['attendance'],
  createPoll:['polls'], closePoll:['polls'], deletePoll:['polls','votes'], castVote:['votes'],
  addPost:['posts'], togglePin:['posts'], deletePost:['posts'],
  addClub:['clubs','players'], updateClub:['clubs'], deleteClub:['clubs'], toggleClubFav:['clubs'],
  requestExtra:['extras'], approveExtra:['extras','members'], rejectExtra:['extras'],
  applyVotersToMatch:['matchRoster'], clearMatchRoster:['matchRoster']
};
function fsClean(x){ var c={}; for(var k in x){ if(k==='pw'||k==='pwHash'||k==='_row') continue; c[k]=x[k]; } return c; }
function fsSnapshot(keys){
  var s={}; keys.forEach(function(k){ var mm={}; (DB[k]||[]).forEach(function(x){ mm[FS_MAP[k].id(x)]=JSON.parse(JSON.stringify(x)); }); s[k]=mm; });
  return s;
}
function fsSyncDiff(k, beforeMap){
  var m=FS_MAP[k]; var after={}; (DB[k]||[]).forEach(function(x){ after[m.id(x)]=x; });
  var batch=db.batch(); var n=0;
  Object.keys(after).forEach(function(idv){
    var cur=after[idv], prev=beforeMap[idv];
    if(!prev || JSON.stringify(prev)!==JSON.stringify(cur)){ batch.set(db.collection(m.coll).doc(String(idv)), fsClean(cur), {merge:true}); n++; }
  });
  Object.keys(beforeMap).forEach(function(idv){ if(!after[idv]){ batch.delete(db.collection(m.coll).doc(String(idv))); n++; } });
  if(n) batch.commit().catch(function(e){ if(window.console)console.warn('fs sync '+k, e); toast('저장 동기화 실패 · 새로고침'); });
}
function fsSyncConfig(){
  var c={}; for(var k in DB.config){ if(k==='staffPw'||k==='memberPw') continue; c[k]=DB.config[k]; }
  db.collection('config').doc('app').set(c,{merge:true}).catch(function(e){ if(window.console)console.warn('cfg sync',e); });
}

/* 해시 (Apps Script와 동일한 salt로 → 비밀번호 호환) */
function fsHash(pw){
  var enc=new TextEncoder().encode('FCJEMIRO#v1#'+String(pw));
  return crypto.subtle.digest('SHA-256', enc).then(function(buf){
    var hex=Array.prototype.map.call(new Uint8Array(buf), function(b){ return ('0'+b.toString(16)).slice(-2); }).join('');
    return 'v1:'+hex;
  });
}
function fsLogin(name, pw){
  var mates=(DB.players||[]).filter(function(x){return x.name===name;});
  if(!mates.length) return Promise.resolve({ok:false, error:'선수를 찾을 수 없습니다'});
  var stored=(mates.filter(function(x){return x.pwHash;})[0]||{}).pwHash||'';
  var check = stored ? fsHash(pw).then(function(h){return h===stored;}) : Promise.resolve(String(pw)==='jemiro');
  return check.then(function(good){
    if(!good) return {ok:false, error:'비밀번호가 올바르지 않습니다'};
    var memberships=mates.map(function(x){ return {clubId:x.clubId||null, playerId:String(x.id), role:(x.role==='임원'?'임원':'팀원')}; });
    return {ok:true, name:name, memberships:memberships, firstLogin:!stored, token:'fs.'+name};
  });
}
function fsSetMyPassword(pid, oldPw, newPw){
  if(!newPw || String(newPw).trim().length<4) return Promise.resolve({ok:false, error:'새 비밀번호는 4자 이상'});
  var me=(DB.players||[]).filter(function(x){return String(x.id)===String(pid);})[0];
  if(!me) return Promise.resolve({ok:false, error:'선수를 찾을 수 없습니다'});
  var mates=(DB.players||[]).filter(function(x){return x.name===me.name;});
  var stored=(mates.filter(function(x){return x.pwHash;})[0]||{}).pwHash||'';
  var check = stored ? fsHash(oldPw).then(function(h){return h===stored;}) : Promise.resolve(String(oldPw)==='jemiro');
  return check.then(function(good){
    if(!good) return {ok:false, error:'현재 비밀번호가 올바르지 않습니다'};
    return fsHash(String(newPw).trim()).then(function(h){
      var b=db.batch();
      mates.forEach(function(x){ x.pwHash=h; b.set(db.collection('members').doc(String(x.id)), {pwHash:h}, {merge:true}); });
      return b.commit().then(function(){ return {ok:true}; });
    });
  });
}
function fsResetPw(pid){
  var me=(DB.players||[]).filter(function(x){return String(x.id)===String(pid);})[0];
  if(!me) return Promise.resolve({ok:false});
  var mates=(DB.players||[]).filter(function(x){return x.name===me.name;});
  var b=db.batch();
  mates.forEach(function(x){ x.pwHash=''; b.set(db.collection('members').doc(String(x.id)), {pwHash:''}, {merge:true}); });
  return b.commit().then(function(){ return {ok:true}; });
}

/* Firestore → 메모리(DB) 로드 */
function fsColl(name){ return db.collection(name).get().then(function(snap){ var a=[]; snap.forEach(function(d){ var o=d.data()||{}; a.push(o); }); return a; }); }
function fsLoadAll(){
  return Promise.all([
    fsColl('members'), fsColl('matches'), fsColl('squads'), fsColl('squadMembers'),
    fsColl('squadNotes'), fsColl('playerStats'), fsColl('attendance'), fsColl('polls'),
    fsColl('votes'), fsColl('posts'), db.collection('config').doc('app').get(),
    fsColl('clubs'), fsColl('extraRequests'), fsColl('matchRoster')
  ]).then(function(r){
    DB.players=r[0]; DB.matches=r[1]; DB.squads=r[2]; DB.members=r[3];
    DB.notes=r[4]; DB.stats=r[5]; DB.attendance=r[6]; DB.polls=r[7];
    DB.votes=r[8]; DB.posts=r[9]; DB.clubs=r[11]||[]; DB.extras=r[12]||[]; DB.matchRoster=r[13]||[];
    var cfg = (r[10] && r[10].exists) ? r[10].data() : {};
    DB.config = { checkinRadiusM: (cfg.checkinRadiusM!=null?cfg.checkinRadiusM:100), lateThresholdMin: (cfg.lateThresholdMin!=null?cfg.lateThresholdMin:0) };
    for(var k in cfg){ if(k!=='staffPw'&&k!=='memberPw') DB.config[k]=cfg[k]; }
    return (DB.players.length===0);   // 비어있으면 이전 필요
  });
}

FS.run = function(fn, args){
  return FS.ready.then(function(){
    if(fn==='login') return fsLogin(args[0], args[1]);
    if(fn==='setMyPassword') return fsSetMyPassword(args[0], args[1], args[2]);
    if(fn==='resetMemberPassword') return fsResetPw(args[0]);
    if(fn==='setConfig'){ var rc=mockHandler(fn, args); fsSyncConfig(); return rc; }
    var touched=WRITE_TOUCH[fn];
    if(touched){
      var before=fsSnapshot(touched);
      var res=mockHandler(fn, args);
      touched.forEach(function(k){ fsSyncDiff(k, before[k]); });
      return res;
    }
    return mockHandler(fn, args);   // 읽기 (메모리 즉시)
  });
};
/* 팀이 하나도 없으면 FC JEMIRO 기본 팀을 1회 자동 등록 */
function fsSeedClub_(){
  if(DB.clubs && DB.clubs.length) return Promise.resolve();
  var crest = (document.querySelector('.crest-img')||{}).src || '';
  var club = { id:'c_jemiro', name:'FC JEMIRO', region:'안산', note:'SINCE 2014 · 12TH SEASON', emblem:crest, ownerId:'', own:true, createdAt:new Date().toISOString() };
  DB.clubs = [club];
  return db.collection('clubs').doc(club.id).set(fsClean(club), {merge:true}).catch(function(){});
}
function fsStampClub_(){
  var own = (DB.clubs||[]).filter(function(c){return c.own;})[0] || (DB.clubs||[])[0];
  if(!own) return Promise.resolve();
  var cid = own.id;
  var b=db.batch(); var n=0;
  Object.keys(FS_MAP).forEach(function(k){
    if(k==='clubs') return;
    var m=FS_MAP[k];
    (DB[k]||[]).forEach(function(x){ if(!x.clubId){ x.clubId=cid; b.set(db.collection(m.coll).doc(String(m.id(x))), {clubId:cid}, {merge:true}); n++; } });
  });
  if(n) return b.commit().catch(function(){});
  return Promise.resolve();
}
FS.init = function(){
  if(!window.firebase){ return; }
  try{ firebase.initializeApp(FIREBASE_CONFIG); }catch(e){}
  window.db = firebase.firestore();
  FS.enabled = true;
  var authP = firebase.auth ? firebase.auth().signInAnonymously().catch(function(){}) : Promise.resolve();
  authP.then(function(){ return fsLoadAll(); })
    .then(function(){ return fsSeedClub_(); })
    .then(function(){ return fsStampClub_(); })
    .then(function(){ FS._resolve(); })
    .catch(function(e){ if(window.console)console.warn('FS init', e); FS.loadFailed=true; FS._resolve(); });
};


var LOGO_URI = (document.querySelector('.crest-img')||{}).src || '';
FS.init();
API.run('bootstrap').then(function(b){
  if(b){ if(b.config) state.cfg=b.config; state.clubs=b.clubs||[]; }
  var sess = loadSession();
  if(sess && sess.name && sess.memberships){
    state.auth = sess;
    afterLogin_();
  } else {
    applyAppHeader(); showLogin();
  }
}).catch(function(){ applyAppHeader(); showLogin(); });

/* 로그인 후: 접근 가능한 팀이 1개면 자동 입장, 아니면 팀 탭 */
function afterLogin_(){
  var ids = myClubIds();
  document.getElementById('authScreen').style.display='none';
  document.getElementById('tabbar').style.display='flex';
  var last = state.auth && state.auth.lastClub;
  if(last && canEnterClub(last)){ enterClub(last); }
  else if(ids.length===1){ enterClub(ids[0]); }
  else { state.activeClubId=null; ACTIVE_CLUB=null; state.screen='club'; applyAppHeader(); render(); }
}
function enterClub(clubId){
  if(!canEnterClub(clubId)){ toast('가입되지 않은 팀입니다'); return; }
  state.activeClubId = clubId; ACTIVE_CLUB = clubId; window.ACTIVE_CLUB = clubId;
  state.auth.lastClub = clubId; saveSession(state.auth);
  // 팀 전환 시 팀별 데이터 캐시 초기화
  state.players=[]; state.matches=[]; state.matchesLoaded=false;
  state.squadLoaded=false; state.recLoaded=false; state.pollLoaded=false; state.boardLoaded=false;
  SQUAD_CACHE={}; state.squadDetail=null; state.matchSquads=[]; state.currentMatch=null; state.currentSquadId=null;
  applyClubHeader();
  state.screen='team';
  API.run('bootstrap');  // no-op warmup
  loadClubData_();
}
function loadClubData_(){
  state.loading=true; render();
  Promise.all([API.run('getPlayers'), API.run('getMatches')]).then(function(r){
    state.players=r[0]||[]; state.matches=r[1]||[]; state.matchesLoaded=true; state.loading=false;
    if(state.screen==='team') render();
  }).catch(function(){ state.loading=false; render(); });
}
