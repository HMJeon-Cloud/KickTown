function syncPollOpt(i,v){ state.pollOptDraft[i]=v; }
function stashPollForm(){
  state.pollOptDraft.forEach(function(_,i){ var el=document.getElementById('po_'+i); if(el) state.pollOptDraft[i]=el.value; });
  return {title:(document.getElementById('pf_title')||{}).value||'', s:(document.getElementById('pf_start')||{}).value||'', e:(document.getElementById('pf_end')||{}).value||''};
}
function restorePollForm(v){
  document.getElementById('pf_title').value=v.title;
  if(v.s) document.getElementById('pf_start').value=v.s;
  if(v.e) document.getElementById('pf_end').value=v.e;
}
function addPollOpt(){
  var v=stashPollForm();
  if(state.pollOptDraft.length>=8){ toast('항목은 최대 8개'); return; }
  state.pollOptDraft.push(''); renderPollForm(); restorePollForm(v);
}
function removePollOpt(i){
  var v=stashPollForm(); state.pollOptDraft.splice(i,1); renderPollForm(); restorePollForm(v);
}
function savePoll(){
  var title=(document.getElementById('pf_title').value||'').trim();
  var opts=state.pollOptDraft.map(function(_,i){var el=document.getElementById('po_'+i);return el?el.value.trim():'';}).filter(function(x){return x;});
  var start=document.getElementById('pf_start').value;
  var end=document.getElementById('pf_end').value;
  if(!title){ toast('제목을 입력하세요'); return; }
  if(opts.length<2){ toast('항목을 2개 이상 입력하세요'); return; }
  if(!end){ toast('마감 일정을 지정하세요'); return; }
  API.run('createPoll', {title:title, options:opts, startAt:start, endAt:end, multi:state.pollMulti, anon:state.pollAnon, createdBy:authId(), createdByName:(state.auth?state.auth.name:'')}).then(function(list){
    state.polls=list; closeSheet(); render(); toast('투표를 만들었습니다');
  }).catch(function(){ toast('생성에 실패했습니다'); });
}

function openPollDetail(pollId){
  state.currentPollId = pollId;
  API.run('getPollDetail', pollId, authId()).then(function(d){ renderPollDetail(d); }).catch(function(){ toast('불러오지 못했습니다'); });
}
function renderPollDetail(d){
  if(!d || !d.poll){ toast('투표를 찾을 수 없습니다'); return; }
  var p=d.poll; var st=POLL_STATUS[p.status]||POLL_STATUS.open;
  state.currentPollTitle = p.title;   // 공유 카드용
  state.voteChoices = (d.myChoices||[]).slice();
  var max=Math.max.apply(null,d.results.map(function(r){return r.count;}).concat([1]));
  var bars=d.results.map(function(r){
    var pct = d.totalVotes? Math.round(r.count/d.totalVotes*100):0;
    var w = Math.round(r.count/max*100);
    return '<div class="pr-item"><div class="pr-head"><span class="pr-opt">'+esc(r.option)+'</span><span class="pr-cnt">'+r.count+'표 · '+pct+'%</span></div>'
      + '<div class="pr-bar"><div class="pr-fill" style="width:'+w+'%;"></div></div>'
      + (r.voters.length?'<div class="pr-voters">'+r.voters.map(esc).join(', ')+'</div>':'')
      + '</div>';
  }).join('');
  var nonV;
  if(!d.nonVoters.length){
    nonV = '<p style="font-size:12.5px;color:var(--ok);margin:0;">전원 투표 완료 🎉</p>';
  } else {
    var nvChips = d.nonVoters.map(function(n){return '<span class="pchip" style="cursor:default;"><span class="nm">'+esc(n)+'</span></span>';}).join('');
    var nvMore = d.nonVoters.length - 1;
    var nvSummary = esc(d.nonVoters[0]) + (nvMore>0 ? ' 외 '+nvMore+'명' : '');
    nonV = '<button class="nv-toggle" onclick="toggleNvList_(this)"><span class="nv-sum">'+nvSummary+'</span><span class="nv-caret">펼치기 ▾</span></button>'
         + '<div class="pos-players nv-full" style="display:none;margin-top:8px;">'+nvChips+'</div>';
  }

  var voteArea='';
  if(p.status==='open'){
    var optBtns=p.options.map(function(o){
      var sel = state.voteChoices.indexOf(o)>=0;
      return '<button class="vote-opt '+(sel?'on':'')+'" data-opt="'+esc(o).replace(/"/g,'')+'" onclick="pickVoteOpt(this,'+(p.multi?'true':'false')+')">'+esc(o)+'</button>';
    }).join('');
    var who = state.auth ? state.auth.name+'님으로 투표' : '투표하기';
    voteArea = '<div class="field" style="margin-top:16px;"><label>'+who+(p.multi?' · 중복 선택 가능':'')+'</label>'
      + '<div class="vote-opts">'+optBtns+'</div>'
      + '<button class="btn-primary" style="margin-top:12px;" onclick="submitVote(\''+p.id+'\')">'+(state.voteChoices.length?'투표 변경':'투표 제출')+'</button></div>';
  } else if(p.status==='scheduled'){
    voteArea = '<p class="hint" style="margin-top:14px;">아직 시작 전인 투표입니다.</p>';
  } else {
    voteArea = '<p class="hint" style="margin-top:14px;">마감된 투표입니다.</p>';
    // 마감 후 추가 참석 신청 (요청 2)
    if(state.auth){
      if(d.myExtra){
        var stTxt = d.myExtra.status==='approved' ? '✓ 추가 참석 승인됨' : '추가 참석 승인 대기 중';
        voteArea += '<div class="card" style="padding:12px 14px;margin-top:8px;font-size:13.5px;font-weight:700;color:'+(d.myExtra.status==='approved'?'var(--ok)':'var(--warn)')+';">'+stTxt+'</div>';
      } else {
        voteArea += '<button class="btn-ghost" style="margin-top:8px;" onclick="requestExtraJoin(\''+p.id+'\')">🙋 추가 참석 신청</button>';
      }
    }
  }
  // 추가 참석 신청 현황 (임원: 승인/거절)
  var extraSec='';
  var exs=(d.extras||[]);
  if(exs.length){
    var rows=exs.map(function(x){
      var badge = x.status==='approved' ? '<span class="poll-flag" style="background:var(--ok);">승인</span>'
                : x.status==='rejected' ? '<span class="poll-flag" style="background:var(--steel-soft);">거절</span>'
                : '<span class="poll-flag" style="background:var(--warn);">대기</span>';
      var btns = (isAdmin() && x.status==='pending')
        ? '<button class="btn-mini" onclick="openApproveExtra(\''+x.id+'\',\''+jsq(x.name)+'\',\''+p.id+'\')">승인</button>'
          + '<button class="btn-mini ghost" onclick="rejectExtraGo(\''+x.id+'\')">거절</button>'
        : '';
      return '<div class="tg-row" style="cursor:default;"><div style="flex:1;font-weight:700;font-size:14px;">'+esc(x.name)+'</div>'+badge+btns+'</div>';
    }).join('');
    extraSec = '<div class="field" style="margin-top:14px;"><label>추가 참석 신청 · '+exs.length+'명</label>'+rows+'</div>';
  }
  // 투표 인원 스쿼드/경기 적용 (임원)
  var assignBtn = (isAdmin() && d.totalVotes>0)
    ? '<button class="btn-ghost" style="margin-top:14px;" onclick="openApplyToSquad(\''+p.id+'\')">⚽ 투표 인원 스쿼드 적용</button>'
      + '<button class="btn-ghost" style="margin-top:9px;" onclick="openApplyToMatch(\''+p.id+'\')">📋 경기별 참석자 인원 적용</button>'
    : '';

  // 공유 (모든 팀원) — 링크 복사 + 카카오톡 카드
  var shareRow = '<div class="field" style="margin-top:16px;"><label>투표 공유</label>'
    + '<div style="display:flex;gap:9px;">'
    +   '<button class="btn-primary" style="flex:1;margin:0;background:#FEE500;color:rgba(0,0,0,.85);" onclick="sharePollKakao_(\''+p.id+'\')">💬 카카오톡 공유</button>'
    +   '<button class="btn-ghost" style="flex:1;margin:0;" onclick="sharePollLink_(\''+p.id+'\')">🔗 링크 복사</button>'
    + '</div>'
    + '<p style="font-size:11px;color:var(--steel-soft);margin:7px 2px 0;">단톡방에 공유하면 팀원이 링크로 바로 이 투표에 참여해요.</p></div>';

  var adminBtns = canManagePoll_(p) ? '<div style="display:flex;gap:9px;margin-top:14px;">'
    +     (p.status==='open'?'<button class="btn-ghost" style="flex:1;margin:0;" onclick="closePollConfirm(\''+p.id+'\')">투표 마감</button>':'')
    +     '<button class="btn-ghost btn-danger" style="flex:1;margin:0;" onclick="deletePollConfirm(\''+p.id+'\')">삭제</button>'
    +   '</div>' : '';

  var flags = (p.multi?'<span class="poll-flag">중복</span>':'')+(p.anon?'<span class="poll-flag">익명</span>':'');
  var html = '<div class="grabber"></div>'
   + '<div class="sheet-head"><h3>'+esc(p.title)+'</h3><button class="x" onclick="closeSheet()">✕</button></div>'
   + '<div class="sheet-body">'
   +   '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;"><span class="poll-badge '+st.c+'">'+st.t+'</span>'+flags
   +     (p.endAt?'<span class="poll-dl">~'+fmtDeadline(p.endAt)+' 마감</span>':'')
   +     '<span style="margin-left:auto;font-size:12px;color:var(--steel);">'+d.totalVotes+'/'+d.totalMembers+'명 참여</span></div>'
   +   '<div class="field"><label>결과'+(p.anon?' <span style="color:var(--steel-soft);font-weight:600;">(익명)</span>':'')+'</label>'+bars+'</div>'
   +   '<div class="field"><label>미투표자 · '+d.nonVoters.length+'명</label>'+nonV+'</div>'
   +   voteArea + extraSec + shareRow + assignBtn + adminBtns
   + '</div>';
  showSheet(html);
}
function pickVoteOpt(btn, multi){
  var opt = btn.getAttribute('data-opt');
  if(multi){
    var i=state.voteChoices.indexOf(opt);
    if(i>=0) state.voteChoices.splice(i,1); else state.voteChoices.push(opt);
    btn.classList.toggle('on');
  } else {
    state.voteChoices=[opt];
    Array.prototype.forEach.call(document.querySelectorAll('.vote-opt'), function(b){ b.classList.toggle('on', b===btn); });
  }
}
/* ---- 투표 인원 경기 편성 (요청 1) ---- */
var assignPollId=null, assignOpt=null, applyTargetSquad=null;
/* 스쿼드 탭에서: 스쿼드 고정 → 투표+항목 선택 */
function openApplyVoters(sid){
  if(!requireAdmin()) return;
  applyTargetSquad=sid; assignPollId=null; assignOpt=null; state.applyShowAll=false;
  API.run('getPolls').then(function(polls){
    state.polls=polls||[];
    if(!polls || !polls.length){ toast('작성된 투표가 없습니다'); return; }
    var recent = polls.slice(0,5);
    var popts='<option value="">투표 선택</option>'+recent.map(function(p){ return '<option value="'+p.id+'">'+esc(p.title)+'</option>'; }).join('');
    var moreLink = polls.length>5 ? '<div id="ap_more" style="margin-top:6px;"><a style="font-size:12.5px;color:var(--red);cursor:pointer;" onclick="expandApplyPolls()">지난 투표 보기 ('+(polls.length-5)+'개 더) ›</a></div>' : '';
    var html='<div class="grabber"></div>'
     + '<div class="sheet-head"><h3>투표 인원 스쿼드 적용</h3><button class="x" onclick="closeSheet()">✕</button></div>'
     + '<div class="sheet-body">'
     +   '<p style="font-size:13px;color:var(--steel);margin:0 0 12px;line-height:1.55;">선택한 항목에 투표한 인원을 이 스쿼드에 배치합니다(기존 배치는 지워집니다).<br>포지션은 선호 1순위(없으면 DF)입니다.</p>'
     +   '<div class="field"><label>투표<span class="req">*</span></label><select id="ap_poll" onchange="fillApplyOpts()">'+popts+'</select>'+moreLink+'</div>'
     +   '<div class="field"><label>참석으로 볼 항목<span class="req">*</span></label><div id="ap_opts" class="chips"><span style="font-size:12.5px;color:var(--steel-soft);">투표를 먼저 선택하세요</span></div></div>'
     +   '<button class="btn-primary" onclick="runApplyVoters()">스쿼드에 적용</button>'
     + '</div>';
    showSheet(html);
  }).catch(function(){ toast('불러오기 실패'); });
}
function expandApplyPolls(){
  var sel=document.getElementById('ap_poll'); if(!sel) return;
  var cur=sel.value;
  sel.innerHTML='<option value="">투표 선택</option>'+(state.polls||[]).map(function(p){ return '<option value="'+p.id+'"'+(p.id===cur?' selected':'')+'>'+esc(p.title)+'</option>'; }).join('');
  var more=document.getElementById('ap_more'); if(more) more.style.display='none';
}
function fillApplyOpts(){
  var pid=(document.getElementById('ap_poll')||{}).value; assignPollId=pid; assignOpt=null;
  var box=document.getElementById('ap_opts'); if(!box) return;
  var p=(state.polls||[]).filter(function(x){return x.id===pid;})[0];
  if(!p){ box.innerHTML='<span style="font-size:12.5px;color:var(--steel-soft);">투표를 먼저 선택하세요</span>'; return; }
  box.innerHTML=(p.options||[]).map(function(o){ return '<div class="chip" data-as-opt="'+esc(o).replace(/"/g,'')+'" onclick="pickAssignOpt(this)">'+esc(o)+'</div>'; }).join('');
}
function pickAssignOpt(el){
  assignOpt = el.getAttribute('data-as-opt');
  Array.prototype.forEach.call(document.querySelectorAll('#ap_opts .chip, #sheet .chip'), function(c){ c.classList.toggle('on', c===el); });
}
function runApplyVoters(){
  if(!assignPollId){ toast('투표를 선택하세요'); return; }
  if(!assignOpt){ toast('참석 항목을 선택하세요'); return; }
  var sid=applyTargetSquad;
  API.run('applyVotersToSquad', assignPollId, assignOpt, sid).then(function(r){
    if(r && r.detail){ SQUAD_CACHE[sid]=r.detail; state.squadDetail=r.detail; }
    state.squadList=(state.squadList||[]).map(function(s){ return s.id===sid?Object.assign({},s,{count:r.detail?r.detail.members.length:s.count}):s; });
    closeSheet(); render(); toast((r&&r.count||0)+'명을 스쿼드에 적용했습니다');
  }).catch(function(){ toast('적용 실패'); });
}
/* 투표 상세에서: 투표 고정 → 스쿼드+항목 선택 */
function openApplyToMatch(pollId){
  if(!requireAdmin()) return;
  assignPollId=pollId; assignOpt=null;
  var p=(state.polls||[]).filter(function(x){return x.id===pollId;})[0];
  var doIt=function(){
    var today=new Date().toISOString().slice(0,10);
    var ms=(state.matches||[]).slice().sort(function(a,b){return a.date.localeCompare(b.date);});
    var up=ms.filter(function(m){return m.date>=today;});
    var mlist=(up.length?up:ms).slice(0,12);
    if(!mlist.length){ toast('등록된 경기가 없습니다'); return; }
    var mopts=mlist.map(function(m){ return '<option value="'+m.id+'">'+fmtDateDot(m.date)+' vs '+esc(m.opponent||'상대 미정')+'</option>'; }).join('');
    var oopts=((p&&p.options)||[]).map(function(o){ return '<div class="chip" data-as-opt="'+esc(o).replace(/"/g,'')+'" onclick="pickAssignOpt(this)">'+esc(o)+'</div>'; }).join('');
    var html='<div class="grabber"></div>'
     + '<div class="sheet-head"><h3>경기별 참석자 인원 적용</h3><button class="x" onclick="closeSheet()">✕</button></div>'
     + '<div class="sheet-body">'
     +   '<p style="font-size:13px;color:var(--steel);margin:0 0 12px;line-height:1.55;">선택한 항목 투표자를 <b>그 경기의 참석 명단</b>으로 지정합니다.<br>지정하면 출석 탭에서 이 인원만 <b>출석·지각·불참</b>을 기록합니다.</p>'
     +   '<div class="field"><label>경기<span class="req">*</span></label><select id="am_match">'+mopts+'</select></div>'
     +   '<div class="field"><label>참석으로 볼 항목<span class="req">*</span></label><div id="ap_opts" class="chips">'+oopts+'</div></div>'
     +   '<button class="btn-primary" onclick="runApplyToMatch()">참석 명단 지정</button>'
     + '</div>';
    showSheet(html);
  };
  if(p && p.options){ doIt(); }
  else { API.run('getPolls').then(function(pl){ state.polls=pl||[]; p=(pl||[]).filter(function(x){return x.id===pollId;})[0]; doIt(); }); }
}
function runApplyToMatch(){
  if(!assignOpt){ toast('참석 항목을 선택하세요'); return; }
  var mid=(document.getElementById('am_match')||{}).value;
  if(!mid){ toast('경기를 선택하세요'); return; }
  API.run('applyVotersToMatch', assignPollId, assignOpt, mid).then(function(r){
    state.attLoaded=false;  // 출석 탭 갱신 유도
    closeSheet(); toast((r&&r.count||0)+'명을 경기 참석 명단으로 지정했습니다');
  }).catch(function(){ toast('적용 실패'); });
}
function openApplyToSquad(pollId){
  if(!requireAdmin()) return;
  assignPollId=pollId; assignOpt=null;
  API.run('getSquads').then(function(list){
    state.squadList=list||[];
    var p=(state.polls||[]).filter(function(x){return x.id===pollId;})[0] || {options:[]};
    if(!list || !list.length){ toast('먼저 스쿼드 탭에서 스쿼드를 만들어주세요'); return; }
    var sopts=list.map(function(s){ return '<option value="'+s.id+'">'+esc(s.name)+'</option>'; }).join('');
    var oopts=(p.options||[]).map(function(o){ return '<div class="chip" data-as-opt="'+esc(o).replace(/"/g,'')+'" onclick="pickAssignOpt(this)">'+esc(o)+'</div>'; }).join('');
    var html='<div class="grabber"></div>'
     + '<div class="sheet-head"><h3>투표 인원 스쿼드 적용</h3><button class="x" onclick="closeSheet()">✕</button></div>'
     + '<div class="sheet-body">'
     +   '<p style="font-size:13px;color:var(--steel);margin:0 0 12px;line-height:1.55;">선택한 항목에 투표한 인원을 스쿼드에 배치합니다(기존 배치는 지워집니다).</p>'
     +   '<div class="field"><label>적용할 스쿼드<span class="req">*</span></label><select id="ap_squad">'+sopts+'</select></div>'
     +   '<div class="field"><label>참석으로 볼 항목<span class="req">*</span></label><div id="ap_opts" class="chips">'+oopts+'</div></div>'
     +   '<button class="btn-primary" onclick="runApplyToSquad()">스쿼드에 적용</button>'
     + '</div>';
    showSheet(html);
  }).catch(function(){ toast('불러오기 실패'); });
}
function runApplyToSquad(){
  if(!assignOpt){ toast('참석 항목을 선택하세요'); return; }
  var sid=(document.getElementById('ap_squad')||{}).value;
  if(!sid){ toast('스쿼드를 선택하세요'); return; }
  API.run('applyVotersToSquad', assignPollId, assignOpt, sid).then(function(r){
    SQUAD_CACHE[sid]=r&&r.detail?r.detail:SQUAD_CACHE[sid];
    closeSheet(); toast((r&&r.count||0)+'명을 스쿼드에 적용했습니다');
  }).catch(function(){ toast('적용 실패'); });
}

/* ---- 추가 참석 신청/승인 (요청 2) ---- */
function requestExtraJoin(pollId){
  if(!state.auth){ toast('로그인이 필요합니다'); return; }
  API.run('requestExtra', pollId, state.auth.playerId).then(function(d){
    renderPollDetail(d); toast('추가 참석을 신청했습니다 · 임원 승인 대기');
  }).catch(function(){ toast('신청 실패'); });
}
var approveExtraId=null, approvePollId=null;
function openApproveExtra(extraId, name, pollId){
  if(!requireAdmin()) return;
  approveExtraId=extraId; approvePollId=pollId;
  API.run('getSquads').then(function(list){
    state.squadList=list||[];
    var sopts='<option value="">스쿼드에 배치 안 함</option>'+(list||[]).map(function(s){ return '<option value="'+s.id+'">'+esc(s.name)+'</option>'; }).join('');
    var html='<div class="grabber"></div>'
     + '<div class="sheet-head"><h3>'+esc(name)+' · 추가 참석 승인</h3><button class="x" onclick="closeSheet()">✕</button></div>'
     + '<div class="sheet-body">'
     +   '<p style="font-size:13px;color:var(--steel);margin:0 0 12px;line-height:1.55;">승인하면서 스쿼드에 바로 배치할지 선택할 수 있습니다.<br>배치 시 포지션은 선호 1순위(없으면 DF)입니다.</p>'
     +   '<div class="field"><label>스쿼드 배치</label><select id="ae_squad">'+sopts+'</select></div>'
     +   '<button class="btn-primary" onclick="runApproveExtra()">승인하기</button>'

/* 실제 삭제 수행: 명단 익명화 → 구단주 해제 → 계정 문서 삭제 → 인증 계정 삭제 */
function withdrawAccount_(pw){
  var oid = state.auth && state.auth.ownerId;
  if(!oid) return Promise.resolve({ok:false, error:'계정 정보를 확인할 수 없습니다'});
  var isKakao = (state.auth.provider==='kakao');
  var A = authInst_();
  var u = A && A.currentUser;
  var pre;
  if(!isKakao){
    if(!u || !u.email) return Promise.resolve({ok:false, error:'다시 로그인 후 시도해주세요'});
    pre = A.signInWithEmailAndPassword(u.email, pw).then(function(){ return true; })
           .catch(function(e){ return Promise.reject(new Error(mapAuthErr_(e))); });
  } else {
    pre = Promise.resolve(true);
  }
  return pre.then(function(){
    var FV = (window.firebase && firebase.firestore && firebase.firestore.FieldValue) ? firebase.firestore.FieldValue : null;
    var jobs = [];
    // 1) 명단 항목 익명화 (이름·등번호는 기록 일관성을 위해 유지)
    (DB.players||[]).forEach(function(p){
      if(p.accountId!==oid && p.ownerId!==oid) return;
      delete p.accountId; delete p.ownerId;
      delete p.birth; delete p.height; delete p.weight;
      p.withdrawn = true;
      if(window.db){
        var patch = {withdrawn:true};
        if(FV){ patch.accountId=FV.delete(); patch.ownerId=FV.delete(); patch.birth=FV.delete(); patch.height=FV.delete(); patch.weight=FV.delete(); }
        jobs.push(db.collection('members').doc(p.id).set(patch, {merge:true}).catch(function(){}));
      }
    });
    // 2) 내가 구단주인 팀은 구단주 연결 해제 (팀 데이터 자체는 유지)
    myOwnedClubs_().forEach(function(c){
      delete c.ownerId;
      if(window.db && FV){ jobs.push(db.collection('clubs').doc(c.id).set({ownerId:FV.delete()}, {merge:true}).catch(function(){})); }
    });
    // 3) 계정 문서 삭제
    DB.owners = (DB.owners||[]).filter(function(o){ return o.id!==oid; });
    if(window.db){ jobs.push(db.collection('owners').doc(oid).delete()); }
    return Promise.all(jobs);
  }).then(function(){
    // 4) 이메일 계정은 Firebase 인증 계정까지 삭제
    if(!isKakao && u && u.delete){ return u.delete().catch(function(){}); }
    return true;
  }).then(function(){
    return {ok:true};
  }).catch(function(e){
    return {ok:false, error:(e&&e.message)||'삭제 처리에 실패했습니다'};
  });
}

}

function pickEmblem(input){
  var file = input.files && input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var c=document.createElement('canvas'); var sz=96; c.width=sz; c.height=sz;
      var ctx=c.getContext('2d');
      var r=Math.min(sz/img.width, sz/img.height);
      var w=img.width*r, h=img.height*r;
      ctx.drawImage(img,(sz-w)/2,(sz-h)/2,w,h);
      clubEmblemData = c.toDataURL('image/png');
      var pv=document.getElementById('cb_prev'); if(pv){ pv.innerHTML='<img src="'+clubEmblemData+'" style="width:100%;height:100%;object-fit:contain;border-radius:12px;">'; pv.classList.remove('club-emblem-empty'); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
/* 원본 비율 유지로 축소 + 고품질 JPEG 인코딩. Firestore 문서 한도(≈1MB) 안에 들도록
   품질→해상도 순으로 자동 조절하며 용량을 맞춘다. (선명도 우선) */
function encodeImgUnder_(img, maxW, maxH, budgetChars){
  var r=Math.min(maxW/img.width, maxH/img.height, 1);
  var w=Math.max(1, Math.round(img.width*r)), h=Math.max(1, Math.round(img.height*r));
  var url='';
  for(var attempt=0; attempt<7; attempt++){
    var c=document.createElement('canvas'); c.width=w; c.height=h;
    var ctx=c.getContext('2d'); try{ ctx.imageSmoothingEnabled=true; ctx.imageSmoothingQuality='high'; }catch(e){}
    ctx.drawImage(img,0,0,w,h);
    var q=0.88; url=c.toDataURL('image/jpeg', q);
    while(url.length>budgetChars && q>0.5){ q-=0.08; url=c.toDataURL('image/jpeg', q); }
    if(url.length<=budgetChars) break;
    w=Math.round(w*0.85); h=Math.round(h*0.85);   // 여전히 크면 해상도 축소 후 재시도
  }
  return url;
}
/* 팀 헤더 배경 이미지: 원본 비율 유지·고해상도(가로 최대 1440)로 저장 → 선명하게, 덜 잘리게 */
function pickClubBg(input){
  var file = input.files && input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      clubBgData = encodeImgUnder_(img, 1440, 960, 820000);   // ≈0.8MB 이내로 유지
      var pv=document.getElementById('cb_bgprev'); if(pv){ pv.style.background='#15131b center/cover no-repeat url('+clubBgData+')'; }
      var hint=document.getElementById('cb_bghint'); if(hint){ hint.textContent='적용된 배경'; hint.style.color='#fff'; }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function initVenueDisplayMap(){
  var el = document.getElementById('venue_map'); if(!el) return;
  var m = latestMatch(); if(!m) return;
  var lat = Number(m.lat), lng = Number(m.lng);
  if(isNaN(lat) || isNaN(lng)) return;
  el.innerHTML = '<div class="map-fallback">지도 불러오는 중...</div>';
  ensureKakao(function(okK){
    var box = document.getElementById('venue_map'); if(!box) return;
    var builtKakao = false;
    if(okK){
      try{
        box.innerHTML='';
        var map = new kakao.maps.Map(box, {center:new kakao.maps.LatLng(lat,lng), level:4});
        new kakao.maps.Marker({position:new kakao.maps.LatLng(lat,lng)}).setMap(map);
        map.setZoomable(false);
        [120,400,700].forEach(function(ms){ setTimeout(function(){ try{ map.relayout(); map.setCenter(new kakao.maps.LatLng(lat,lng)); }catch(e){} }, ms); });
        builtKakao = true;
      }catch(e){ builtKakao = false; }
    }
    if(!builtKakao){
      ensureLeaflet(function(okL){
        var b2 = document.getElementById('venue_map'); if(!b2) return;
        if(okL){
          try{
            b2.innerHTML='';
            var lm = L.map(b2, {zoomControl:false, attributionControl:false, scrollWheelZoom:false}).setView([lat,lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, crossOrigin:true}).addTo(lm);
            L.marker([lat,lng]).addTo(lm);
            [120,400].forEach(function(ms){ setTimeout(function(){ lm.invalidateSize(); }, ms); });

function savePlayer(){
  var num = document.getElementById('f_num').value.trim();
  var name = document.getElementById('f_name').value.trim();
  if(!name){
    toast('이름은 필수입니다');
    return;
  }
  var data = {
    num: (num===''?'':parseInt(num)),
    name: name,
    size: state.formSize || '',
    positions: state.formPositions.slice(),
    birth: document.getElementById('f_birth').value,
    height: parseInt(document.getElementById('f_height').value)||null,
    weight: parseInt(document.getElementById('f_weight').value)||null,
    region: document.getElementById('f_region').value.trim()
  };
  // 권한: 등록은 임원만, 수정은 임원 또는 본인
  if(state.editId){ if(!isAdmin() && !(isLogged_() && state.editId===authId())){ toast('본인 정보만 수정할 수 있습니다'); return; } }
  else if(!isAdmin()){ toast('임원만 팀원을 등록할 수 있습니다'); return; }

  var btn = document.querySelector('.btn-primary');
  if(btn){ btn.textContent = '저장 중...'; btn.disabled = true; }

  if(state.editId){
    data.id = state.editId;
    // 낙관적 갱신
    state.players = state.players.map(function(p){ return p.id===state.editId ? Object.assign({}, p, data) : p; });
    closeSheet(); render(); toast(name+' 정보를 수정했습니다');
    API.run('updatePlayer', data).then(function(list){ state.players = list; if(state.screen==='team') render(); }).catch(function(){ toast('저장 실패 · 새로고침'); });
  } else {
    var tmp = Object.assign({id:'tmp'+Date.now()}, data);
    state.players = state.players.concat([tmp]);
    closeSheet(); render(); toast(name+' 선수를 등록했습니다');
    API.run('addPlayer', data).then(function(list){ state.players = list; if(state.screen==='team') render(); }).catch(function(){ toast('저장 실패 · 새로고침'); });
  }
}

function doDeletePlayer(id){
  var gone=(state.players||[]).filter(function(p){return p.id===id;})[0];
  // 낙관적 갱신: 공유 club 객체를 in-place 수정하면 DB.clubs까지 오염돼 deletePlayer의 clubs 저장이 누락됨 → 새 객체로 교체
  if(gone && gone.name){
    var cid=state.activeClubId;
    state.clubs=(state.clubs||[]).map(function(c){
      if(c.id!==cid) return c;
      var ex=Object.assign({}, c.exPlayers||{}); ex[id]={name:gone.name, num:(gone.num!=null?gone.num:'')};
      return Object.assign({}, c, {exPlayers:ex});
    });
  }
  state.players = state.players.filter(function(p){return p.id!==id;});
  closeSheet(); render(); toast('삭제되었습니다');
  API.run('deletePlayer', id).then(function(list){ state.players = list; if(state.screen==='team') render(); }).catch(function(){ toast('삭제 저장 실패 · 새로고침'); });
}

/* 카카오 로그인 백엔드 base URL (OAuth 토큰 교환 서버 · 배포 후 입력, 예: https://xxx.vercel.app) */
var KAKAO_BACKEND = 'https://kick-town.vercel.app';
var venueMap=null, venueMarker=null, venuePick=null, venuePickUrl='', leafletTried=false, kakaoTried=false;
var kakaoMap=null, kakaoMarker=null, mapProvider=null;

function ensureKakao(cb){
  var done=false, fin=function(ok){ if(done) return; done=true; cb(ok); };
  if(!KAKAO_JS_KEY){ fin(false); return; }
  if(window.kakao && window.kakao.maps && window.kakao.maps.Map){ fin(true); return; }
  var start=function(){ try{ kakao.maps.load(function(){ fin(!!(window.kakao&&kakao.maps&&kakao.maps.Map)); }); }catch(e){ fin(false); } };
  if(window.kakao && window.kakao.maps){ start(); return; }
  if(kakaoTried){ setTimeout(function(){ fin(!!(window.kakao&&window.kakao.maps&&window.kakao.maps.Map)); }, 3000); return; }
  kakaoTried=true;
  var s=document.createElement('script');
  s.src='https://dapi.kakao.com/v2/maps/sdk.js?appkey='+KAKAO_JS_KEY+'&libraries=services&autoload=false';
  s.onload=function(){ start(); };
  s.onerror=function(){ fin(false); };
  document.head.appendChild(s);
  setTimeout(function(){ fin(!!(window.kakao&&window.kakao.maps&&window.kakao.maps.Map)); }, 5000);
}
function ensureLeaflet(cb){
  var done=false; var fin=function(ok){ if(done) return; done=true; cb(ok); };
  if(typeof L !== 'undefined'){ fin(true); return; }
  var waited=0;
  var poll=setInterval(function(){
    if(typeof L !== 'undefined'){ clearInterval(poll); fin(true); return; }
    waited+=150;
    if(waited>=1500){ clearInterval(poll); tryFallbackCdn(); }
  }, 150);
  function tryFallbackCdn(){
    if(leafletTried){ setTimeout(function(){ fin(typeof L!=='undefined'); }, 2500); return; }
    leafletTried=true;
    var css=document.createElement('link'); css.rel='stylesheet';
    css.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css'; document.head.appendChild(css);
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
    s.onload=function(){ fin(typeof L!=='undefined'); };
    s.onerror=function(){ fin(false); };
    document.head.appendChild(s);
    setTimeout(function(){ fin(typeof L!=='undefined'); }, 5000);
  }
}
function initVenueMap(){
  var el = document.getElementById('g_map');
  if(!el) return;
  mapProvider=null; kakaoMap=null; kakaoMarker=null;
  el.innerHTML = '<div class="map-fallback">지도 불러오는 중...</div>';
  ensureKakao(function(okK){
    var box = document.getElementById('g_map'); if(!box) return;
    if(okK){ box.innerHTML=''; buildKakaoMap(box); return; }
    // 카카오 실패 → OSM 폴백
    ensureLeaflet(function(okL){
      var b2 = document.getElementById('g_map'); if(!b2) return;
      if(okL){ b2.innerHTML=''; buildVenueMap(b2); }
      else {
        b2.innerHTML = '<div class="map-fallback">지도를 불러오지 못했습니다.<br>아래 “지도 링크 직접 입력”을 이용하세요.<br><span style="font-size:10px;color:#9aa;opacity:.8;">현재 도메인: '+esc(location.hostname)+'</span></div>';
      }
    });
  });
}

/* ---- 카카오맵 ---- */
function buildKakaoMap(el){
  mapProvider='kakao';
  var start = venuePick || {lat:37.5665, lng:126.9780};
  kakaoMap = new kakao.maps.Map(el, {center:new kakao.maps.LatLng(start.lat, start.lng), level: venuePick?3:7});
  kakaoMarker = new kakao.maps.Marker({position:new kakao.maps.LatLng(start.lat, start.lng), draggable:true});
  if(venuePick) kakaoMarker.setMap(kakaoMap);
  kakao.maps.event.addListener(kakaoMap, 'click', function(e){ var ll=e.latLng; setKakaoMarker(ll.getLat(), ll.getLng(), true); });
  kakao.maps.event.addListener(kakaoMarker, 'dragend', function(){ var p=kakaoMarker.getPosition(); venuePick={lat:p.getLat(), lng:p.getLng()}; setVenueStatus(); reverseGeocode_(p.getLat(), p.getLng()); });
  [120,350,650].forEach(function(ms){ setTimeout(function(){ if(kakaoMap) kakaoMap.relayout(); }, ms); });
}
function setKakaoMarker(lat, lng, fillName){
  venuePick={lat:lat, lng:lng};
  var pos=new kakao.maps.LatLng(lat, lng);
  kakaoMarker.setPosition(pos); kakaoMarker.setMap(kakaoMap);
  setVenueStatus(); if(fillName) reverseGeocode_(lat, lng);
}
function reverseGeocode_(lat, lng){
  if(mapProvider!=='kakao' || !window.kakao || !kakao.maps.services) return;
  try{
    new kakao.maps.services.Geocoder().coord2Address(lng, lat, function(res, status){
      if(status===kakao.maps.services.Status.OK && res[0]){
        var nm=(res[0].road_address && res[0].road_address.building_name) || '';
        var v=document.getElementById('g_venue'); if(v && !v.value.trim() && nm) v.value=nm;
      }
    });
  }catch(e){}
}
function kakaoSearch_(q, box){
  try{
    new kakao.maps.services.Places().keywordSearch(q, function(data, status){
      if(!box) return;
      if(status!==kakao.maps.services.Status.OK || !data.length){ box.innerHTML='<div class="map-loading">검색 결과가 없습니다.</div>'; return; }
      window._venueHits={};
      box.innerHTML = data.slice(0,8).map(function(it,i){
        window._venueHits[i]={lat:Number(it.y), lng:Number(it.x), name:it.place_name};
        return '<div class="map-result" onclick="pickResultIdx('+i+')"><div class="mr-name">'+esc(it.place_name)+'</div><div class="mr-full">'+esc(it.road_address_name||it.address_name||'')+'</div></div>';
      }).join('');
    });
  }catch(e){ if(box) box.innerHTML='<div class="map-loading">검색에 실패했습니다.</div>'; }
}

/* ---- OSM (폴백) ---- */
function buildVenueMap(el){
  mapProvider='osm';
  if(venueMap){ try{ venueMap.remove(); }catch(e){} venueMap=null; venueMarker=null; }
  var start = venuePick || {lat:37.5665, lng:126.9780};
  venueMap = L.map(el, {zoomControl:true, attributionControl:false}).setView([start.lat, start.lng], venuePick?15:11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, crossOrigin:true}).addTo(venueMap);
  if(venuePick) placeMarker(venuePick.lat, venuePick.lng);
  venueMap.on('click', function(e){ placeMarker(e.latlng.lat, e.latlng.lng); setVenueStatus(); });
  [80,300,600].forEach(function(ms){ setTimeout(function(){ if(venueMap) venueMap.invalidateSize(); }, ms); });
}
function placeMarker(lat, lng){
  venuePick = {lat:lat, lng:lng};
  if(!venueMap) return;
  if(venueMarker){ venueMarker.setLatLng([lat,lng]); }
  else {
    venueMarker = L.marker([lat,lng], {draggable:true}).addTo(venueMap);
    venueMarker.on('dragend', function(){ var p=venueMarker.getLatLng(); venuePick={lat:p.lat,lng:p.lng}; setVenueStatus(); });
  }
}
function osmSearch_(q, box){
  var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=6&accept-language=ko&countrycodes=kr&q='+encodeURIComponent(q);
  fetch(url, {headers:{'Accept':'application/json'}}).then(function(r){return r.json();}).then(function(list){
    if(!box) return;
    if(!list || !list.length){ box.innerHTML = '<div class="map-loading">검색 결과가 없습니다.</div>'; return; }
    window._venueHits={};
    box.innerHTML = list.map(function(it,i){
      window._venueHits[i]={lat:Number(it.lat),lng:Number(it.lon),name:(it.display_name||'').split(',').slice(0,3).join(', ')};
      var short = (it.display_name||'').split(',').slice(0,3).join(', ');
      return '<div class="map-result" onclick="pickResultIdx('+i+')"><div class="mr-name">'+esc(short)+'</div><div class="mr-full">'+esc(it.display_name||'')+'</div></div>';
    }).join('');
  }).catch(function(){ if(box) box.innerHTML = '<div class="map-loading">검색에 실패했습니다. 네트워크 확인 후 다시 시도하세요.</div>'; });
}

/* ---- 공통 ---- */
function setVenueStatus(){
  var s = document.getElementById('g_map_status');
  if(s && venuePick) s.innerHTML = '📍 위치 지정됨 ('+venuePick.lat.toFixed(5)+', '+venuePick.lng.toFixed(5)+') · 마커를 끌어 조정';
}
function searchVenue(){
  var q = (document.getElementById('g_map_q')||{}).value;
  if(!q || !q.trim()){ toast('검색어를 입력하세요'); return; }
  var box = document.getElementById('g_map_results');
  if(box) box.innerHTML = '<div class="map-loading">검색 중...</div>';
  if(mapProvider==='kakao' && window.kakao && kakao.maps.services){ kakaoSearch_(q.trim(), box); return; }
  osmSearch_(q.trim(), box);
}
function pickResultIdx(i){
  var h=(window._venueHits||{})[i]; if(!h) return;
  pickResult(h.lat, h.lng, h.name);
}
/* 기존 상대팀 목록 (중복 제거·정렬) — 같은 팀 이름 통일용 datalist */
function matchOpponents_(){
  var s={}; (state.matches||[]).forEach(function(m){ var o=(m.opponent||'').trim(); if(o) s[o]=1; });
  return Object.keys(s).sort();
}
/* 과거 경기장 목록 (이름별, 좌표 있는 기록 우선) — 선택 시 지도 위치까지 불러오기 */
function pastVenues_(){
  var map={}; (state.matches||[]).forEach(function(m){
    var v=(m.venue||'').trim(); if(!v) return;
    var hasXY=(m.lat!=null&&m.lat!==''&&m.lng!=null&&m.lng!=='');
    var cur=map[v];
    var curHasXY = cur && cur.lat!=='' && cur.lat!=null;
    if(!cur || (hasXY && !curHasXY)) map[v]={venue:v, lat:(hasXY?Number(m.lat):''), lng:(hasXY?Number(m.lng):''), venueUrl:m.venueUrl||''};
  });
  return Object.keys(map).sort().map(function(k){ return map[k]; });
}
/* 경기장 이름이 과거 경기장과 일치하면 지도 좌표·링크까지 불러오기 (새 이름이면 무시) */
function loadPastVenue_(name){
  name=(name||'').trim(); if(!name) return;
  var list=pastVenues_(), pv=null;
  for(var i=0;i<list.length;i++){ if(list[i].venue===name){ pv=list[i]; break; } }
  if(!pv) return;
  if(pv.lat!==''&&pv.lat!=null&&pv.lng!==''&&pv.lng!=null){
    var lat=Number(pv.lat), lng=Number(pv.lng);
    venuePick={lat:lat, lng:lng}; venuePickUrl=pv.venueUrl||'';
    if(mapProvider==='kakao' && kakaoMap){ kakaoMap.setCenter(new kakao.maps.LatLng(lat,lng)); kakaoMap.setLevel(3); setKakaoMarker(lat,lng,false); }
    else if(venueMap){ venueMap.setView([lat,lng],16); placeMarker(lat,lng); }
    setVenueStatus();
    toast('과거 경기장 위치를 불러왔어요');
  } else if(pv.venueUrl){ venuePickUrl=pv.venueUrl; }
}
function pickResult(lat, lng, name){
  lat=Number(lat); lng=Number(lng);
  venuePick={lat:lat, lng:lng};
  if(mapProvider==='kakao' && kakaoMap){ kakaoMap.setCenter(new kakao.maps.LatLng(lat,lng)); kakaoMap.setLevel(3); setKakaoMarker(lat,lng,false); }
  else if(venueMap){ venueMap.setView([lat,lng], 16); placeMarker(lat,lng); }
  var v = document.getElementById('g_venue');
  if(v && !v.value.trim() && name) v.value = name;
  var box = document.getElementById('g_map_results'); if(box) box.innerHTML='';
  setVenueStatus();
}
function saveMatch(id){
  var date = document.getElementById('g_date').value;
  var opp = document.getElementById('g_opp').value.trim();
  if(!date || !opp){ toast('날짜와 상대팀은 필수입니다'); return; }
  var prev = id ? (state.matches.filter(function(x){return x.id===id;})[0]||{}) : {};
  var lat = venuePick ? venuePick.lat : (prev.lat!=null?prev.lat:'');
  var lng = venuePick ? venuePick.lng : (prev.lng!=null?prev.lng:'');
  var url = venuePick ? ('https://www.google.com/maps?q='+venuePick.lat+','+venuePick.lng) : (venuePickUrl || prev.venueUrl || '');
  var data = {
    date: date,
    time: document.getElementById('g_time').value,
    opponent: opp,
    venue: document.getElementById('g_venue').value.trim(),
    lat: lat, lng: lng,
    venueUrl: url,
    useAtt: !!(document.getElementById('g_useAtt')||{checked:true}).checked
  };
  var fn = id ? 'updateMatch' : 'addMatch';
  if(id) data.id = id;
  closeSheet();
  toast(id?'경기를 수정했습니다':'경기를 등록했습니다');
  // 경기 등록/수정은 스쿼드와 무관 — 경기 목록만 갱신 (스쿼드는 스쿼드 탭에서 별도 관리)
  API.run(fn, data).then(function(list){
    state.matches = list;
    state.matchShow = REC_PAGE;   // 목록 상단(최신)부터 다시 표시
    if(state.screen==='squad'||state.screen==='att') render();
  }).catch(function(){ toast('저장 실패 · 새로고침'); });
}
function deleteMatchConfirm(id){
  if(!requireAdmin()) return;
  var m=(state.matches||[]).filter(function(x){return x.id===id;})[0];
  confirmDelete_('이 경기를 삭제할까요?'+(m&&m.opponent?' (vs '+esc(m.opponent)+')':'')+'<br><span style="font-size:12px;color:var(--steel-soft);">관련 스쿼드·기록도 함께 삭제됩니다.</span>', function(){ doDeleteMatch(id); });
}
function doDeleteMatch(id){
  // 낙관적: 목록에서 즉시 제거
  state.matches = state.matches.filter(function(m){return m.id!==id;});
  if(state.squadMatchId===id){ state.squadMatchId = state.matches.length ? state.matches[0].id : null; state.currentSquadId=null; }
  closeSheet(); toast('경기를 삭제했습니다');
  if(state.squadMatchId){ loadMatchSquads(state.squadMatchId); } else { state.matchSquads=[]; state.currentMatch=null; state.squadDetail=null; render(); }
  API.run('deleteMatch', id).then(function(list){ state.matches = list; }).catch(function(){ toast('삭제 저장 실패 · 새로고침'); });
}
/* 빈 경기 = 상대팀·결과·점수가 모두 없는 경기 (잘못 자동 생성된 경기) */
function isEmptyMatch_(m){
  var noOpp = !m.opponent || String(m.opponent).trim()==='';
  var noScore = (m.ourScore==null || m.ourScore==='') && (m.oppScore==null || m.oppScore==='');
  var noResult = !(m.result==='W'||m.result==='D'||m.result==='L');
  return noOpp && noScore && noResult;
}
function emptyMatchCount_(){ return (state.matches||[]).filter(isEmptyMatch_).length; }
function cleanupEmptyMatches_(){
  if(!requireAdmin()) return;
  var empties=(state.matches||[]).filter(isEmptyMatch_);
  if(!empties.length){ toast('정리할 빈 경기가 없어요'); return; }
  appConfirm_('상대팀·결과가 없는 빈 경기 '+empties.length+'건을 삭제할까요?\n(잘못 생성된 경기 정리용 · 관련 기록도 함께 정리)', function(){
    var ids=empties.map(function(m){return m.id;});
    state.matches=(state.matches||[]).filter(function(m){return ids.indexOf(m.id)<0;});   // 낙관적 즉시 제거
    if(ids.indexOf(state.squadMatchId)>-1){ state.squadMatchId = state.matches.length ? state.matches[0].id : null; state.currentSquadId=null; state.matchSquads=[]; state.currentMatch=null; state.squadDetail=null; }
    var chain=Promise.resolve();
    ids.forEach(function(id){ chain=chain.then(function(){ return API.run('deleteMatch', id).then(function(list){ if(list) state.matches=list; }); }); });
    chain.then(function(){
      state.recLoaded=false; state.matchesLoaded=true;
      toast('빈 경기 '+ids.length+'건을 정리했어요');
      render();
    }).catch(function(){ toast('일부 삭제 실패 · 새로고침 후 확인해주세요'); render(); });
  });
}

/* ================= 선수 편성 ================= */
function openMemberPicker(){
  if(!requireAdmin()) return;

  var d = state.squadDetail;
  var assigned = {};
  d.members.forEach(function(x){ assigned[x.playerId] = x.position; });
  var rows = state.players.slice().sort(numSort).map(function(p){
    var cur = assigned[p.id] || '';
    var opts = ['<option value="">미편성</option>'].concat(POS.map(function(ps){
      return '<option value="'+ps[0]+'"'+(cur===ps[0]?' selected':'')+'>'+ps[0]+'</option>';
    })).join('');
    return '<div style="display:flex;align-items:center;gap:11px;padding:9px 2px;border-bottom:1px solid var(--line);">'
      + '<span class="oswald" style="font-weight:700;font-size:19px;width:34px;text-align:center;">'+numLabel(p.num)+'</span>'
      + '<span style="flex:1;font-weight:600;font-size:14.5px;">'+esc(p.name)+'</span>'
      + '<select style="width:104px;padding:9px 10px;border:1.5px solid var(--line-strong);border-radius:10px;font-family:inherit;font-size:14px;" onchange="assignMember(\''+p.id+'\',this.value)">'+opts+'</select>'
      + '</div>';
  }).join('');
  var html = '<div class="grabber"></div>'
   + '<div class="sheet-head"><h3>선수 편성</h3><button class="x" onclick="closeSheet()">✕</button></div>'
   + '<div class="sheet-body"><p style="font-size:12.5px;color:var(--steel);margin:0 0 8px;">각 선수의 포지션을 선택하면 바로 반영됩니다.</p>'
   + rows + '<button class="btn-primary" style="margin-top:14px;" onclick="closeSheet()">완료</button></div>';
  showSheet(html);
}
function assignMember(playerId, pos){
  if(!isAdmin()) return;
  var d = state.squadDetail; if(!d) return;
  // 낙관적: 로컬 즉시 반영
  var p = (state.players||[]).filter(function(x){return x.id===playerId;})[0] || {num:'?',name:''};
  d.members = d.members.filter(function(m){return m.playerId!==playerId;});
  var dd = posDefaultXY(pos, d.members.filter(function(m){return m.position===pos;}).length);
  d.members.push({playerId:playerId, num:p.num, name:p.name, position:pos, x:dd.x, y:dd.y});
  d.members.sort(numSort);
  cacheSquad_(d); render();
  API.run('setSquadMember', state.currentSquadId, playerId, pos).then(function(res){
    cacheSquad_(res); if(res.squad && state.currentSquadId===res.squad.id && state.screen==='form') render();
  }).catch(function(){ toast('편성 저장 실패 · 새로고침'); });
}
function removeMemberConfirm(playerId, name){
  if(!requireAdmin()) return;
  var d = state.squadDetail; if(!d) return;
  d.members = d.members.filter(function(m){return m.playerId!==playerId;});
  cacheSquad_(d); render(); toast(name+' 편성 해제');
  API.run('removeSquadMember', state.currentSquadId, playerId).then(function(res){
    cacheSquad_(res); if(res.squad && state.currentSquadId===res.squad.id && state.screen==='form') render();
  }).catch(function(){ toast('저장 실패 · 새로고침'); });
}

/* ================= 요청사항 / 피드백 ================= */

  if(!requireLogin_()) return;

  var title = phase==='pre' ? '경기 전 요청사항' : '경기 후 피드백';
  var scopeOpts = SCOPES.map(function(s,i){
    return '<div class="size-opt'+(i===0?' sel':'')+'" data-scope="'+s+'" onclick="pickScope(\''+s+'\')">'+s+'</div>';
  }).join('');
  var html = '<div class="grabber"></div>'
   + '<div class="sheet-head"><h3>'+title+'</h3><button class="x" onclick="closeSheet()">✕</button></div>'
   + '<div class="sheet-body">'
   +   '<div class="field"><label>대상</label><div class="sizes" id="n_scopes">'+scopeOpts+'</div></div>'
   +   '<div class="field"><label>내용<span class="req">*</span></label>'
   +     '<textarea id="n_body" rows="4" style="width:100%;padding:12px 13px;border:1.5px solid var(--line-strong);border-radius:12px;font-family:inherit;font-size:15px;resize:vertical;" placeholder="내용을 입력하세요"></textarea></div>'
   +   '<button class="btn-primary" onclick="saveNote(\''+phase+'\')">등록하기</button>'
   + '</div>';
  showSheet(html);
  state.noteScope = '전체';
}
function pickScope(s){
  state.noteScope = s;
  document.querySelectorAll('#n_scopes .size-opt').forEach(function(o){
    o.classList.toggle('sel', o.getAttribute('data-scope')===s);
  });
}
function saveNote(phase){
  var body = document.getElementById('n_body').value.trim();
  if(!body){ toast('내용을 입력하세요'); return; }
  var d = state.squadDetail; if(!d) return;
  var scope = state.noteScope||'전체';
  var tmpId = 'tmp'+Date.now();
  d.notes.push({id:tmpId, phase:phase, scope:scope, body:body, author:(state.auth?state.auth.name:''), authorId:authId()});
  cacheSquad_(d); closeSheet(); render(); toast('등록되었습니다');
  API.run('addNote', state.currentSquadId, phase, scope, body, (state.auth?state.auth.name:''), authId()).then(function(res){
    cacheSquad_(res); if(res.squad && state.currentSquadId===res.squad.id && state.screen==='form') render();
  }).catch(function(){ toast('저장 실패 · 새로고침'); });
}
/* ================= 경기 결과 + 선수 기록 입력 ================= */
function onRecordMatchTap(matchId){
  if(isAdmin()) openResultForm(matchId);
  else openMatchReport(matchId);
}

function openResultForm(matchId){
  if(!requireAdmin()) return;

  var m = state.recMatches.filter(function(x){return x.id===matchId;})[0];
  if(!m) return;
  var stats = {};
  state.recStats.filter(function(s){return s.matchId===matchId;}).forEach(function(s){ stats[s.playerId]={g:s.goals,a:s.assists}; });
  // 현재 출석 상태 로드
  state.formAtt = {};
  (state.recAtt||[]).filter(function(x){return x.matchId===matchId;}).forEach(function(x){ state.formAtt[x.playerId]=x.status||'present'; });
  // 이 경기에 이미 출석 기록이 있으면(엑셀 업로드·기존 입력 등) 기록 없는 인원은 '미정'으로 둔다.
  // 기록이 전혀 없는 신규 경기에서만 편의상 '참석'을 기본값으로 사용.
  var attDefault = (state.recAtt||[]).some(function(x){return x.matchId===matchId;}) ? 'none' : 'present';
  state._attDefault = attDefault;

  var lateMin = (state.cfg.lateThresholdMin != null) ? state.cfg.lateThresholdMin : 0;
  var players = state.players.slice().sort(numSort);
  var statRows = players.map(function(p){
    var st = stats[p.id] || {g:0,a:0};
    var cur = state.formAtt[p.id] || attDefault;
    return '<div class="res-row" data-pid="'+p.id+'">'
      + '<div style="display:flex;align-items:center;gap:8px;">'
      +   '<span class="oswald" style="font-weight:700;font-size:16px;width:26px;text-align:center;">'+numLabel(p.num)+'</span>'
      +   '<span style="flex:1;font-weight:600;font-size:14px;">'+esc(p.name)+'</span>'
      +   '<span style="font-size:11px;color:var(--steel);">골</span>'
      +   '<input id="st_g_'+p.id+'" type="number" inputmode="numeric" min="0" value="'+(st.g||0)+'" style="width:40px;padding:7px 3px;border:1.5px solid var(--line-strong);border-radius:9px;text-align:center;font-family:inherit;font-size:14px;">'
      +   '<span style="font-size:11px;color:var(--steel);">도움</span>'
      +   '<input id="st_a_'+p.id+'" type="number" inputmode="numeric" min="0" value="'+(st.a||0)+'" style="width:40px;padding:7px 3px;border:1.5px solid var(--line-strong);border-radius:9px;text-align:center;font-family:inherit;font-size:14px;">'
      + '</div>'
      + '<div class="att-seg" style="margin-top:6px;">'
      +   attSeg(p.id,'present','참석',cur) + attSeg(p.id,'late','지각',cur) + attSeg(p.id,'absent','불참',cur) + attSeg(p.id,'excused','미참석',cur)
      + '</div></div>';
  }).join('');

  var html = '<div class="grabber"></div>'
   + '<div class="sheet-head"><h3>경기 결과 · '+esc(m.opponent)+'</h3><button class="x" onclick="closeSheet()">✕</button></div>'
   + '<div class="sheet-body">'
   +   '<div class="field"><label>스코어</label>'
   +     '<div style="display:flex;align-items:center;gap:12px;justify-content:center;">'
   +       '<span style="font-weight:700;font-size:13px;">'+esc(ourTeamName_())+'</span>'
   +       '<input id="r_our" type="number" inputmode="numeric" min="0" value="'+(m.ourScore!==undefined&&m.ourScore!==''?m.ourScore:0)+'" style="width:60px;padding:12px;border:1.5px solid var(--line-strong);border-radius:12px;text-align:center;font-family:Oswald;font-weight:700;font-size:22px;">'
   +       '<span style="color:var(--steel-soft);font-weight:700;">:</span>'
   +       '<input id="r_opp" type="number" inputmode="numeric" min="0" value="'+(m.oppScore!==undefined&&m.oppScore!==''?m.oppScore:0)+'" style="width:60px;padding:12px;border:1.5px solid var(--line-strong);border-radius:12px;text-align:center;font-family:Oswald;font-weight:700;font-size:22px;">'
   +       '<span style="font-weight:700;font-size:13px;flex:1;">'+esc(m.opponent)+'</span>'
   +     '</div></div>'
   +   '<div class="field"><label>선수별 득점 · 도움 · 출석</label>'
   +     '<p style="font-size:11px;color:var(--steel-soft);margin:0 0 8px;">지각 기준: 경기 시작 '+lateMin+'분 전</p>'

   +   '<button class="btn-ghost" style="margin-top:8px;" onclick="createMomPoll_(\''+matchId+'\')">🏆 MOM 투표 만들기</button>'
   +   '<p class="hint" style="margin:6px 2px 0;">참석·지각한 선수들을 후보로 익명 MOM 투표를 만들어요. (마감 시 MOM 순위에 자동 반영)</p>'
   + '</div>';
  showSheet(html);
}
/* MOM 투표 생성 — 후보: 이 경기의 참석·지각 선수 (없으면 전체 팀원) */
function createMomPoll_(matchId){
  if(!requireAdmin()) return;
  var m = state.recMatches.filter(function(x){return x.id===matchId;})[0];
  if(!m) return;
  API.run('getPolls').then(function(list){
    var dup=(list||[]).filter(function(p){ return p.kind==='mom' && p.matchId===matchId; })[0];
    if(dup){ toast('이미 이 경기의 MOM 투표가 있어요'); closeSheet(); go('poll'); return; }
    var cand={};
    (state.formAtt ? Object.keys(state.formAtt) : []).forEach(function(pid){ var s=state.formAtt[pid]; if(s==='present'||s==='late') cand[pid]=1; });
    if(!Object.keys(cand).length){
      (state.recAtt||[]).forEach(function(x){ if(x.matchId===matchId && (x.status==='present'||x.status==='late')) cand[x.playerId]=1; });
    }
    var pids=Object.keys(cand);
    if(!pids.length) pids=(state.players||[]).map(function(p){return p.id;});
    pids=pids.filter(function(pid){ return (state.players||[]).some(function(p){return p.id===pid;}); });
    if(pids.length<2){ toast('후보가 2명 이상 필요해요 · 출석을 먼저 저장하세요'); return; }
    var names=pids.map(function(pid){ return pname_(pid).name; });
    var end=new Date(); end.setDate(end.getDate()+1); end.setHours(23,59,0,0);
    var title='MOM · '+String(m.date).slice(5).replace('-','.')+(m.opponent?' vs '+m.opponent:'');
    return API.run('createPoll', {title:title, options:names, optionPids:pids, kind:'mom', matchId:matchId, matchDate:m.date,
      startAt:dtLocal(new Date()), endAt:dtLocal(end), multi:false, anon:true, createdBy:authId(), createdByName:(state.auth?state.auth.name:'')})
      .then(function(l2){ state.polls=l2||state.polls; closeSheet(); toast('MOM 투표를 만들었습니다 · 내일 자정 마감'); go('poll'); });
  }).catch(function(){ toast('MOM 투표 생성에 실패했습니다'); });
}
function attSeg(pid, val, label, cur){
  return '<button class="att-opt '+(cur===val?('on '+val):'')+'" data-pid="'+pid+'" data-val="'+val+'" onclick="pickAtt(\''+pid+'\',\''+val+'\')">'+label+'</button>';
}
function pickAtt(pid, val){
  state.formAtt[pid] = val;
  var row = document.querySelector('.res-row[data-pid="'+pid+'"] .att-seg');
  if(!row) return;
  Array.prototype.forEach.call(row.querySelectorAll('.att-opt'), function(b){
    var on = b.getAttribute('data-val')===val;
    b.className = 'att-opt' + (on ? (' on '+val) : '');
  });
}
function saveResult(matchId){
  var our = parseInt(document.getElementById('r_our').value)||0;
  var opp = parseInt(document.getElementById('r_opp').value)||0;
  var stats = [];
  var att = [];
  state.players.forEach(function(p){
    var g = parseInt(document.getElementById('st_g_'+p.id).value)||0;
    var a = parseInt(document.getElementById('st_a_'+p.id).value)||0;
    if(g>0||a>0) stats.push({playerId:p.id, goals:g, assists:a});
    att.push({playerId:p.id, status:(state.formAtt[p.id]||state._attDefault||'present')});
  });
  var btn=document.querySelector('.btn-primary'); if(btn){btn.textContent='저장 중...';btn.disabled=true;}
  API.run('recordMatchResult', matchId, our, opp).then(function(b){
    state.recMatches=b.matches; state.recStats=b.stats; state.recAtt=b.attendance||state.recAtt;
    return API.run('setMatchStats', matchId, stats);
  }).then(function(b2){
    state.recMatches=b2.matches; state.recStats=b2.stats; state.recAtt=b2.attendance||state.recAtt;
    return API.run('setMatchAttendance', matchId, att);
  }).then(function(b3){
    state.recMatches=b3.matches; state.recStats=b3.stats; state.recAtt=b3.attendance||[];
    closeSheet(); render(); toast('경기 결과를 저장했습니다');
  }).catch(function(){ if(btn){btn.textContent='다시 시도';btn.disabled=false;} toast('저장에 실패했습니다'); });
}

function ahStep_(n, title, desc, svg){
  return '<div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;">'
    + '<div style="flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--red);color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:14px;margin-top:2px;">'+n+'</div>'

/* ================= Toast ================= */
var toastTimer;
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1900);
}

/* ================= 인증 (로그인) ================= */
function activeMembership(){ if(!state.auth||!state.auth.memberships) return null; for(var i=0;i<state.auth.memberships.length;i++){ if(state.auth.memberships[i].clubId===state.activeClubId) return state.auth.memberships[i]; } return null; }
function authId(){ var m=activeMembership(); return m?m.playerId:(state.auth?state.auth.playerId:''); }
function isAdmin(){ var m=activeMembership(); return !!(m && m.role==='임원'); }
function myClubIds(){ return (state.auth&&state.auth.memberships)?state.auth.memberships.map(function(x){return x.clubId;}):[]; }
function canEnterClub(id){ return myClubIds().indexOf(id)>=0; }
function requireAdmin(){ if(!isAdmin()){ toast('임원만 사용할 수 있습니다'); return false; } return true; }
/* 로그인한 팀 구성원(게스트 제외) — 팀원 권한의 기본 단위 */
function isLogged_(){ return !!(state.auth && !isGuest()); }
function requireLogin_(){ if(!isLogged_()){ toast('로그인이 필요합니다'); return false; } return true; }
/* 구단주 여부: 해당 팀을 내 계정으로 등록했는가 (임원과 구분) */
function isClubOwner(cid){
  if(!isLogged_() || !state.auth.ownerId) return false;
  var c=(state.clubs||[]).filter(function(x){return x.id===cid;})[0];
  return !!(c && c.ownerId && c.ownerId===state.auth.ownerId);
}
/* 스쿼드/경기 노트: 임원 또는 작성자 본인만 삭제 */
function canDelNote_(nid){
  if(isAdmin()) return true;
  var d=state.squadDetail;
  var n=d&&d.notes ? d.notes.filter(function(x){return x.id===nid;})[0] : null;
  return !!(n && isLogged_() && n.authorId && n.authorId===authId());
}
/* 투표: 임원 또는 만든 사람 본인만 마감/삭제 */
function canManagePoll_(p){
  if(isAdmin()) return true;
  if(!p || !isLogged_()) return false;
  return !!(p.createdBy && p.createdBy===authId());
}

function saveSession(a){ try{ localStorage.setItem('kj_auth', JSON.stringify(a)); }catch(e){} }
function loadSession(){ try{ var s=localStorage.getItem('kj_auth'); return s?JSON.parse(s):null; }catch(e){ return null; } }
function clearSession(){ try{ localStorage.removeItem('kj_auth'); }catch(e){} }

function isGuest(){ return !!(state.auth && state.auth.type==='guest'); }
function inviteClubId(){
  try{
    var s = (location.search || ''); if(s.charAt(0)==='?') s = s.slice(1);
    var parts = s.split('&');
    for(var i=0;i<parts.length;i++){ var kv=parts[i].split('='); if(kv[0]==='t') return decodeURIComponent(kv[1]||''); }
  }catch(e){}
  return '';
}
function invitePid(){
  try{
    var s = (location.search || ''); if(s.charAt(0)==='?') s = s.slice(1);
    var parts = s.split('&');
    for(var i=0;i<parts.length;i++){ var kv=parts[i].split('='); if(kv[0]==='p') return decodeURIComponent(kv[1]||''); }
  }catch(e){}
  return '';
}
/* 투표 링크 파싱: ?vote=투표ID&c=팀ID */
function voteParams_(){
  try{
    var s=(location.search||''); if(s.charAt(0)==='?') s=s.slice(1);
    var pollId='', clubId=''; s.split('&').forEach(function(kv){ var p=kv.split('='); if(p[0]==='vote') pollId=decodeURIComponent(p[1]||''); if(p[0]==='c') clubId=decodeURIComponent(p[1]||''); });
    return pollId ? {pollId:pollId, clubId:clubId} : null;
  }catch(e){ return null; }
}
/* 투표 링크 대상 저장/복원 — 로그인(특히 카카오 리다이렉트)으로 URL이 사라져도 유지 */
function stashVote_(){ var vp=voteParams_(); if(vp && vp.pollId){ try{ localStorage.setItem('kj_vote', JSON.stringify({p:vp.pollId, c:vp.clubId, ts:Date.now()})); }catch(e){} } }
function pendingVote_(){
  var vp=voteParams_(); if(vp && vp.pollId) return vp;
  try{ var s=localStorage.getItem('kj_vote'); if(s){ var o=JSON.parse(s); if(o && o.p && (Date.now()-(o.ts||0) < 3600000)) return {pollId:o.p, clubId:o.c||''}; } }catch(e){}
  return null;
}
function clearVote_(){ try{ localStorage.removeItem('kj_vote'); }catch(e){} try{ history.replaceState(null,'',location.pathname); }catch(e){} }
/* 초대 링크 대상 저장/복원 — 카카오 로그인 리다이렉트로 ?t=&p= 쿼리가 사라져도 유지 (팀/팀원 초대 연결 보장) */
function stashInvite_(){ var cid=inviteClubId(); if(cid){ try{ localStorage.setItem('kj_invite', JSON.stringify({t:cid, p:invitePid()||'', ts:Date.now()})); }catch(e){} } }
function pendingInvite_(){
  var cid=inviteClubId(); if(cid) return {t:cid, p:invitePid()||''};
  try{ var s=localStorage.getItem('kj_invite'); if(s){ var o=JSON.parse(s); if(o && o.t && (Date.now()-(o.ts||0) < 3600000)) return {t:o.t, p:o.p||''}; } }catch(e){}
  return null;
}
function clearInvite_(){ try{ localStorage.removeItem('kj_invite'); }catch(e){} }
/* 카카오 공유 카드 이미지: 팀 엠블럼(공개 URL만) → 없으면 앱 로고. 카카오는 data-URI 불가 */
function pollCardImage_(){
  // 카카오 공유 카드 썸네일 = 로그인 화면의 앱 로고(동축 크레스트, logo.png)
  // (팀 엠블럼은 data URL이라 카카오가 못 읽어 항상 앱 로고 사용)
  return location.origin + location.pathname.replace(/[^\/]*$/, '') + 'logo.png';
}
/* 투표 공유용 URL / 카카오톡 SDK / 공유 */
function pollShareUrl_(pollId){
  return location.origin + location.pathname + '?vote=' + encodeURIComponent(pollId) + '&c=' + encodeURIComponent(state.activeClubId||'');
}
var kakaoShareTried=false;
function ensureKakaoShare_(cb){
  if(window.Kakao && Kakao.Share){ try{ if(!Kakao.isInitialized()) Kakao.init(KAKAO_JS_KEY); }catch(e){} cb(!!(window.Kakao&&Kakao.Share)); return; }
  if(!KAKAO_JS_KEY){ cb(false); return; }
  var fin=function(){ try{ if(window.Kakao && !Kakao.isInitialized()) Kakao.init(KAKAO_JS_KEY); }catch(e){} cb(!!(window.Kakao&&Kakao.Share)); };
  var s=document.createElement('script'); s.src='https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js';
  s.onload=fin; s.onerror=function(){ cb(false); };
  document.head.appendChild(s);
  setTimeout(fin, 4000);
}
function sharePollLink_(pollId){
  var url=pollShareUrl_(pollId), title=state.currentPollTitle||'투표';
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){ toast('투표 링크가 복사되었습니다 · 단톡방에 붙여넣기'); }).catch(function(){ fallbackCopy_(url); });
  } else { fallbackCopy_(url); }
}
function sharePollKakao_(pollId){
  var url=pollShareUrl_(pollId), title=state.currentPollTitle||'투표';
  ensureKakaoShare_(function(ok){
    if(!ok || !window.Kakao || !Kakao.Share){ toast('카카오 공유를 쓸 수 없어 링크를 복사했어요'); sharePollLink_(pollId); return; }
    try{
      Kakao.Share.sendDefault({
        objectType:'feed',
        content:{ title:'🗳️ '+title, description:ourTeamName_()+' 투표에 참여해 주세요!', imageUrl:pollCardImage_(), link:{ mobileWebUrl:url, webUrl:url } },
        buttons:[{ title:'투표하러 가기', link:{ mobileWebUrl:url, webUrl:url } }]
      });
    }catch(e){ toast('카카오 공유 실패 · 링크를 복사했어요'); sharePollLink_(pollId); }
  });
}

/* 선택된 팀원의 비밀번호 설정 여부에 따라 로그인 ↔ 첫 비밀번호 설정 모드 전환 */
function authBtnBusy_(b){ var btn=document.querySelector('.auth-btn'); if(btn){ btn.disabled=b; btn.textContent = b ? '확인 중...' : btn.textContent; } }
function finishAuth_(r){
  if(!r || !r.ok){ authBtnBusy_(false); toast((r&&r.error)||'실패했습니다'); return; }
  state.auth = { type:r.type, name:r.name, ownerId:r.ownerId||null, provider:r.provider||'app', memberships:r.memberships||[], token:r.token };
  saveSession(state.auth);
  // 카카오 로그인은 리다이렉트로 URL의 ?t=&p=가 사라지므로 stash(pendingInvite_)로 초대 대상 복원
  if(pendingInvite_() && !isGuest()){ processInvite_(); } else { afterLogin_(); }
}
/* 초대 링크 합류: 로그인 직후 팀에 즉시 연결 (t=팀초대→새 팀원 / t+p=팀원초대→해당 명단에 연결) */
function processInvite_(){
  var inv = pendingInvite_() || {};
  var cid = inv.t || '';
  var pid = inv.p || '';
  var accId = state.auth && state.auth.ownerId;
  if(!cid || !accId){ clearInvite_(); afterLogin_(); return; }
  API.run('joinClub', cid, accId, state.auth.name, pid).then(function(r){
    clearInvite_();
    try{ history.replaceState(null,'',location.pathname); }catch(e){}
    if(r && r.ok){
      state.auth.memberships = r.memberships || state.auth.memberships;
      state.auth.lastClub = cid;
      saveSession(state.auth);
      toast(r.already ? '이미 소속된 팀이에요 · '+r.clubName : r.clubName+' 팀에 합류했어요!');
    } else if(r && r.linkUsed){
      toast('이미 사용이 완료된 링크입니다');
    } else {
      toast((r&&r.error)||'팀 합류에 실패했어요');
    }
    afterLogin_();
  }).catch(function(){ clearInvite_(); try{ history.replaceState(null,'',location.pathname); }catch(e){} afterLogin_(); });
}

function kakaoBackendBase_(){ return (KAKAO_BACKEND||'').replace(/\/+$/, ''); }
function doKakaoAuth(){
  var base = kakaoBackendBase_();
  if(!base){ toast('카카오 로그인 준비 중입니다 (백엔드 URL 설정 필요)'); return; }
  authBtnBusy_(true);
  // 백엔드가 카카오 OAuth로 리다이렉트 → 콜백 후 앱으로 #ks=... 붙여 복귀
  location.href = base + '/api/kakao/login';
}
/* 카카오 로그인 복귀 처리: 백엔드가 앱 URL 해시에 실어준 서명 티켓(ks)을 백엔드에 되물어 프로필 획득 */
function handleKakaoReturn_(){
  var h = location.hash || '';
  var m = h.match(/[#&]ks=([^&]+)/);
  if(!m) return false;
  var ks = decodeURIComponent(m[1]);
  try{ history.replaceState(null, '', location.pathname + location.search); }catch(e){ location.hash=''; }
  var base = kakaoBackendBase_();
  toast('카카오 로그인 확인 중...');
  fetch(base + '/api/kakao/session', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ks:ks})
  }).then(function(r){ return r.json(); }).then(function(res){
    try{ console.log('kakao session 응답:', res); }catch(e){}
    if(!res || !res.ok){ toast('카카오 인증 실패: '+((res&&res.error)||'세션 확인 불가')); applyAppHeader(); showLogin(); hideSplash_(); return; }
    if(!res.kakaoId){ toast('카카오 프로필(kakaoId)을 받지 못했어요'); applyAppHeader(); showLogin(); hideSplash_(); return; }
    return API.run('ownerKakao', String(res.kakaoId), res.name||'카카오사용자').then(function(r){
      try{ console.log('ownerKakao 결과:', r); }catch(e){}
      if(r && r.ok){ toast(r.name+'님 환영합니다'); finishAuth_(r); hideSplash_(); }
      else { toast('로그인 처리 실패: '+((r&&r.error)||'알 수 없음')); applyAppHeader(); showLogin(); hideSplash_(); }
    });
  }).catch(function(e){ try{ console.error('kakao return 오류:', e); }catch(_){} toast('카카오 로그인 오류: '+((e&&e.message)||'네트워크')); applyAppHeader(); showLogin(); hideSplash_(); });
  return true;
}

/* ================= Firestore 데이터 계층 =================
 * 설계: 앱 시작 시 Firestore → 메모리(DB) 1회 로드.
 *   읽기 = 메모리에서 즉시(기존 mockHandler 재사용) → 매우 빠름
 *   쓰기 = 메모리 반영 + Firestore에 백그라운드 미러링(변경분만)
 *   비밀번호 = SHA-256 해시로 Firestore에 저장(평문 저장 안 함)
 */
var FS = { enabled:false, loadFailed:false };
FS.ready = new Promise(function(res){ FS._resolve = res; });
/* 저장 권한 프로브: 로드 완료 후 소량 쓰기를 시도해 문제를 즉시 노출
 * (쓰기 절약을 위해 기기당 하루 1회만 수행) */
function fsWriteProbe_(){
  if(!window.db || !FS.enabled) return;
  try{
    var today = new Date().toISOString().slice(0,10);
    try{ if(localStorage.getItem('kt_probe') === today) return; localStorage.setItem('kt_probe', today); }catch(e){}
    db.collection('config').doc('app').set({probeAt:new Date().toISOString()}, {merge:true})
      .catch(function(e){

function fsHash(pw){

    return 'v1:'+hex;
  });
}

function fsLoadMatchKids(cid, period){
  if(!cid) return Promise.resolve();
  var prev = FS._kidsQ[cid] || Promise.resolve();
  var next = prev.then(function(){ return fsLoadTeam(cid); }).then(function(){
    var loaded = FS._kidMids[cid] || (FS._kidMids[cid]={});
    // period 지정 시 그 시즌(YYYY 또는 YYYY-MM) 경기만, 없거나 '전체'면 전 경기
    var want=(DB.matches||[]).filter(function(m){
      if(m.clubId!==cid) return false;
      if(period && period!=='전체') return m.date && m.date.indexOf(period)===0;
      return true;
    }).map(function(m){return m.id;});
    var need=want.filter(function(id){ return !loaded[id]; });   // 아직 안 실린 것만
    if(!need.length) return;
    return Promise.all([ fsIn('playerStats','matchId',need), fsIn('attendance','matchId',need), fsIn('matchRoster','matchId',need) ])
      .then(function(r){ fsMerge('stats',r[0]); fsMerge('attendance',r[1]); fsMerge('matchRoster',r[2]); need.forEach(function(id){ loaded[id]=1; }); });
  });
  FS._kidsQ[cid] = next.catch(function(){});   // 오류가 나도 큐가 막히지 않게
  return next;

    return Promise.all([ fsIn('playerStats','matchId',need), fsIn('attendance','matchId',need), fsIn('matchRoster','matchId',need) ])
      .then(function(r){ fsMerge('stats',r[0]); fsMerge('attendance',r[1]); fsMerge('matchRoster',r[2]); need.forEach(function(id){ loaded[id]=1; }); });

FS.run = function(fn, args){
  return FS.ready.then(function(){
    /* ── 필요한 범위만 선로딩 ── */
    var accId = (state.auth&&state.auth.ownerId)||null;
    var cid = window.ACTIVE_CLUB || state.activeClubId || null;
    var pre = Promise.resolve();
    if(fn==='ownerKakao'){ pre = fsQ('owners','kakaoId',String(args[0])).then(function(r){ fsMerge('owners',r); }); }
    else if(fn==='ownerLogin'||fn==='ownerSignup'){ pre = fsQ('owners','ownerId',String(args[0]||'').trim()).then(function(r){ fsMerge('owners',r); }); }
    else if(fn==='myMemberships'||fn==='myPendingJoins'){ pre = fsLoadMy(args[0]||accId); }
    else if(fn==='joinClub'){ pre = Promise.all([fsLoadTeam(args[0]), fsLoadMy(args[1])]); }
    else if(fn==='requestJoin'||fn==='cancelJoin'){ pre = Promise.all([fsLoadMy(args[1]||accId), fsLoadTeam(args[0])]); }
    else if(fn==='getJoinRequests'){ pre = fsQ2('joinRequests','clubId',args[0],'status','pending').then(function(r){ fsMerge('joins',r); return fsLoadTeam(args[0]); }); }
    else if(fn==='decideJoin'){ pre = db.collection('joinRequests').doc(String(args[0])).get().then(function(d){ if(d&&d.exists) fsMerge('joins',[d.data()]); var jr=(DB.joins||[]).filter(function(j){return j.id===args[0];})[0]; return jr?fsLoadTeam(jr.clubId):null; }).catch(function(){}); }
    else if(fn==='getAttBundle'){ pre = fsLoadKidsForMatches_(cid, args[0]?[args[0]]:[]); }
    else if(fn==='getRecordBundle'){ pre = fsLoadMatchKids(cid, args[0]); }
    else if(fn==='getMatchReport'){ pre = fsLoadKidsForMatches_(cid, [args[0]]); }
    else if(fn==='getPolls'||fn==='getPollDetail'||fn==='getMomList'){ pre = fsLoadPollKids(cid); }
    else if(fn==='getPlayerCareer'){ pre = Promise.all([fsLoadMatchKids(cid,'전체'), fsLoadPollKids(cid)]); }
    else if(fn==='getSquadDetail'){ pre = fsLoadSquadKids(args[0]); }
    else if(cid){ pre = fsLoadTeam(cid); var t=WRITE_TOUCH[fn]||[];
      if(t.indexOf('stats')>-1||t.indexOf('attendance')>-1||t.indexOf('matchRoster')>-1){
        var mi = MATCH_ARG[fn];
        if(mi!=null && args[mi]) pre=pre.then(function(){ return fsLoadKidsForMatches_(cid, [args[mi]]); });
        else pre=pre.then(function(){ return fsLoadMatchKids(cid); });
      }
      if(t.indexOf('votes')>-1) pre=pre.then(function(){return fsLoadPollKids(cid);});
      if((t.indexOf('members')>-1||t.indexOf('notes')>-1) && state.currentSquadId) pre=pre.then(function(){return fsLoadSquadKids(state.currentSquadId);});
    }
    return pre.then(function(){ return FS._dispatch(fn, args); });
  });
};
FS._dispatch = function(fn, args){
    if(fn==='ownerSignup') return fsOwnerSignup(args[0], args[1], args[2]);
    if(fn==='ownerLogin') return fsOwnerLogin(args[0], args[1]);
    if(fn==='ownerKakao') return fsOwnerKakao(args[0], args[1]);
    if(fn==='changePw') return fsChangePw(args[0], args[1], args[2]);
    if(fn==='resetOwnerPw') return fsResetOwnerPw(args[0], args[1], args[2]);
    if(fn==='setConfig'){ var rc=mockHandler(fn, args); fsSyncConfig(); return rc; }
    var touched=WRITE_TOUCH[fn];
    if(touched){
      var before=fsSnapshot(touched);
      var res=mockHandler(fn, args);
      touched.forEach(function(k){ fsSyncDiff(k, before[k]); });
      return res;
    }
    return mockHandler(fn, args);   // 읽기 (메모리 즉시)
};

/* ── 최신 버전 확인 & 자동 업데이트 ──
   접속(링크/앱 실행) 시 version.json을 캐시 없이 확인해, 현재 버전보다 새 버전이면
   캐시를 비우고 1회 자동 새로고침(루프 방지). 최신이면 아무 것도 안 함. */
function verNum_(v){ var p=String(v||'').split('.'); return (parseInt(p[0],10)||0)*100000+(parseInt(p[1],10)||0)*100+(parseInt(p[2],10)||0); }
function checkForUpdate_(){
  try{
    fetch('version.json?_='+Date.now(), {cache:'no-store'})
      .then(function(r){ return r && r.ok ? r.json() : null; })
      .then(function(j){
        if(!j || !j.version) return;
        if(verNum_(j.version) > verNum_(APP_VERSION)){
          try{ if(sessionStorage.getItem('kt_upd')===String(j.version)) return; sessionStorage.setItem('kt_upd', String(j.version)); }catch(e){}
          var go=function(){ try{ location.reload(); }catch(e){} };
          try{ if(navigator.serviceWorker && navigator.serviceWorker.controller) navigator.serviceWorker.controller.postMessage('CLEAR_CACHE'); }catch(e){}
          if(window.caches){ caches.keys().then(function(ks){ return Promise.all(ks.map(function(k){ return caches.delete(k); })); }).then(go, go); }
          else go();
        }
      }).catch(function(){});
  }catch(e){}
}

/* 모바일 당겨서 새로고침 (기본 브라우저 PTR은 고정 레이아웃 때문에 동작 안 함 → 직접 구현) */
var _ptrInit=false;
function initPTR_(){
  if(_ptrInit) return; _ptrInit=true;
  var content=document.getElementById('content'), phone=document.querySelector('.phone');
  if(!content || !phone) return;
  var ind=document.createElement('div'); ind.className='ptr-ind'; ind.innerHTML='<div class="ptr-spin2"></div>';
  phone.appendChild(ind);
  var THRESH=66, MAX=96, startY=0, pulling=false, dist=0, active=false;
  function place(){ var ct=content.getBoundingClientRect().top - phone.getBoundingClientRect().top; ind.style.top=(ct+6)+'px'; }
  function reset(anim){
    ind.classList.remove('ready');
    ind.style.transition = anim ? 'transform .2s ease, opacity .2s ease' : '';
    ind.style.transform='translateY(-6px)'; ind.style.opacity='0';
    if(anim) setTimeout(function(){ ind.style.transition=''; }, 220);
  }
  content.addEventListener('touchstart', function(e){
    if(e.touches.length!==1){ pulling=false; return; }
    // 시트/모달 열려있으면 PTR 비활성
    var sheetOpen=document.getElementById('sheetWrap').classList.contains('open');
    var cfmOpen=document.getElementById('cfmWrap').classList.contains('open');
    if(content.scrollTop<=0 && !sheetOpen && !cfmOpen){ startY=e.touches[0].clientY; pulling=true; dist=0; place(); ind.style.transition=''; }
    else pulling=false;
  }, {passive:true});
  content.addEventListener('touchmove', function(e){
    if(!pulling) return;
    var dy=e.touches[0].clientY - startY;
    if(dy<=0 || content.scrollTop>0){ dist=0; ind.style.opacity='0'; ind.style.transform='translateY(-6px)'; return; }
    dist=Math.min(dy*0.5, MAX);
    ind.style.opacity=String(Math.min(dist/THRESH,1));
    ind.style.transform='translateY('+dist+'px)';
    ind.querySelector('.ptr-spin2').style.transform='rotate('+Math.round(dist*3.2)+'deg)';
    if(dist>=THRESH) ind.classList.add('ready'); else ind.classList.remove('ready');
  }, {passive:true});
  content.addEventListener('touchend', function(){
    if(!pulling) return; pulling=false;
    if(dist>=THRESH && !active){
      active=true;
      ind.classList.add('spinning');
      ind.style.transition='transform .18s ease';
      ind.style.transform='translateY('+THRESH+'px)'; ind.style.opacity='1';
      setTimeout(function(){ try{ location.reload(); }catch(e){ reset(true); active=false; } }, 300);
    } else { reset(true); }
  }, {passive:true});
}

  var ids = myClubIds();
  var last = state.auth && state.auth.lastClub;
  var lastScreen = state.auth && state.auth.lastScreen;   // 새로고침 시 마지막 화면 복원
  if(last && canEnterClub(last)){ enterClub(last, lastScreen); }
  else if(ids.length===1){ enterClub(ids[0], lastScreen); }
  else { state.activeClubId=null; ACTIVE_CLUB=null; state.screen='club'; applyAppHeader(); render(); }
}
function enterClub(clubId, restoreScreen, openPollId){
  if(isGuest()){ toast('게스트는 팀에 입장할 수 없어요. 로그인 후 이용하세요.'); return; }
  if(!canEnterClub(clubId)){ toast('가입되지 않은 팀입니다'); return; }
  state.activeClubId = clubId; ACTIVE_CLUB = clubId; window.ACTIVE_CLUB = clubId;
  state.auth.lastClub = clubId; saveSession(state.auth);
  // 팀 전환 시 팀별 데이터 캐시 초기화
  state.players=[]; state.matches=[]; state.matchesLoaded=false;
  state.squadLoaded=false; state.recLoaded=false; state.pollLoaded=false; state.boardLoaded=false;
  state.attLoaded=false; state.attData=null; state.checkedIn=false;
  SQUAD_CACHE={}; state.squadDetail=null; state.matchSquads=[]; state.currentMatch=null; state.currentSquadId=null; state.clubJoinReqs=null;
  applyClubHeader();
  state.screen='team';
  state._backStack=['club'];   // 팀 입장 후 뒤로가기 = 팀 목록으로
  // 새로고침 복원: 팀 데이터 로드 후 마지막 화면으로 이동 (수동 팀 전환 시엔 restoreScreen 없음 → 팀원 화면)
  var validRestore = {team:1,squad:1,form:1,record:1,att:1,more:1,board:1,poll:1,venue:1,club:1};
  state._pendingScreen = (restoreScreen && validRestore[restoreScreen] && restoreScreen!=='team') ? restoreScreen : null;
  state._pendingPoll = openPollId || null;   // 투표 링크 진입 시 열 투표
  API.run('bootstrap');  // no-op warmup
  loadClubData_();
}
function loadClubData_(){
  state.loading=true; render();
  Promise.all([API.run('getPlayers'), API.run('getMatches')]).then(function(r){
    state.players=r[0]||[]; state.matches=r[1]||[]; state.matchesLoaded=true; state.loading=false;
    var pp=state._pendingPoll; state._pendingPoll=null;
    if(pp){ state.screen='poll'; if(state.auth) state.auth.lastScreen='poll'; go('poll'); openPollDetail(pp); return; }   // 투표 링크 진입
    var ps=state._pendingScreen; state._pendingScreen=null;
    if(ps){ go(ps); return; }   // 마지막 화면으로 복원 (탭별 지연 로드 포함)
    if(state.screen==='team') render();
  }).catch(function(){ state.loading=false; render(); });
}
</script>
</body>
</html>
