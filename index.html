function onRecordMatchTap(matchId){
  if(isAdmin()) openResultForm(matchId);
  else openMatchReport(matchId);
}

function openResultForm(matchId){
  if(!requireAdmin()) return;

  var m = state.recMatches.filter(function(x){return x.id===matchId;})[0];
  if(!m) return;
  var stats = {};
  state.recStats.filter(function(s){return s.matchId===matchId;}).forEach(function(s){ stats[s.playerId]={g:s.goals,a:s.assists}; });
  // 현재 출석 상태 로드
  state.formAtt = {};
  (state.recAtt||[]).filter(function(x){return x.matchId===matchId;}).forEach(function(x){ state.formAtt[x.playerId]=x.status||'present'; });

  var lateMin = (state.cfg.lateThresholdMin != null) ? state.cfg.lateThresholdMin : 0;
  var players = state.players.slice().sort(numSort);
  var statRows = players.map(function(p){
    var st = stats[p.id] || {g:0,a:0};
    var cur = state.formAtt[p.id] || 'present';
    return '<div class="res-row" data-pid="'+p.id+'">'
      + '<div style="display:flex;align-items:center;gap:8px;">'
      +   '<span class="oswald" style="font-weight:700;font-size:16px;width:26px;text-align:center;">'+numLabel(p.num)+'</span>'
      +   '<span style="flex:1;font-weight:600;font-size:14px;">'+p.name+'</span>'
      +   '<span style="font-size:11px;color:var(--steel);">골</span>'
      +   '<input id="st_g_'+p.id+'" type="number" inputmode="numeric" min="0" value="'+(st.g||0)+'" style="width:40px;padding:7px 3px;border:1.5px solid var(--line-strong);border-radius:9px;text-align:center;font-family:inherit;font-size:14px;">'
      +   '<span style="font-size:11px;color:var(--steel);">도움</span>'
      +   '<input id="st_a_'+p.id+'" type="number" inputmode="numeric" min="0" value="'+(st.a||0)+'" style="width:40px;padding:7px 3px;border:1.5px solid var(--line-strong);border-radius:9px;text-align:center;font-family:inherit;font-size:14px;">'
      + '</div>'
      + '<div class="att-seg" style="margin-top:6px;">'
      +   attSeg(p.id,'present','참석',cur) + attSeg(p.id,'late','지각',cur) + attSeg(p.id,'absent','불참',cur)
      + '</div></div>';
  }).join('');

  var html = '<div class="grabber"></div>'
   + '<div class="sheet-head"><h3>경기 결과 · '+esc(m.opponent)+'</h3><button class="x" onclick="closeSheet()">✕</button></div>'
   + '<div class="sheet-body">'
   +   '<div class="field"><label>스코어</label>'
   +     '<div style="display:flex;align-items:center;gap:12px;justify-content:center;">'
   +       '<span style="font-weight:700;font-size:13px;">'+esc(ourTeamName_())+'</span>'
   +       '<input id="r_our" type="number" inputmode="numeric" min="0" value="'+(m.ourScore!==undefined&&m.ourScore!==''?m.ourScore:0)+'" style="width:60px;padding:12px;border:1.5px solid var(--line-strong);border-radius:12px;text-align:center;font-family:Oswald;font-weight:700;font-size:22px;">'
   +       '<span style="color:var(--steel-soft);font-weight:700;">:</span>'
   +       '<input id="r_opp" type="number" inputmode="numeric" min="0" value="'+(m.oppScore!==undefined&&m.oppScore!==''?m.oppScore:0)+'" style="width:60px;padding:12px;border:1.5px solid var(--line-strong);border-radius:12px;text-align:center;font-family:Oswald;font-weight:700;font-size:22px;">'
   +       '<span style="font-weight:700;font-size:13px;flex:1;">'+esc(m.opponent)+'</span>'
   +     '</div></div>'
   +   '<div class="field"><label>선수별 득점 · 도움 · 출석</label>'
   +     '<p style="font-size:11px;color:var(--steel-soft);margin:0 0 8px;">지각 기준: 경기 시작 '+lateMin+'분 전</p>'
   +     '<div>'+statRows+'</div></div>'
   +   '<button class="btn-primary" onclick="saveResult(\''+matchId+'\')">저장하기</button>'
   + '</div>';
  showSheet(html);
}
function attSeg(pid, val, label, cur){
  return '<button class="att-opt '+(cur===val?('on '+val):'')+'" data-pid="'+pid+'" data-val="'+val+'" onclick="pickAtt(\''+pid+'\',\''+val+'\')">'+label+'</button>';
}
function pickAtt(pid, val){
  state.formAtt[pid] = val;
  var row = document.querySelector('.res-row[data-pid="'+pid+'"] .att-seg');
  if(!row) return;
  Array.prototype.forEach.call(row.querySelectorAll('.att-opt'), function(b){
    var on = b.getAttribute('data-val')===val;
    b.className = 'att-opt' + (on ? (' on '+val) : '');
  });
}
function saveResult(matchId){
  var our = parseInt(document.getElementById('r_our').value)||0;
  var opp = parseInt(document.getElementById('r_opp').value)||0;
  var stats = [];
  var att = [];
  state.players.forEach(function(p){
    var g = parseInt(document.getElementById('st_g_'+p.id).value)||0;
    var a = parseInt(document.getElementById('st_a_'+p.id).value)||0;
    if(g>0||a>0) stats.push({playerId:p.id, goals:g, assists:a});
    att.push({playerId:p.id, status:(state.formAtt[p.id]||'present')});
  });
  var btn=document.querySelector('.btn-primary'); if(btn){btn.textContent='저장 중...';btn.disabled=true;}
  API.run('recordMatchResult', matchId, our, opp).then(function(b){
    state.recMatches=b.matches; state.recStats=b.stats; state.recAtt=b.attendance||state.recAtt;
    return API.run('setMatchStats', matchId, stats);
  }).then(function(b2){
    state.recMatches=b2.matches; state.recStats=b2.stats; state.recAtt=b2.attendance||state.recAtt;
    return API.run('setMatchAttendance', matchId, att);
  }).then(function(b3){
    state.recMatches=b3.matches; state.recStats=b3.stats; state.recAtt=b3.attendance||[];
    closeSheet(); render(); toast('경기 결과를 저장했습니다');
  }).catch(function(){ if(btn){btn.textContent='다시 시도';btn.disabled=false;} toast('저장에 실패했습니다'); });
}

function showSheet(html){
  document.getElementById('sheet').innerHTML = html;
  document.getElementById('sheetWrap').classList.add('open');
}

/* ================= Toast ================= */
var toastTimer;
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1900);
}

/* ================= 인증 (로그인) ================= */
function activeMembership(){ if(!state.auth||!state.auth.memberships) return null; for(var i=0;i<state.auth.memberships.length;i++){ if(state.auth.memberships[i].clubId===state.activeClubId) return state.auth.memberships[i]; } return null; }
function authId(){ var m=activeMembership(); return m?m.playerId:(state.auth?state.auth.playerId:''); }
function isAdmin(){ var m=activeMembership(); return !!(m && m.role==='임원'); }
function myClubIds(){ return (state.auth&&state.auth.memberships)?state.auth.memberships.map(function(x){return x.clubId;}):[]; }
function canEnterClub(id){ return myClubIds().indexOf(id)>=0; }
function requireAdmin(){ if(!isAdmin()){ toast('임원만 사용할 수 있습니다'); return false; } return true; }

function saveSession(a){ try{ localStorage.setItem('kj_auth', JSON.stringify(a)); }catch(e){} }
function loadSession(){ try{ var s=localStorage.getItem('kj_auth'); return s?JSON.parse(s):null; }catch(e){ return null; } }
function clearSession(){ try{ localStorage.removeItem('kj_auth'); }catch(e){} }

function isGuest(){ return !!(state.auth && state.auth.type==='guest'); }
function inviteClubId(){
  try{
    var s = (location.search || ''); if(s.charAt(0)==='?') s = s.slice(1);
    var parts = s.split('&');
    for(var i=0;i<parts.length;i++){ var kv=parts[i].split('='); if(kv[0]==='t') return decodeURIComponent(kv[1]||''); }
  }catch(e){}
  return '';
}
function invitePid(){
  try{
    var s = (location.search || ''); if(s.charAt(0)==='?') s = s.slice(1);
    var parts = s.split('&');
    for(var i=0;i<parts.length;i++){ var kv=parts[i].split('='); if(kv[0]==='p') return decodeURIComponent(kv[1]||''); }
  }catch(e){}
  return '';
}

function gotoAuth(v){ state.loginView=v; renderAuth(); }
function doResetPw(){
  var email=(gv_('fp_id')||'').trim();
  if(!email){ toast('가입한 이메일을 입력하세요'); return; }
  authBtnBusy_(true);
  emailReset_(email).then(function(r){
    authBtnBusy_(false);
    if(r&&r.ok){ toast('재설정 메일을 보냈어요. 메일함을 확인해주세요'); gotoAuth('owner'); }
    else { toast((r&&r.error)||'메일 발송에 실패했어요'); }
  }).catch(function(){ authBtnBusy_(false); toast('메일 발송에 실패했어요'); });
}
function gv_(id){ var e=document.getElementById(id); return e?e.value:''; }
/* 선택된 팀원의 비밀번호 설정 여부에 따라 로그인 ↔ 첫 비밀번호 설정 모드 전환 */
function authBtnBusy_(b){ var btn=document.querySelector('.auth-btn'); if(btn){ btn.disabled=b; btn.textContent = b ? '확인 중...' : btn.textContent; } }
function finishAuth_(r){

/* ================= Firestore 데이터 계층 =================
 * 설계: 앱 시작 시 Firestore → 메모리(DB) 1회 로드.
 *   읽기 = 메모리에서 즉시(기존 mockHandler 재사용) → 매우 빠름
 *   쓰기 = 메모리 반영 + Firestore에 백그라운드 미러링(변경분만)
 *   비밀번호 = SHA-256 해시로 Firestore에 저장(평문 저장 안 함)
 */
var FS = { enabled:false, loadFailed:false };
FS.ready = new Promise(function(res){ FS._resolve = res; });

var FS_MAP = {
  players:    {coll:'members',      id:function(x){return x.id;}},

  addMatch:['matches'], updateMatch:['matches'], deleteMatch:['matches','squads','members','notes'], recordMatchResult:['matches'],
  createSquad:['squads'], deleteSquad:['squads','members','notes'], renameSquad:['squads'],
  setSquadMember:['members'], setSquadMemberPos:['members'], removeSquadMember:['members'],
  applyVotersToSquad:['members'], loadAllToSquad:['members'], setSquadPos:['members'], addGuest:['members'],

function fsClean(x){ var c={}; for(var k in x){ if(k==='pw'||k==='pwHash'||k==='_row') continue; c[k]=x[k]; } return c; }
function fsSnapshot(keys){
  var s={}; keys.forEach(function(k){ var mm={}; (DB[k]||[]).forEach(function(x){ mm[FS_MAP[k].id(x)]=JSON.parse(JSON.stringify(x)); }); s[k]=mm; });
  return s;
}
function fsSyncDiff(k, beforeMap){
  var m=FS_MAP[k]; var after={}; (DB[k]||[]).forEach(function(x){ after[m.id(x)]=x; });
  var batch=db.batch(); var n=0;
  Object.keys(after).forEach(function(idv){
    var cur=after[idv], prev=beforeMap[idv];
    if(!prev || JSON.stringify(prev)!==JSON.stringify(cur)){ batch.set(db.collection(m.coll).doc(String(idv)), fsClean(cur), {merge:true}); n++; }
  });
  Object.keys(beforeMap).forEach(function(idv){ if(!after[idv]){ batch.delete(db.collection(m.coll).doc(String(idv))); n++; } });
  if(n) batch.commit().catch(function(e){ if(window.console)console.warn('fs sync '+k, e); toast('저장 동기화 실패 · 새로고침'); });
}
function fsSyncConfig(){
  var c={}; for(var k in DB.config){ if(k==='staffPw'||k==='memberPw') continue; c[k]=DB.config[k]; }
  db.collection('config').doc('app').set(c,{merge:true}).catch(function(e){ if(window.console)console.warn('cfg sync',e); });
}

/* 해시 (Apps Script와 동일한 salt로 → 비밀번호 호환) */
function fsHash(pw){
  var enc=new TextEncoder().encode('FCJEMIRO#v1#'+String(pw));
  return crypto.subtle.digest('SHA-256', enc).then(function(buf){
    var hex=Array.prototype.map.call(new Uint8Array(buf), function(b){ return ('0'+b.toString(16)).slice(-2); }).join('');
    return 'v1:'+hex;
  });
}
/* ===== Firebase 이메일 인증 계정 ===== */

  if(c==='auth/weak-password') return '비밀번호는 6자 이상이어야 합니다';
  if(c==='auth/user-not-found'||c==='auth/wrong-password'||c==='auth/invalid-credential') return '이메일 또는 비밀번호가 올바르지 않습니다';
  if(c==='auth/too-many-requests') return '시도가 많습니다. 잠시 후 다시 시도하세요';
  if(c==='auth/network-request-failed') return '네트워크 오류입니다';

/* 이메일 계정 정보를 owners에 얇게 저장 (uid 식별자) */

  var doc={id:o.id, ownerId:o.ownerId, name:o.name, email:o.email, provider:o.provider, createdAt:o.createdAt};
  if(window.db){ try{ db.collection('owners').doc(uid).set(doc, {merge:true}); }catch(e){} }

    var p1=(u.updateProfile?u.updateProfile({displayName:nm}):Promise.resolve()).catch(function(){});
    var p2=(u.sendEmailVerification?u.sendEmailVerification():Promise.resolve()).catch(function(){});

function fsOwnerSignup(oid, pw, nm){
  oid=String(oid||'').trim(); pw=String(pw||''); nm=String(nm||'').trim();
  if(!oid||!pw||!nm) return Promise.resolve({ok:false, error:'모든 항목을 입력하세요'});
  if(pw.length<4) return Promise.resolve({ok:false, error:'비밀번호는 4자 이상이어야 합니다'});

  return fsHash(pw).then(function(h){
    var od={id:id, ownerId:oid, name:nm, pwHash:h, provider:'app', createdAt:new Date().toISOString()};
    DB.owners.push(od);
    return db.collection('owners').doc(id).set(od, {merge:true}).then(function(){
      return {ok:true, type:'owner', ownerId:id, name:nm, provider:'app', memberships:ownerMemberships_(id), token:'fs.own.'+id};
    });
  });
}
function fsOwnerLogin(oid, pw){
  oid=String(oid||'').trim();
  var o=(DB.owners||[]).filter(function(o){return o.provider==='app' && String(o.ownerId).toLowerCase()===oid.toLowerCase();})[0];
  if(!o) return Promise.resolve({ok:false, error:'구단주 계정을 찾을 수 없습니다'});
  return fsHash(pw).then(function(h){
    if(h!==o.pwHash) return {ok:false, error:'비밀번호가 올바르지 않습니다'};
    return {ok:true, type:'owner', ownerId:o.id, name:o.name, provider:'app', memberships:ownerMemberships_(o.id), token:'fs.own.'+o.id};
  });
}
/* 비밀번호 변경 (로그인 상태, 현재 비번 확인) */
function fsChangePw(accId, oldPw, newPw){
  newPw=String(newPw||'').trim();
  var o=(DB.owners||[]).filter(function(x){return x.id===accId;})[0];
  if(!o) return Promise.resolve({ok:false, error:'계정을 찾을 수 없습니다'});
  if(o.provider!=='app') return Promise.resolve({ok:false, error:'카카오 계정은 비밀번호를 변경할 수 없습니다'});
  if(newPw.length<4) return Promise.resolve({ok:false, error:'새 비밀번호는 4자 이상이어야 합니다'});
  return fsHash(oldPw).then(function(h){
    if(h!==o.pwHash) return {ok:false, error:'현재 비밀번호가 올바르지 않습니다'};
    return fsHash(newPw).then(function(nh){
      o.pwHash=nh;
      return db.collection('owners').doc(o.id).set({pwHash:nh}, {merge:true}).then(function(){ return {ok:true}; });
    });
  });
}
/* 비밀번호 찾기 (아이디+이름 확인 후 새 비번 설정) */
function fsResetOwnerPw(oid, nm, newPw){
  oid=String(oid||'').trim(); nm=String(nm||'').trim(); newPw=String(newPw||'').trim();
  if(!oid||!nm||!newPw) return Promise.resolve({ok:false, error:'모든 항목을 입력하세요'});
  if(newPw.length<4) return Promise.resolve({ok:false, error:'새 비밀번호는 4자 이상이어야 합니다'});
  var o=(DB.owners||[]).filter(function(x){return x.provider==='app' && String(x.ownerId).toLowerCase()===oid.toLowerCase();})[0];
  if(!o) return Promise.resolve({ok:false, error:'일치하는 계정을 찾을 수 없습니다'});
  if(String(o.name).trim()!==nm) return Promise.resolve({ok:false, error:'아이디와 이름이 일치하지 않습니다'});
  return fsHash(newPw).then(function(nh){
    o.pwHash=nh;
    return db.collection('owners').doc(o.id).set({pwHash:nh}, {merge:true}).then(function(){
      return {ok:true, type:'owner', ownerId:o.id, name:o.name, provider:'app', memberships:ownerMemberships_(o.id), token:'fs.own.'+o.id};
    });
  });
}
function fsOwnerKakao(kid, knm){
  kid=String(kid||''); knm=String(knm||'카카오사용자');
  var o=(DB.owners||[]).filter(function(o){return o.provider==='kakao' && String(o.kakaoId)===kid;})[0];
  if(o) return Promise.resolve({ok:true, type:'owner', ownerId:o.id, name:o.name, provider:'kakao', memberships:ownerMemberships_(o.id), token:'fs.own.'+o.id});
  var id=uid_('ownk_');
  var od={id:id, ownerId:'kakao_'+kid, name:knm, provider:'kakao', kakaoId:kid, createdAt:new Date().toISOString()};
  DB.owners.push(od);
  return db.collection('owners').doc(id).set(od, {merge:true}).then(function(){
    return {ok:true, type:'owner', ownerId:id, name:knm, provider:'kakao', memberships:ownerMemberships_(id), token:'fs.own.'+id};
  });
}
function fsColl(name){ return db.collection(name).get().then(function(snap){ var a=[]; snap.forEach(function(d){ var o=d.data()||{}; a.push(o); }); return a; }); }
function fsLoadAll(){
  return Promise.all([
    fsColl('members'), fsColl('matches'), fsColl('squads'), fsColl('squadMembers'),
    fsColl('squadNotes'), fsColl('playerStats'), fsColl('attendance'), fsColl('polls'),
    fsColl('votes'), fsColl('posts'), db.collection('config').doc('app').get(),
    fsColl('clubs'), fsColl('extraRequests'), fsColl('matchRoster'), fsColl('noteComments'), fsColl('owners'), fsColl('joinRequests')
  ]).then(function(r){
    DB.players=r[0]; DB.matches=r[1]; DB.squads=r[2]; DB.members=r[3];
    DB.notes=r[4]; DB.stats=r[5]; DB.attendance=r[6]; DB.polls=r[7];
    DB.votes=r[8]; DB.posts=r[9]; DB.clubs=r[11]||[]; DB.extras=r[12]||[]; DB.matchRoster=r[13]||[]; DB.noteComments=r[14]||[]; DB.owners=r[15]||[]; DB.joins=r[16]||[];
    var cfg = (r[10] && r[10].exists) ? r[10].data() : {};
    DB.config = { checkinRadiusM: (cfg.checkinRadiusM!=null?cfg.checkinRadiusM:100), lateThresholdMin: (cfg.lateThresholdMin!=null?cfg.lateThresholdMin:0) };
    for(var k in cfg){ if(k!=='staffPw'&&k!=='memberPw') DB.config[k]=cfg[k]; }
    return (DB.players.length===0);   // 비어있으면 이전 필요
  });
}

FS.run = function(fn, args){
  return FS.ready.then(function(){
    if(fn==='ownerSignup') return fsOwnerSignup(args[0], args[1], args[2]);
    if(fn==='ownerLogin') return fsOwnerLogin(args[0], args[1]);
    if(fn==='ownerKakao') return fsOwnerKakao(args[0], args[1]);
    if(fn==='changePw') return fsChangePw(args[0], args[1], args[2]);
    if(fn==='resetOwnerPw') return fsResetOwnerPw(args[0], args[1], args[2]);
    if(fn==='setConfig'){ var rc=mockHandler(fn, args); fsSyncConfig(); return rc; }
    var touched=WRITE_TOUCH[fn];
    if(touched){
      var before=fsSnapshot(touched);
      var res=mockHandler(fn, args);
      touched.forEach(function(k){ fsSyncDiff(k, before[k]); });
      return res;
    }
    return mockHandler(fn, args);   // 읽기 (메모리 즉시)
  });
};
/* 자동 시드 비활성화: 빈 상태로 시작 (구단주가 직접 팀 생성) */
function fsSeedClub_(){
  return Promise.resolve();
}
function fsStampClub_(){
  var own = (DB.clubs||[]).filter(function(c){return c.own;})[0] || (DB.clubs||[])[0];
  if(!own) return Promise.resolve();
  var cid = own.id;
  var b=db.batch(); var n=0;
  Object.keys(FS_MAP).forEach(function(k){
    if(k==='clubs') return;
    var m=FS_MAP[k];
    (DB[k]||[]).forEach(function(x){ if(!x.clubId){ x.clubId=cid; b.set(db.collection(m.coll).doc(String(m.id(x))), {clubId:cid}, {merge:true}); n++; } });
  });
  if(n) return b.commit().catch(function(){});
  return Promise.resolve();
}
FS.init = function(){
  if(!window.firebase){ return; }
  try{ firebase.initializeApp(FIREBASE_CONFIG); }catch(e){}
  window.db = firebase.firestore();
  FS.enabled = true;
  var authP = firebase.auth ? firebase.auth().signInAnonymously().catch(function(){}) : Promise.resolve();
  authP.then(function(){ return fsLoadAll(); })
    .then(function(){ return fsSeedClub_(); })
    .then(function(){ return fsStampClub_(); })
    .then(function(){ FS._resolve(); })
    .catch(function(e){ if(window.console)console.warn('FS init', e); FS.loadFailed=true; FS._resolve(); });
};


var LOGO_URI = (document.querySelector('.crest-img')||{}).src || '';
if(APP_BG){ document.documentElement.style.setProperty('--hero-img', 'url("'+APP_BG+'")'); }
if(AUTH_BG){ document.documentElement.style.setProperty('--login-img', 'url("'+AUTH_BG+'")'); }
FS.init();
function hideSplash_(){ var s=document.getElementById('splash'); if(s){ s.style.opacity='0'; setTimeout(function(){ s.style.display='none'; }, 240); } }
setTimeout(hideSplash_, 9000);   // 안전장치: 무슨 일이 있어도 스플래시는 사라짐
(function(){
  var hash = location.hash || '';
  var hasKs = /[#&]ks=/.test(hash);
  var sess = loadSession();
  var validSess = sess && (sess.type==='owner' || sess.type==='guest');
  if(hasKs){
    // 카카오 복귀: 데이터 로드 후 처리 (내부에서 스플래시 정리)
    API.run('bootstrap').then(function(b){ if(b){ if(b.config) state.cfg=b.config; state.clubs=b.clubs||[]; } handleKakaoReturn_(); });
    return;
  }
  if(validSess){
    // 세션 복원: 팀 데이터가 필요 → 로드 후 진입
    API.run('bootstrap').then(function(b){
      if(b){ if(b.config) state.cfg=b.config; state.clubs=b.clubs||[]; }
      state.auth = sess;
      var fin = function(){
        if(inviteClubId() && !isGuest()){ processInvite_(); } else { afterLogin_(); }
        hideSplash_();
      };
      if(sess.type==='owner' && sess.ownerId){
        // 소속 정보는 항상 최신 데이터로 재계산 (승인·역할 변경 반영)
        API.run('myMemberships', sess.ownerId).then(function(ms){ state.auth.memberships=ms||[]; saveSession(state.auth); fin(); }).catch(fin);
      } else { fin(); }
    }).catch(function(){ applyAppHeader(); showLogin(); hideSplash_(); });
    return;
  }
  // 신규/비로그인: 로그인 화면 즉시 표시 (데이터 로딩을 기다리지 않음)
  applyAppHeader(); showLogin(); hideSplash_();
  // 배경 예열: 이후 팀원 로그인 등에서 바로 응답
  API.run('bootstrap').then(function(b){ if(b){ if(b.config) state.cfg=b.config; state.clubs=b.clubs||[]; } }).catch(function(){});
})();

/* 로그인 후: 접근 가능한 팀이 1개면 자동 입장, 아니면 팀 탭 */
function afterLogin_(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('tabbar').style.display='flex';
  if(isGuest()){
    state.activeClubId=null; ACTIVE_CLUB=null; window.ACTIVE_CLUB=null;
    state.screen='club'; applyAppHeader(); render(); return;
  }
  refreshMyJoins_();
  var ids = myClubIds();
  var last = state.auth && state.auth.lastClub;
  if(last && canEnterClub(last)){ enterClub(last); }
  else if(ids.length===1){ enterClub(ids[0]); }
  else { state.activeClubId=null; ACTIVE_CLUB=null; state.screen='club'; applyAppHeader(); render(); }
}
function enterClub(clubId){
  if(isGuest()){ toast('게스트는 팀에 입장할 수 없어요. 로그인 후 이용하세요.'); return; }
  if(!canEnterClub(clubId)){ toast('가입되지 않은 팀입니다'); return; }
  state.activeClubId = clubId; ACTIVE_CLUB = clubId; window.ACTIVE_CLUB = clubId;
  state.auth.lastClub = clubId; saveSession(state.auth);
  // 팀 전환 시 팀별 데이터 캐시 초기화
  state.players=[]; state.matches=[]; state.matchesLoaded=false;
  state.squadLoaded=false; state.recLoaded=false; state.pollLoaded=false; state.boardLoaded=false;
  SQUAD_CACHE={}; state.squadDetail=null; state.matchSquads=[]; state.currentMatch=null; state.currentSquadId=null; state.clubJoinReqs=null;
  applyClubHeader();
  state.screen='team';
  API.run('bootstrap');  // no-op warmup
  loadClubData_();
}
function loadClubData_(){
  state.loading=true; render();
  Promise.all([API.run('getPlayers'), API.run('getMatches')]).then(function(r){
    state.players=r[0]||[]; state.matches=r[1]||[]; state.matchesLoaded=true; state.loading=false;
    if(state.screen==='team') render();
  }).catch(function(){ state.loading=false; render(); });
}
