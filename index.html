<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>동네 축구왕</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111015">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="동축">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<!-- 카카오 로그인은 백엔드 OAuth로 처리 (JS SDK 불필요). 카카오맵 SDK는 별도 로드됨 -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#111015;
    --ink-soft:#1F1D25;
    --red:#C8102E;
    --red-deep:#96001F;
    --red-tint:#FBEDEF;
    --gold:#C7A24B;
    --gold-soft:#E8D9B5;
    --white:#FFFFFF;
    --paper:#F6F5F3;
    --card:#FFFFFF;
    --steel:#6B6E76;
    --steel-soft:#9FA2A9;
    --line:#EAE8E4;
    --line-strong:#D9D6D0;
    --ok:#177E56;
    --warn:#C98A12;
    --shadow:0 12px 32px rgba(17,16,21,.10);
    --shadow-sm:0 2px 10px rgba(17,16,21,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Pretendard',system-ui,sans-serif;
    background:#0C0B10;
    color:var(--ink);
    display:flex;justify-content:center;align-items:flex-start;
    min-height:100vh;
  }
  .oswald{font-family:'Oswald',sans-serif;}

  /* ===== Phone shell ===== */
  .phone{
    position:relative;
    width:100%;max-width:412px;
    height:min(880px,100vh);
    background:var(--paper);
    overflow:hidden;
    display:flex;flex-direction:column;
    box-shadow:0 30px 80px rgba(0,0,0,.5);
  }
  @media(min-width:460px){ .phone{ border-radius:38px; margin:22px 0; height:844px; border:10px solid #08070B; } }

  /* ===== Header ===== */
  .topbar{
    position:relative;
    background:#111015;
    color:#fff;
    padding:16px 18px 18px;
    overflow:hidden;
    flex:0 0 auto;
    border-bottom:1px solid rgba(199,162,75,.35);
  }
  /* 동축_배경: 헤더 전체를 덮는 배경 이미지 (이미지 오면 APP_BG 한 줄만 교체) */
  .topbar::before{
    content:"";position:absolute;inset:0;z-index:0;
    background-image:var(--hero-img, linear-gradient(150deg,#17151D 0%,#111015 55%,#0D0C11 100%));
    background-size:cover;background-position:center 30%;
  }
  /* 글자 가독성용 어두운 오버레이 */
  .topbar::after{
    content:"";position:absolute;inset:0;z-index:1;
    background:linear-gradient(180deg,rgba(10,9,14,.42) 0%,rgba(10,9,14,.70) 100%);
  }
  .topbar-row{position:relative;z-index:2;display:flex;align-items:center;gap:12px;}
  .crest-badge{
    width:48px;height:48px;flex:0 0 auto;border-radius:13px;
    background:transparent;display:flex;align-items:center;justify-content:center;
    overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.45);
    border:1px solid rgba(199,162,75,.5);
  }
  .crest-img{width:100%;height:100%;object-fit:cover;display:block;}
  .club{display:flex;flex-direction:column;line-height:1;}
  .club .name{font-family:'Oswald';font-weight:700;font-size:20px;letter-spacing:.08em;}
  .club .tag{font-size:10px;color:var(--gold-soft);letter-spacing:.2em;margin-top:4px;font-weight:600;}
  .screen-title{
    position:relative;z-index:2;margin-top:16px;
    display:flex;align-items:baseline;gap:10px;
  }
  .screen-title .kr{font-size:21px;font-weight:800;letter-spacing:-.01em;}
  .screen-title .en{font-family:'Oswald';font-size:10.5px;color:var(--gold);letter-spacing:.26em;text-transform:uppercase;}

  /* ===== Content ===== */
  .content{flex:1 1 auto;overflow-y:auto;padding:18px 16px 96px;-webkit-overflow-scrolling:touch;}
  .content::-webkit-scrollbar{display:none;}

  .eyebrow{font-family:'Oswald';font-size:10.5px;letter-spacing:.22em;color:var(--steel);text-transform:uppercase;font-weight:600;margin:2px 0 11px;display:flex;align-items:center;gap:9px;}
  .eyebrow::before{content:"";width:18px;height:2px;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px;}
  .section+.section{margin-top:28px;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-sm);}

  /* Squad list */
  .squad{display:flex;flex-direction:column;gap:9px;}
  .player{
    display:flex;align-items:center;gap:13px;
    background:var(--card);border:1px solid var(--line);border-radius:17px;
    padding:11px 13px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
    cursor:pointer;transition:transform .12s ease,box-shadow .12s ease;
  }
  .player:active{transform:scale(.985);}
  .player .num{
    font-family:'Oswald';font-weight:700;font-size:30px;line-height:1;
    width:52px;text-align:center;color:var(--ink);
    position:relative;flex:0 0 auto;
  }
  .player .num::after{content:"";position:absolute;right:-7px;top:8%;height:84%;width:2px;background:var(--line-strong);}
  .player .meta{flex:1 1 auto;min-width:0;}
  .player .pname{font-weight:700;font-size:16px;letter-spacing:-.01em;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .pos-tags{display:inline-flex;gap:4px;}
  .pos-tag{font-family:'Oswald';font-weight:600;font-size:10px;letter-spacing:.04em;color:var(--red);background:var(--red-tint);border-radius:5px;padding:2px 6px;line-height:1.3;}
  .player .sub{font-size:12px;color:var(--steel);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;}
  .player .sub .dot{color:var(--line-strong);}
  .size-badge{
    font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.06em;
    background:var(--ink);color:var(--gold-soft);border:1px solid rgba(199,162,75,.4);border-radius:8px;padding:5px 10px;flex:0 0 auto;
  }

  /* FAB */
  .fab{
    position:absolute;right:18px;bottom:84px;z-index:20;
    width:56px;height:56px;border-radius:18px;border:none;
    background:var(--red);color:#fff;font-size:28px;line-height:1;
    box-shadow:0 10px 22px rgba(211,20,36,.42);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s ease;
  }
  .fab:active{transform:scale(.92);}

  /* Bottom nav */
  .tabbar{
    position:absolute;left:0;right:0;bottom:0;z-index:15;
    background:rgba(255,255,255,.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border-top:1px solid rgba(17,16,21,.06);box-shadow:0 -8px 24px rgba(17,16,21,.06);
    display:flex;gap:2px;padding:7px 8px calc(7px + env(safe-area-inset-bottom));
  }
  .tab{
    flex:1;background:none;border:none;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 0 5px;color:var(--steel-soft);border-radius:14px;
    transition:background .18s ease,color .18s ease,transform .1s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .tab:active{transform:scale(.93);}
  .tab svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:transform .18s ease;}
  .tab .lbl{font-size:10.5px;font-weight:600;letter-spacing:.01em;}
  .tab.active{color:var(--red);background:rgba(200,32,44,.08);}
  .tab.active svg{transform:translateY(-1px);stroke-width:2.2;}
  .tab.active .lbl{color:var(--ink);font-weight:700;}

  /* 앱 확인 모달 */
  .cfm-wrap{position:absolute;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:34px;}
  .cfm-wrap.open{display:flex;}
  .cfm-scrim{position:absolute;inset:0;background:rgba(15,14,20,.55);backdrop-filter:blur(2px);}
  .cfm-card{position:relative;width:100%;max-width:300px;background:#fff;border-radius:18px;padding:22px 20px 16px;box-shadow:0 18px 50px rgba(0,0,0,.35);animation:cfmIn .2s cubic-bezier(.22,1,.36,1);}
  @keyframes cfmIn{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
  .cfm-msg{font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.6;text-align:center;white-space:pre-line;}
  .cfm-btns{display:flex;gap:8px;margin-top:18px;}
  .cfm-btns button{flex:1;padding:12px 0;border-radius:12px;font-size:14.5px;font-weight:700;cursor:pointer;border:none;}
  .cfm-cancel{background:var(--paper,#F4F3F6);color:var(--steel,#6b6b76);border:1px solid var(--line-strong,#e5e4ea) !important;}
  .cfm-ok{background:var(--red);color:#fff;box-shadow:0 6px 16px rgba(200,32,44,.28);}
  .cfm-cancel:active,.cfm-ok:active{transform:scale(.97);}

  /* Bottom sheet */
  .sheet-wrap{position:absolute;inset:0;z-index:40;display:none;}
  .sheet-wrap.open{display:block;}
  .scrim{position:absolute;inset:0;background:rgba(15,14,20,.5);backdrop-filter:blur(2px);}
  .sheet{
    position:absolute;left:0;right:0;bottom:0;
    background:#fff;border-radius:24px 24px 0 0;
    max-height:92%;overflow-y:auto;
    box-shadow:0 -12px 40px rgba(0,0,0,.3);
    animation:up .28s cubic-bezier(.22,1,.36,1);
  }
  @keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-head{position:sticky;top:0;background:#fff;padding:16px 18px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
  .sheet-head h3{margin:0;font-size:17px;font-weight:800;}
  .sheet-head .x{border:none;background:var(--paper);width:32px;height:32px;border-radius:10px;font-size:18px;cursor:pointer;color:var(--steel);}
  .grabber{width:38px;height:4px;background:var(--line-strong);border-radius:99px;margin:8px auto 2px;}
  .sheet-body{padding:16px 18px 24px;}

  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:6px;}
  .field label .req{color:var(--red);margin-left:2px;}
  .field input,.field select{
    width:100%;padding:12px 13px;border:1.5px solid var(--line-strong);border-radius:12px;
    font-family:inherit;font-size:15px;background:#fff;color:var(--ink);
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--red);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .sizes{display:flex;gap:7px;flex-wrap:wrap;}
  .size-opt{
    flex:1 1 auto;min-width:52px;text-align:center;padding:11px 0;border:1.5px solid var(--line-strong);
    border-radius:11px;font-family:'Oswald';font-weight:600;font-size:14px;cursor:pointer;color:var(--steel);
  }
  .size-opt.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
  .btn-primary{width:100%;padding:15px;border:none;border-radius:14px;background:var(--red);color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px;}
  .btn-primary:active{background:var(--red-deep);}
  .btn-ghost{width:100%;padding:13px;border:1.5px solid var(--line-strong);border-radius:13px;background:#fff;color:var(--steel);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:9px;}
  .btn-danger{color:var(--red);border-color:var(--red-tint);background:var(--red-tint);}

  /* generic bits */
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;padding:8px 15px;border-radius:99px;border:1px solid var(--line-strong);background:#fff;font-size:13px;font-weight:600;color:var(--steel);cursor:pointer;font-family:'Oswald';letter-spacing:.03em;box-shadow:var(--shadow-sm);}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}

  /* Add-match button */
  .btn-add-match{
    width:100%;padding:14px;border:none;border-radius:13px;
    background:var(--red);color:#fff;font-size:15px;font-weight:700;font-family:inherit;
    cursor:pointer;box-shadow:0 6px 16px rgba(211,20,36,.32);
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn-add-match:active{background:var(--red-deep);}

  /* Quarter tabs */
  .qtabs{display:flex;gap:6px;margin-bottom:16px;background:var(--paper);padding:4px;border-radius:12px;border:1px solid var(--line);}
  .qtab{flex:1;padding:9px 4px;border:none;background:none;border-radius:9px;font-family:'Oswald';font-weight:600;font-size:13.5px;color:var(--steel);cursor:pointer;letter-spacing:.02em;transition:all .12s;}
  .qtab.on{background:linear-gradient(150deg,var(--red),var(--red-deep));color:#fff;box-shadow:0 3px 10px rgba(200,16,46,.35);}
  .qtab.add{flex:0 0 40px;color:var(--steel-soft);font-size:18px;}
  .qtab.add:active{background:var(--line);}

  /* Formation pitch */
  .pitch{
    position:relative;width:100%;padding-bottom:132%;
    border-radius:14px;overflow:hidden;border:2px solid #2c6e49;
    background:
      repeating-linear-gradient(0deg, #2f8f57 0, #2f8f57 11%, #2b8551 11%, #2b8551 22%);
    box-shadow:var(--shadow-sm);touch-action:pan-y;user-select:none;
  }
  .pitch-lines{position:absolute;inset:0;width:100%;height:100%;}
  .pitch-label{position:absolute;left:8px;bottom:6px;font-size:10px;color:rgba(255,255,255,.75);font-weight:600;letter-spacing:.02em;}
  .token{
    position:absolute;transform:translate(-50%,-50%);
    display:flex;flex-direction:column;align-items:center;gap:2px;
    cursor:grab;touch-action:none;z-index:2;
  }
  .token.drag{z-index:5;cursor:grabbing;}
  .token .t-num{
    min-width:34px;height:34px;padding:0 4px;border-radius:17px;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:12.5px;letter-spacing:.02em;color:#fff;border:2px solid #fff;
    box-shadow:0 3px 8px rgba(0,0,0,.35);background:var(--ink);
  }
  .token .t-name{
    font-size:9.5px;font-weight:700;color:#fff;background:rgba(20,18,26,.72);
    padding:1px 5px;border-radius:5px;white-space:nowrap;max-width:72px;overflow:hidden;text-overflow:ellipsis;
  }
  .token.drag .t-num{transform:scale(1.12);}
  .pos-GK .t-num{background:#E0A400;}
  .pos-DF .t-num,.pos-CB .t-num,.pos-LB .t-num,.pos-RB .t-num,.pos-LWB .t-num,.pos-RWB .t-num{background:#2563C9;}
  .pos-MF .t-num,.pos-DM .t-num,.pos-CM .t-num,.pos-AM .t-num{background:#1E9E6A;}
  .pos-FW .t-num,.pos-ST .t-num,.pos-CF .t-num,.pos-LW .t-num,.pos-RW .t-num{background:var(--red);}
  .pos-guest .t-num{background:#6B7280;}
  .rst-list{margin-top:4px;}
  .rst-row{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid var(--line);}
  .rst-num{font-weight:700;font-size:16px;width:34px;text-align:center;color:var(--ink);}
  .rst-num.guest{color:#6B7280;font-size:14px;}
  .rst-name{flex:1;font-weight:600;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rst-g{font-size:10px;color:#6B7280;font-weight:600;}
  .rst-pos{width:82px;padding:7px 8px;border:1.5px solid var(--line-strong);border-radius:9px;font-family:inherit;font-size:13px;}
  .rst-postag{font-size:13px;color:var(--steel);width:82px;text-align:center;}
  .rst-x{background:none;border:none;color:var(--steel-soft);font-size:20px;cursor:pointer;padding:0 2px;line-height:1;}
  .rst-search{width:100%;padding:9px 12px;border:1.5px solid var(--line-strong);border-radius:10px;font-family:inherit;font-size:14px;margin:2px 0 6px;}
  .sheet-body textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line-strong);border-radius:11px;font-family:inherit;font-size:14px;line-height:1.5;resize:vertical;box-sizing:border-box;background:#fff;color:var(--ink);}
  .att-list{margin-top:2px;}
  .att-row{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid var(--line);}
  .att-num{font-weight:700;font-size:15px;width:30px;text-align:center;color:var(--ink);}
  .att-name{flex:1;font-weight:600;font-size:14px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .att-ctrls{display:flex;gap:5px;}
  .att-b{padding:6px 10px;border:1.5px solid var(--line-strong);border-radius:9px;background:#fff;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--steel);cursor:pointer;}
  .att-b:disabled{opacity:.55;cursor:default;}
  .att-b.p.on{background:var(--ok);color:#fff;border-color:var(--ok);}
  .att-b.l.on{background:#E0A400;color:#fff;border-color:#E0A400;}
  .att-b.a.on{background:var(--red);color:#fff;border-color:var(--red);}
  .mijeong{font-size:.6em;letter-spacing:0;color:var(--steel-soft);font-family:'Pretendard';font-weight:600;}
  .att-tag{font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px;}
  .att-tag.p{background:rgba(30,158,106,.14);color:var(--ok);}
  .att-tag.l{background:rgba(224,164,0,.16);color:#B8860B;}
  .att-tag.a{background:rgba(225,19,48,.12);color:var(--red);}
  .att-tag.n{background:var(--paper);color:var(--steel-soft);}
  .cmt-row{display:flex;gap:8px;align-items:flex-start;padding:7px 0;border-top:1px dashed var(--line);}
  .cmt-body{flex:1;font-size:12.5px;color:var(--ink-soft);line-height:1.5;}
  .cmt-who{font-size:11px;font-weight:700;color:var(--steel);margin-right:5px;}
  .cmt-x{background:none;border:none;color:var(--steel-soft);font-size:16px;cursor:pointer;line-height:1;}
  .note-actions{display:flex;gap:8px;margin-top:8px;}
  .note-actions button{background:var(--paper);border:1px solid var(--line-strong);border-radius:8px;font-family:inherit;font-size:11.5px;font-weight:700;color:var(--steel);padding:5px 11px;cursor:pointer;}
  .note-cmt-input{display:flex;gap:6px;margin-top:8px;}
  .note-cmt-input input{flex:1;padding:8px 10px;border:1.5px solid var(--line-strong);border-radius:9px;font-family:inherit;font-size:13px;}
  .note-cmt-input button{background:var(--red);color:#fff;border:none;border-radius:9px;font-family:inherit;font-weight:700;font-size:13px;padding:0 14px;cursor:pointer;}

  .match{padding:14px;border-radius:15px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow-sm);margin-bottom:10px;}
  .match-top{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--steel);font-weight:600;}
  .result{font-family:'Oswald';font-weight:700;font-size:11px;padding:3px 8px;border-radius:6px;letter-spacing:.05em;}
  .r-w{background:#E4F5EC;color:var(--ok);}
  .r-l{background:var(--red-tint);color:var(--red);}
  .r-d{background:#F0F1F3;color:var(--steel);}
  .match-mid{display:flex;align-items:center;justify-content:space-between;margin-top:11px;}
  .team-side{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;}
  .team-side .cn{font-size:13px;font-weight:700;}
  .score{font-family:'Oswald';font-weight:700;font-size:34px;letter-spacing:.03em;}
  .score .vs{font-size:15px;color:var(--steel-soft);margin:0 12px;}

  .list-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);}
  .list-row:last-child{border-bottom:none;}
  .rank{font-family:'Oswald';font-weight:700;font-size:16px;color:var(--red);width:22px;text-align:center;}
  .list-row .nm{flex:1;font-weight:600;font-size:14.5px;}
  .list-row .val{font-family:'Oswald';font-weight:600;font-size:15px;}
  .list-row .val small{color:var(--steel);font-size:11px;margin-left:3px;font-family:'Pretendard';}

  /* TOP3 leaderboards */
  .boards{display:flex;flex-direction:column;gap:10px;}
  .lb-card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-sm);overflow:hidden;}
  .lb-title{font-family:'Oswald';font-size:11.5px;letter-spacing:.18em;font-weight:600;color:var(--gold-soft);background:linear-gradient(150deg,#1B1922,#111015);padding:8px 14px;text-transform:uppercase;border-bottom:1px solid rgba(199,162,75,.3);}
  .lb-row{display:flex;align-items:center;gap:11px;padding:9px 13px;border-bottom:1px solid var(--line);}
  .lb-row:last-child{border-bottom:none;}
  .lb-rank{font-size:16px;width:22px;text-align:center;flex:0 0 auto;}
  .lb-rank.r1{color:#E0A400;} .lb-rank.r2{color:#9AA0A8;} .lb-rank.r3{color:#C08457;}
  .lb-name{flex:1;font-weight:600;font-size:14.5px;}
  .lb-val{font-weight:600;font-size:15px;color:var(--red);}
  .lb-val small{font-family:'Pretendard';color:var(--steel);font-size:11px;margin-left:2px;}
  .lb-empty{padding:12px 13px;font-size:12.5px;color:var(--steel-soft);}

  /* Result form attendance segments */
  .res-row{padding:9px 2px;border-bottom:1px solid var(--line);}
  .att-seg{display:flex;gap:6px;}
  .att-opt{flex:1;padding:7px 0;border:1.5px solid var(--line-strong);background:#fff;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--steel);cursor:pointer;font-family:inherit;}
  .att-opt.on.present{background:var(--ok);border-color:var(--ok);color:#fff;}
  .att-opt.on.late{background:var(--warn);border-color:var(--warn);color:#fff;}
  .att-opt.on.absent{background:var(--red);border-color:var(--red);color:#fff;}

  /* Match report blocks */
  .rep-block{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);align-items:flex-start;}
  .rep-block:last-child{border-bottom:none;}
  .rep-k{flex:0 0 74px;font-size:12.5px;font-weight:700;color:var(--ink);}
  .rep-v{flex:1;font-size:13.5px;color:var(--ink-soft);line-height:1.5;}

  /* Venue map picker */
  .map-search{display:flex;gap:7px;margin-bottom:8px;}
  .map-search input{flex:1;padding:11px 12px;border:1.5px solid var(--line-strong);border-radius:11px;font-family:inherit;font-size:14px;}
  .map-search input:focus{outline:none;border-color:var(--red);}
  .map-search button{flex:0 0 auto;padding:0 16px;border:none;border-radius:11px;background:var(--ink);color:#fff;font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;}
  .map-results{max-height:150px;overflow-y:auto;margin-bottom:8px;}
  .map-results:empty{display:none;}
  .map-result{padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;cursor:pointer;background:#fff;}
  .map-result:active{background:var(--paper);}
  .mr-name{font-size:13.5px;font-weight:700;color:var(--ink);}
  .mr-full{font-size:11px;color:var(--steel-soft);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .map-loading{padding:10px;font-size:12.5px;color:var(--steel-soft);text-align:center;}
  .map-box{width:100%;height:230px;border-radius:12px;overflow:hidden;border:1px solid var(--line-strong);background:#e9ebef;}
  .map-fallback{display:flex;align-items:center;justify-content:center;height:100%;font-size:12.5px;color:var(--steel);padding:12px;text-align:center;}
  .map-status{font-size:11.5px;color:var(--steel);margin-top:7px;line-height:1.4;}
  .leaflet-container{font-family:inherit;}

  /* Polls */
  .poll-card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:14px;box-shadow:var(--shadow-sm);margin-bottom:10px;cursor:pointer;}
  .poll-card:active{transform:scale(.99);}
  .poll-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .poll-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;}
  .ps-open{background:#E4F5EC;color:var(--ok);}
  .ps-closed{background:#F0F1F3;color:var(--steel);}
  .ps-sch{background:#FFF3E0;color:var(--warn);}
  .poll-dl{font-size:11.5px;color:var(--steel);}
  .poll-title{font-weight:700;font-size:16px;margin-bottom:6px;}
  .poll-meta{font-size:12.5px;color:var(--steel);margin-bottom:9px;}
  .poll-bar{height:7px;background:var(--line);border-radius:99px;overflow:hidden;}
  .poll-bar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:99px;}
  .opt-row{display:flex;gap:7px;margin-bottom:8px;}
  .opt-row input{flex:1;padding:11px 12px;border:1.5px solid var(--line-strong);border-radius:11px;font-family:inherit;font-size:14px;}
  .opt-x{flex:0 0 auto;width:40px;border:1.5px solid var(--line-strong);background:var(--paper);border-radius:11px;color:var(--steel);cursor:pointer;font-size:14px;}
  .pr-item{margin-bottom:12px;}
  .pr-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
  .pr-opt{font-weight:700;font-size:14.5px;}
  .pr-cnt{font-size:12px;color:var(--steel);font-family:'Oswald';}
  .pr-bar{height:11px;background:var(--line);border-radius:99px;overflow:hidden;}
  .pr-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--red-deep));border-radius:99px;transition:width .3s;}
  .pr-voters{font-size:11.5px;color:var(--steel-soft);margin-top:4px;}
  .vote-opts{display:flex;flex-direction:column;gap:8px;}
  .vote-opt{padding:13px;border:1.5px solid var(--line-strong);background:#fff;border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;color:var(--ink);cursor:pointer;text-align:left;}
  .vote-opt.on{background:var(--red-tint);border-color:var(--red);color:var(--red);}

  /* Toggle switch */
  .tg-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer;}
  .tg-row:last-child{border-bottom:none;}
  .tg{flex:0 0 auto;width:46px;height:27px;border-radius:99px;background:var(--line-strong);position:relative;transition:background .2s;}
  .tg.on{background:var(--ok);}
  .tg-knob{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:left .2s;}
  .tg.on .tg-knob{left:22px;}
  .poll-flag{font-size:10px;font-weight:700;background:var(--ink);color:#fff;border-radius:5px;padding:2px 6px;letter-spacing:.03em;}

  /* Share buttons */
  .share-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:13px 15px;border:1px solid var(--line-strong);border-radius:13px;background:#fff;font-size:14.5px;font-weight:700;color:var(--ink);text-decoration:none;margin-bottom:8px;box-shadow:var(--shadow-sm);}
  .share-btn:active{background:var(--paper);}
  .sb-note{font-size:11px;color:var(--steel-soft);font-weight:600;}
  /* 지도·내비 앱 런처 그리드 */
  .app-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px 8px;padding:4px 0 2px;}
  .app-item{display:flex;flex-direction:column;align-items:center;gap:7px;text-decoration:none;-webkit-tap-highlight-color:transparent;}
  .app-item:active .app-ico{transform:scale(.93);}
  .app-ico{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(17,16,21,.14), inset 0 1px 0 rgba(255,255,255,.25);transition:transform .12s ease;}
  .app-ico svg{width:26px;height:26px;}
  .app-ico.bordered{border:1px solid var(--line-strong);box-shadow:0 3px 10px rgba(17,16,21,.08);}
  .app-lbl{font-size:11px;font-weight:700;color:var(--ink);text-align:center;line-height:1.25;}
  .app-note{font-size:9.5px;color:var(--steel-soft);font-weight:600;margin-top:-3px;}

  /* mini buttons (권한 관리) */
  .btn-mini{flex:0 0 auto;padding:8px 11px;border:none;border-radius:9px;background:var(--ink);color:#fff;font-size:11.5px;font-weight:700;font-family:inherit;cursor:pointer;margin-left:6px;}
  .btn-mini.ghost{background:var(--paper);color:var(--steel);border:1px solid var(--line-strong);}

  /* Clubs */
  .club .name .rg{font-family:'Pretendard';font-size:11px;font-weight:600;color:var(--gold-soft);letter-spacing:.02em;margin-left:2px;}
  .club-card{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:17px;padding:13px 14px;box-shadow:var(--shadow-sm);margin-bottom:10px;}
  .club-emblem{width:48px;height:48px;border-radius:12px;object-fit:contain;background:#fff;border:1px solid var(--line);flex:0 0 auto;}
  .club-emblem-empty{display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--paper);}
  .cc-name{font-weight:800;font-size:15.5px;color:var(--ink);}
  .cc-name .rg{font-size:11.5px;font-weight:600;color:var(--steel-soft);margin-left:2px;}
  .cc-own{font-size:9.5px;font-weight:600;letter-spacing:.08em;background:linear-gradient(150deg,var(--red),var(--red-deep));color:#fff;border-radius:5px;padding:2px 6px;margin-left:5px;vertical-align:2px;}
  .cc-cur{font-size:10px;font-weight:600;letter-spacing:.05em;background:linear-gradient(150deg,var(--red),var(--red-deep));color:#fff;border-radius:6px;padding:5px 9px;}
  .cc-lock{font-size:11px;font-weight:600;color:var(--steel-soft);}
  .club-card.on{border-color:var(--red);box-shadow:0 0 0 1.5px var(--red) inset, var(--shadow-sm);}
  .cc-note{font-size:12px;color:var(--steel);margin-top:3px;}
  .club-star{flex:0 0 auto;background:none;border:none;font-size:20px;line-height:1;color:var(--line-strong);cursor:pointer;padding:2px 2px;}
  .club-star.on{color:var(--gold);}
  .club-filter{display:flex;gap:8px;margin:2px 0 12px;}
  .club-filter select{flex:1;padding:9px 11px;border:1px solid var(--line-strong);border-radius:11px;font-family:inherit;font-size:13.5px;background:#fff;}
  .fav-toggle{flex:0 0 auto;padding:9px 13px;border:1px solid var(--line-strong);border-radius:11px;background:#fff;font-size:13px;font-weight:700;color:var(--steel);cursor:pointer;}
  .fav-toggle.on{background:var(--gold);color:#fff;border-color:var(--gold);}

  /* 로그인 이름 검색 */
  .au-list{max-height:180px;overflow-y:auto;border-radius:12px;background:rgba(255,255,255,.06);margin-top:-6px;margin-bottom:10px;display:none;}
  .au-item{padding:11px 14px;font-size:14.5px;color:#fff;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.07);display:flex;gap:10px;align-items:center;}
  .au-item .num{font-family:'Oswald';color:var(--gold-soft);font-size:13px;width:22px;text-align:center;}
  .au-item:active{background:rgba(255,255,255,.12);}

  /* Board posts */
  .post-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 15px;box-shadow:var(--shadow-sm);margin-bottom:10px;cursor:pointer;}
  .post-card:active{transform:scale(.99);}
  .pc-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .pc-title{font-weight:700;font-size:15.5px;color:var(--ink);}
  .pc-body{font-size:13px;color:var(--steel);line-height:1.55;margin:0 0 9px;}
  .pc-meta{display:flex;justify-content:space-between;font-size:11.5px;color:var(--steel-soft);font-weight:600;}
  .pin{font-size:10px;font-weight:700;background:linear-gradient(150deg,var(--red),var(--red-deep));color:#fff;border-radius:5px;padding:2px 7px;letter-spacing:.06em;flex:0 0 auto;}

  /* Login screen */
  .auth-screen{position:absolute;inset:0;z-index:50;background:linear-gradient(180deg,rgba(12,11,16,.55) 0%,rgba(12,11,16,.82) 100%),var(--login-img,radial-gradient(120% 90% at 50% 0%,#201D28 0%,#111015 60%,#0C0B10 100%));background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;padding:28px;}
  .auth-inner{width:100%;max-width:320px;text-align:center;}
  .auth-logo{width:96px;height:96px;object-fit:cover;background:transparent;border-radius:24px;box-shadow:0 14px 38px rgba(0,0,0,.5);border:1px solid rgba(199,162,75,.5);}
  .auth-title{font-family:'Oswald';font-weight:700;font-size:30px;letter-spacing:.1em;color:#fff;margin-top:18px;}
  .auth-name2{font-size:16px;font-weight:700;color:#fff;letter-spacing:.02em;margin-top:8px;}
  .auth-sub{font-size:11.5px;color:var(--gold-soft);letter-spacing:.24em;margin-top:6px;font-weight:600;}
  .auth-form{margin-top:26px;display:flex;flex-direction:column;gap:11px;text-align:left;}
  .auth-form select,.auth-form input{width:100%;padding:14px;border:none;border-radius:13px;font-family:inherit;font-size:15px;background:rgba(255,255,255,.96);}
  .auth-form select:focus,.auth-form input:focus{outline:2px solid var(--red);}
  .auth-btn{padding:15px;border:none;border-radius:13px;background:var(--red);color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 8px 20px rgba(211,20,36,.4);}
  .auth-btn:active{background:var(--red-deep);}
  .auth-hint{font-size:11.5px;color:#9ca0a8;text-align:center;margin:6px 0 0;line-height:1.5;}
  .auth-choice-btn{padding:15px;border-radius:13px;background:rgba(255,255,255,.12);color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;border:1px solid rgba(255,255,255,.22);}
  .auth-choice-btn:active{background:rgba(255,255,255,.2);}
  .auth-ghost-btn{padding:13px;border:none;border-radius:13px;background:transparent;color:var(--gold-soft);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;}
  .auth-social{padding:14px;border:none;border-radius:13px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;}
  .auth-social.kakao{background:#FEE500;color:#191600;}
  .auth-social.kakao:active{background:#f2da00;}
  .auth-links{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
  .auth-links .auth-link:only-child{margin:0 auto;}
  .auth-link{color:var(--gold-soft);font-size:13px;font-weight:600;cursor:pointer;padding:6px 2px;}
  .auth-team-name{font-size:15px;font-weight:800;color:var(--gold);text-align:center;padding:2px 0 4px;}

  .stat-strip{display:flex;gap:9px;margin-bottom:14px;}
  .stat{flex:1;background:linear-gradient(150deg,#1B1922,#111015);color:#fff;border-radius:16px;padding:14px 13px;position:relative;overflow:hidden;border:1px solid rgba(199,162,75,.25);}
  .stat:nth-child(2){background:linear-gradient(150deg,var(--red),var(--red-deep));border-color:rgba(255,255,255,.14);}
  .stat .k{font-size:10.5px;opacity:.8;font-weight:600;letter-spacing:.04em;}
  .stat .v{font-family:'Oswald';font-weight:700;font-size:26px;margin-top:5px;line-height:1;letter-spacing:.02em;}

  .pos-group{margin-bottom:15px;}
  .pos-head{font-family:'Oswald';font-size:12px;letter-spacing:.14em;color:var(--red);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .pos-head span{color:var(--steel-soft);font-family:'Pretendard';letter-spacing:0;font-weight:600;}
  .pos-players{display:flex;gap:8px;flex-wrap:wrap;}
  .pchip{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:7px 11px 7px 8px;box-shadow:var(--shadow-sm);}
  .pchip .n{font-family:'Oswald';font-weight:700;font-size:16px;width:24px;text-align:center;}
  .pchip .nm{font-size:13px;font-weight:600;}

  .note-card{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--red);border-radius:12px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow-sm);}
  .note-card .nh{font-size:12px;font-weight:700;color:var(--red);margin-bottom:5px;}
  .note-card p{margin:0;font-size:13.5px;line-height:1.55;color:var(--ink-soft);}

  .post{padding:14px;border-bottom:1px solid var(--line);}
  .post:last-child{border-bottom:none;}
  .post .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .post .pt{font-weight:700;font-size:14.5px;}
  .post .pin{font-family:'Oswald';font-size:9.5px;background:var(--red);color:#fff;padding:2px 6px;border-radius:5px;letter-spacing:.05em;}
  .post .pd{font-size:11px;color:var(--steel-soft);}
  .post p{margin:4px 0 0;font-size:13px;color:var(--steel);line-height:1.5;}

  .gps-card{background:linear-gradient(145deg,#1B1922,#111015);border:1px solid rgba(199,162,75,.3);color:#fff;border-radius:18px;padding:18px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
  .gps-card::after{content:"";position:absolute;right:-30px;bottom:-30px;width:130px;height:130px;border:12px solid rgba(199,162,75,.28);border-radius:50%;}
  .gps-card .gh{font-size:12px;opacity:.8;font-weight:600;letter-spacing:.04em;}
  .gps-card .gv{font-family:'Oswald';font-weight:700;font-size:19px;margin:6px 0 3px;}
  .gps-card .gloc{font-size:12.5px;opacity:.85;}
  .checkin-btn{width:100%;margin-top:15px;padding:15px;border:none;border-radius:13px;background:var(--red);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;z-index:2;}
  .checkin-btn.done{background:var(--ok);}
  .att-row{display:flex;align-items:center;gap:11px;padding:11px 13px;border-bottom:1px solid var(--line);}
  .att-row:last-child{border-bottom:none;}
  .att-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);flex:0 0 auto;}
  .att-dot.no{background:var(--line-strong);}
  .att-row .an{flex:1;font-weight:600;font-size:14px;}
  .att-row .at{font-family:'Oswald';font-size:12.5px;color:var(--steel);}

  .map-card{border-radius:16px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow-sm);}
  .map-fake{height:150px;background:
     linear-gradient(#e9ebef,#e9ebef) padding-box,
     repeating-linear-gradient(0deg,transparent,transparent 22px,#dfe2e8 22px,#dfe2e8 23px),
     repeating-linear-gradient(90deg,transparent,transparent 22px,#dfe2e8 22px,#dfe2e8 23px);
     position:relative;}
  .map-pin{position:absolute;left:50%;top:46%;transform:translate(-50%,-100%);color:var(--red);font-size:34px;filter:drop-shadow(0 3px 3px rgba(0,0,0,.25));}
  .venue-map{height:190px;width:100%;background:#e9ebef;}
  .venue-map .map-fallback{display:flex;align-items:center;justify-content:center;height:100%;font-size:12.5px;color:var(--steel);padding:12px;text-align:center;}
  .map-info{padding:14px;}
  .map-info .mt{font-weight:700;font-size:15px;}
  .map-info .ma{font-size:12.5px;color:var(--steel);margin-top:3px;}
  .map-actions{display:flex;gap:9px;margin-top:12px;}
  .map-actions button{flex:1;padding:12px;border-radius:12px;font-size:13.5px;font-weight:700;font-family:inherit;cursor:pointer;border:none;}
  .m-open{background:var(--red);color:#fff;}
  .m-copy{background:var(--paper);color:var(--ink);border:1.5px solid var(--line-strong) !important;}

  .empty{text-align:center;padding:40px 20px;color:var(--steel-soft);}
  .empty .ei{font-size:34px;margin-bottom:10px;}

  .toast{
    position:absolute;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:13.5px;font-weight:600;
    z-index:60;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;box-shadow:var(--shadow);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .hint{font-size:11.5px;color:var(--steel-soft);text-align:center;margin-top:16px;line-height:1.6;padding:0 10px;}
  #splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(120% 90% at 50% 0%,#201D28 0%,#111015 60%,#0C0B10 100%);color:#fff;transition:opacity .22s ease;}
  #splash .sp-title{font-family:'Oswald',system-ui,sans-serif;font-weight:700;font-size:30px;letter-spacing:.12em;}
  #splash .sp-sub{font-size:11px;letter-spacing:.34em;color:#E7C878;margin-top:7px;}
  #splash .sp-spin{margin-top:24px;width:28px;height:28px;border:3px solid rgba(255,255,255,.16);border-top-color:#C7A24B;border-radius:50%;animation:spspin .8s linear infinite;}
  @keyframes spspin{to{transform:rotate(360deg);}}
</style>

var API = {
  run: function(fn){
    var args = Array.prototype.slice.call(arguments, 1);
    if(window.FS && FS.enabled){ return FS.run(fn, args); }
    // Firestore 미연결(로컬 미리보기) 시 목업으로 동작
    return new Promise(function(resolve, reject){
      setTimeout(function(){ try{ resolve(mockHandler(fn, args)); }catch(e){ reject(e); } }, 40);
    });
  }
};
/* 시간+난수 기반 고유 ID (동일 ms 충돌 방지) */
function uid_(prefix){ return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
/* 계정의 팀 소속 계산: (1) 내가 만든 팀 = 임원  (2) 명단에 계정 연결된 팀 = 명단상 역할 */
function accountMemberships_(accId){
  if(!accId) return [];
  var out=[], seen={};
  (DB.clubs||[]).forEach(function(c){
    if(c.ownerId && c.ownerId===accId){
      var pm = (DB.players||[]).filter(function(p){return p.clubId===c.id && (p.accountId===accId || p.ownerId===accId);})[0];
      out.push({clubId:c.id, playerId:pm?pm.id:null, role:'임원', owner:true});
      seen[c.id]=true;
    }
  });
  (DB.players||[]).forEach(function(p){
    if(seen[p.clubId]) return;
    if(p.accountId===accId || p.ownerId===accId){
      out.push({clubId:p.clubId, playerId:p.id, role:(p.role==='임원'?'임원':'팀원')});
      seen[p.clubId]=true;
    }
  });
  return out;
}
function ownerMemberships_(accId){ return accountMemberships_(accId); }
/* 계정을 팀 명단에 연결: 동명 미연결 항목 자동 연결, 없으면 새 항목 생성 */
/* 계정↔팀 연결.
   pid 없음(가입승인/팀 초대) → 항상 새 팀원 정보 생성 (이름 자동매칭 안 함)
   pid 있음(팀원 초대) → 그 명단 항목에 계정 연결. 단:
     - 이미 이 계정이 그 팀 소속 → 기존 연결로 입장 (Q3)
     - 대상 항목이 다른 계정에 이미 연결 → linkUsed (Q2)
*/
function linkAccountToClub_(cid, accId, name, pid){
  var mine=(DB.players||[]).filter(function(p){return p.clubId===cid && (p.accountId===accId || p.ownerId===accId);})[0];
  if(pid){
    var tgt=(DB.players||[]).filter(function(p){return p.clubId===cid && p.id===pid;})[0];
    if(!tgt) return {error:'대상 팀원을 찾을 수 없습니다'};
    if(tgt.accountId || tgt.ownerId){
      if(tgt.accountId===accId || tgt.ownerId===accId) return {playerId:tgt.id, role:(tgt.role==='임원'?'임원':'팀원'), already:true};
      if(mine) return {playerId:mine.id, role:(mine.role==='임원'?'임원':'팀원'), already:true, linkUsed:true};
      return {linkUsed:true};
    }
    if(mine) return {playerId:mine.id, role:(mine.role==='임원'?'임원':'팀원'), already:true, otherPid:tgt.id};

var POS_XY = {
  GK:[0.50,0.92],
  DF:[0.50,0.74], CB:[0.50,0.74], LB:[0.15,0.73], RB:[0.85,0.73], LWB:[0.13,0.62], RWB:[0.87,0.62],
  MF:[0.50,0.50], DM:[0.50,0.61], CM:[0.50,0.50], AM:[0.50,0.38],
  FW:[0.50,0.24], ST:[0.50,0.22], CF:[0.50,0.24], LW:[0.17,0.27], RW:[0.83,0.27]
};
function posDefaultXY(pos, idx){
  var base = POS_XY[pos] || [0.5,0.5];
  var offs = [0, -0.16, 0.16, -0.30, 0.30, -0.44, 0.44];
  var x = base[0] + (offs[idx % offs.length]||0);
  if(base[0]<0.25 || base[0]>0.75){ x = base[0] + (idx? (base[0]<0.5?0.04:-0.04)*idx : 0); } // 측면은 세로로 약간 분산
  x = Math.max(0.06, Math.min(0.94, x));
  var y = base[1] + (base[0]<0.25||base[0]>0.75 ? (idx%2? 0.05:-0.05)*Math.ceil(idx/2) : 0);
  y = Math.max(0.04, Math.min(0.96, y));
  return {x:x, y:y};
}
/* #11 스쿼드 맵 위치 → 포지션 자동 판정 (y: 1=우리 골, 0=상대 골) */
function posFromXY(x, y){
  if(y>=0.85) return 'GK';
  if(y>=0.66){ if(x<0.18) return 'LB'; if(x>0.82) return 'RB'; return 'CB'; }
  if(y>=0.56){ if(x<0.16) return 'LWB'; if(x>0.84) return 'RWB'; return 'DM'; }
  if(y>=0.42){ return 'CM'; }
  if(y>=0.32){ if(x<0.20) return 'LW'; if(x>0.80) return 'RW'; return 'AM'; }
  if(x<0.20) return 'LW'; if(x>0.80) return 'RW'; return 'ST';
}
function pollStatus_(p){
  if(p.status==='closed') return 'closed';
  var now = new Date();
  if(p.endAt && new Date(p.endAt) < now) return 'closed';
  if(p.startAt && new Date(p.startAt) > now) return 'scheduled';
  return 'open';
}
/* 스쿼드에 선수 편성 (선호 포지션 1순위, 없으면 DF). 이미 있으면 건너뜀 */
function addPlayerToSquad_(sid, playerId){

function buildPollDetail_(pollId, viewerId){
  var p = DB.polls.filter(function(x){return x.id===pollId;})[0] || null;
  if(!p) return {poll:null};
  var nm = function(pl){ var q=DB.players.filter(function(x){return x.id===pl;})[0]; return q?q.name:'(선수)'; };
  var votes = DB.votes.filter(function(v){return v.pollId===pollId;});
  var voterSet = {}; votes.forEach(function(v){ voterSet[v.playerId]=1; });
  var results = p.options.map(function(opt){
    var vs = votes.filter(function(v){return v.choice===opt;});
    return {option:opt, count:vs.length, voters: p.anon ? [] : vs.map(function(v){return nm(v.playerId);})};
  });
  var nonVoters = DB.players.filter(function(pl){return !voterSet[pl.id];}).map(function(pl){return pl.name;});
  var myChoices = viewerId ? votes.filter(function(v){return v.playerId===viewerId;}).map(function(v){return v.choice;}) : [];
  var extras = DB.extras.filter(function(x){return x.pollId===pollId;}).map(function(x){
    return {id:x.id, playerId:x.playerId, name:nm(x.playerId), status:x.status, createdAt:x.createdAt};
  });
  var myExtra = viewerId ? (extras.filter(function(x){return x.playerId===viewerId && x.status!=='rejected';})[0]||null) : null;
  return {
    poll:{id:p.id, title:p.title, options:p.options.slice(), startAt:p.startAt, endAt:p.endAt, status:pollStatus_(p), multi:!!p.multi, anon:!!p.anon, createdAt:p.createdAt},
    results:results, totalVotes:Object.keys(voterSet).length, totalMembers:DB.players.length,
    nonVoters:nonVoters, myChoices:myChoices, extras:extras, myExtra:myExtra
  };
}
function buildMatchReport_(matchId){
  var match = DB.matches.filter(function(x){return x.id===matchId;})[0] || null;
  var nm = function(pid){ var p=DB.players.filter(function(x){return x.id===pid;})[0]; return p?p:{num:'?',name:'(선수)'}; };
  var st = DB.stats.filter(function(x){return x.matchId===matchId;});
  var scorers = st.filter(function(s){return (s.goals||0)>0;}).map(function(s){var p=nm(s.playerId);return {num:p.num,name:p.name,goals:s.goals};}).sort(function(a,b){return b.goals-a.goals;});
  var assisters = st.filter(function(s){return (s.assists||0)>0;}).map(function(s){var p=nm(s.playerId);return {num:p.num,name:p.name,assists:s.assists};}).sort(function(a,b){return b.assists-a.assists;});
  var att = DB.attendance.filter(function(x){return x.matchId===matchId;});
  var attMap={}; att.forEach(function(x){ attMap[x.playerId]=x.status||'present'; });
  var present=[],late=[],absent=[];
  DB.players.forEach(function(p){
    var s = attMap[p.id];
    if(s==='present') present.push(p.name);
    else if(s==='late') late.push(p.name);
    else absent.push(p.name); // 기록 없으면 불참으로 간주
  });
  var quarters = DB.squads.filter(function(s){return s.matchId===matchId;}).map(function(sq){
    var mem = DB.members.filter(function(x){return x.squadId===sq.id;}).map(function(x){var p=nm(x.playerId);return {num:p.num,name:p.name,position:x.position};}).sort(numSort);
    return {name:sq.name, members:mem};
  });
  return {match:match, scorers:scorers, assisters:assisters, attendance:{present:present,late:late,absent:absent}, quarters:quarters};
}
function buildSquadDetail_(squadId){
  var squad = DB.squads.filter(function(x){return x.id===squadId;})[0] || null;
  var raw = DB.members.filter(function(x){return x.squadId===squadId;});
  var gi=0;
  var members = raw.map(function(sm){
    var assigned = !!sm.position;
    var d = !assigned ? {x:null,y:null} : ((sm.x==null||sm.y==null) ? posDefaultXY(sm.position,0) : {x:sm.x, y:sm.y});
    if(sm.guest){ gi++; return {playerId:sm.playerId, guest:true, num:'G'+gi, gnum:gi, name:(sm.gname||('Guest'+gi)), position:sm.position||'', x:d.x, y:d.y}; }
    var p = DB.players.filter(function(x){return x.id===sm.playerId;})[0] || {num:'?',name:'(삭제됨)'};
    return {playerId:sm.playerId, num:p.num, name:p.name, position:sm.position||'', x:d.x, y:d.y};
  });
  members.sort(function(a,b){ if(a.guest!==b.guest) return a.guest?1:-1; if(a.guest) return a.gnum-b.gnum; return numSort(a,b); });
  var cmts = DB.noteComments||[];
  var notes = DB.notes.filter(function(x){return x.squadId===squadId;}).map(function(n){
    var c = cmts.filter(function(x){return x.noteId===n.id;}).sort(function(a,b){return String(a.createdAt).localeCompare(String(b.createdAt));})
                .map(function(x){ return {id:x.id, author:x.author, authorId:x.authorId, body:x.body, createdAt:x.createdAt}; });
    return {id:n.id, squadId:n.squadId, phase:n.phase, scope:n.scope, body:n.body, comments:c};
  });
  return {squad:squad, members:members, notes:notes};
}

function initPitchDrag(){
  if(!isAdmin()) return;
  var pitch = document.getElementById('pitch');
  if(!pitch) return;
  var toks = pitch.querySelectorAll('.token');
  Array.prototype.forEach.call(toks, function(tok){
    var pid = tok.getAttribute('data-pid');
    var dragging=false, moved=false;
    tok.addEventListener('pointerdown', function(e){
      dragging=true; moved=false; tok.classList.add('drag');
      try{ tok.setPointerCapture(e.pointerId); }catch(err){}
      e.preventDefault();
    });
    tok.addEventListener('pointermove', function(e){
      if(!dragging) return;
      var rect = pitch.getBoundingClientRect();
      var x = (e.clientX - rect.left)/rect.width;
      var y = (e.clientY - rect.top)/rect.height;
      x = Math.max(0.05, Math.min(0.95, x));
      y = Math.max(0.03, Math.min(0.97, y));
      tok.style.left = (x*100)+'%';
      tok.style.top = (y*100)+'%';
      tok._x = x; tok._y = y; moved=true;
      if(!tok.getAttribute('data-guest')){   // 이동 중 실시간 포지션 표기
        var lp = posFromXY(x,y);
        var nn = tok.querySelector('.t-num'); if(nn && nn.textContent!==lp){ nn.textContent = lp; tok.className = 'token pos-'+lp+' drag'; }
      }
    });
    var end = function(){
      if(!dragging) return;
      dragging=false; tok.classList.remove('drag');
      if(moved && tok._x!=null){
        var newPos = posFromXY(tok._x, tok._y);
        var isGuest=false;
        if(state.squadDetail){ state.squadDetail.members.forEach(function(mm){ if(mm.playerId===pid){ mm.x=tok._x; mm.y=tok._y; if(!mm.guest) mm.position=newPos; isGuest=mm.guest; } }); cacheSquad_(state.squadDetail); }
        var savePos = isGuest ? null : newPos;
        API.run('setSquadMemberPos', state.currentSquadId, pid, tok._x, tok._y, savePos)
          .then(function(res){ if(res&&res.squad){ cacheSquad_(res); if(state.screen==='form') render(); } })
          .catch(function(){ toast('위치 저장 실패'); });
      }
    };
    tok.addEventListener('pointerup', end);
    tok.addEventListener('pointercancel', end);
  });
}

function fmtMatchDate(d){
  if(!d) return '';
  var wd = dowOf(d);
  return (String(d).slice(5,7)*1) + '/' + (String(d).slice(8,10)*1) + (wd?' ('+wd+')':'');
}
/* 구글 시트가 시간을 날짜값으로 저장하는 문제 대응: 무엇이 와도 HH:mm 로 정리 */
function cleanTime(t){
  if(t===0 || t==='0') return '';
  if(!t) return '';
  t = String(t);
  var m = t.match(/(\d{1,2}):(\d{2})/);   // "20:20" 또는 "... 20:20:00 ..." 에서 추출
  if(m){ var hh=('0'+m[1]).slice(-2); return hh+':'+m[2]; }
  var d = new Date(t);
  if(!isNaN(d.getTime())) return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
  return '';
}
function dowOf(dateStr){
  if(!dateStr) return '';
  var s=String(dateStr).slice(0,10);
  var d=new Date(s+'T00:00:00');
  if(isNaN(d.getTime())) return '';
  return ['일','월','화','수','목','금','토'][d.getDay()];
}
function fmtDateDot(dateStr){
  return String(dateStr).slice(0,10).replace(/-/g,'.');
}

function pname_(pid){ var p=(state.players||[]).filter(function(x){return x.id===pid;})[0]; return p?p:{num:'?',name:'(선수)'}; }

function viewRecord(){
  if(state.recLoading) return '<div class="empty"><div class="ei">📊</div>불러오는 중...</div>';

  var seg = '<div class="qtabs" style="margin-bottom:14px;">'
    + '<button class="qtab '+(state.recTab==='summary'?'on':'')+'" onclick="setRecTab(\'summary\')">종합 기록</button>'
    + '<button class="qtab '+(state.recTab==='h2h'?'on':'')+'" onclick="setRecTab(\'h2h\')">상대 전적</button>'
    + '</div>';

  if(state.recTab==='h2h') return seg + viewH2H();

  // 기간 칩: 전체 + 연도 + 월
  var opts = ['전체'].concat(recYears()).concat(recMonths());
  var chips = opts.map(function(p){
    var label = p==='전체' ? '전체' : (p.length===4 ? p+'년' : (p.slice(5,7)*1)+'월');
    return '<div class="chip '+(state.recPeriod===p?'on':'')+'" onclick="setPeriod(\''+p+'\')">'+label+'</div>';
  }).join('');

  var matches = state.recMatches.filter(function(m){ return inPeriod(m.date); });
  var played = matches.filter(function(m){ return m.result==='W'||m.result==='D'||m.result==='L'; });
  var w=0,dr=0,l=0,gf=0,ga=0;
  played.forEach(function(m){
    if(m.result==='W')w++; else if(m.result==='D')dr++; else l++;
    gf+=Number(m.ourScore)||0; ga+=Number(m.oppScore)||0;
  });

  var summary = '<div class="stat-strip">'
    + '<div class="stat"><div class="k">경기</div><div class="v oswald">'+played.length+'</div></div>'
    + '<div class="stat"><div class="k">승 · 무 · 패</div><div class="v oswald">'+w+'·'+dr+'·'+l+'</div></div>'
    + '<div class="stat"><div class="k">득 · 실</div><div class="v oswald">'+gf+'·'+ga+'</div></div>'
    + '</div>';

  // 경기 기록
  var mlist = matches.length ? matches.map(function(m){
    var has = (m.result==='W'||m.result==='D'||m.result==='L');
    var cls = m.result==='W'?'r-w':(m.result==='L'?'r-l':'r-d');
    var right = has ? '<span class="result '+cls+'">'+m.result+'</span>' : '<span style="font-size:11px;color:var(--red);font-weight:700;">결과 입력 ›</span>';
    var mid = has
      ? '<div class="score oswald">'+m.ourScore+'<span class="vs">:</span>'+m.oppScore+'</div>'
      : '<div class="oswald" style="font-size:15px;color:var(--steel-soft);">VS</div>';
    return '<div class="match" onclick="onRecordMatchTap(\''+m.id+'\')">'
      + '<div class="match-top"><span>'+m.date.replace(/-/g,'.')+'</span>'+right+'</div>'
      + '<div class="match-mid"><div class="team-side"><span class="cn">'+esc(ourTeamName_())+'</span></div>'+mid
      + '<div class="team-side"><span class="cn">'+esc(m.opponent)+'</span></div></div></div>';
  }).join('') : '<div class="empty" style="padding:24px;">해당 기간 경기가 없습니다.</div>';

  // 선수 기록 (기간 내 집계) — 득점 / 도움 / 출석 각 3위까지
  var midSet = {}; matches.forEach(function(m){ midSet[m.id]=true; });
  var agg = {};
  function bucket(pid){ if(!agg[pid]) agg[pid]={g:0,a:0,att:0}; return agg[pid]; }
  state.recStats.forEach(function(s){
    if(!midSet[s.matchId]) return;
    var b=bucket(s.playerId); b.g+=Number(s.goals)||0; b.a+=Number(s.assists)||0;
  });
  (state.recAtt||[]).forEach(function(x){
    if(!midSet[x.matchId]) return;
    bucket(x.playerId).att += 1;
  });
  function top3(key){
    return Object.keys(agg).map(function(pid){ var p=pname_(pid); return {name:p.name, v:agg[pid][key]}; })
      .filter(function(r){ return r.v>0; })
      .sort(function(x,y){ return y.v-x.v; })
      .slice(0,3);
  }
  var boardsHtml = '<div class="boards">'
    + leaderBoard('득점', top3('g'), '골')
    + leaderBoard('도움', top3('a'), '도움')
    + leaderBoard('출석', top3('att'), '회')
    + '</div>';

  return seg + '<div class="chips">'+chips+'</div>' + summary
    + '<div class="section"><div class="eyebrow">경기 기록</div>'+mlist+'</div>'
    + '<div class="section"><div class="eyebrow">선수 기록 · TOP 3</div>'+boardsHtml+'</div>'
    + '<p class="hint">경기를 탭하면 스코어와 선수별 득점·도움·출석을 입력할 수 있습니다.</p>';
}

      + '<span class="lb-name">'+r.name+'</span>'
      + '<span class="lb-val oswald">'+r.v+'<small>'+unit+'</small></span></div>';
  }).join('') : '<div class="lb-empty">기록 없음</div>';

  return '<div class="chips">'+chips+'</div>' + summary

/* -------- 4. 출석 관리 (GPS) -------- */
function latestMatch(){
  var ms = (state.matches||[]).slice().filter(function(m){return m && m.date;});
  if(!ms.length) return null;
  var today = new Date(); today.setHours(0,0,0,0);
  var upcoming = ms.filter(function(m){ return new Date(m.date) >= today; }).sort(function(a,b){ return a.date.localeCompare(b.date); });
  if(upcoming.length) return upcoming[0];               // 가장 가까운 예정 경기
  return ms.sort(function(a,b){ return b.date.localeCompare(a.date); })[0];  // 없으면 가장 최근 경기
}
function fmtMatchWhen(m){
  if(!m || !m.date) return '';
  var wd = dowOf(m.date);
  var t = cleanTime(m.time);
  return fmtDateDot(m.date)+(wd?' ('+wd+')':'')+(t?' '+t+' 시작':'');
}

  var card;
  if(!m){

function haversine_(lat1,lng1,lat2,lng2){
  var R=6371000, toR=function(d){return d*Math.PI/180;};
  var dLat=toR(lat2-lat1), dLng=toR(lng2-lng1);
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function doCheckin(matchId){
  var m = (state.matches||[]).filter(function(x){return x.id===matchId;})[0] || latestMatch();
  if(!m){ toast('경기 정보가 없습니다'); return; }
  var radius = state.cfg.checkinRadiusM || 100;
  var hasXY = (m.lat!=null && m.lat!=='' && m.lng!=null && m.lng!=='');
  if(!navigator.geolocation){ toast('이 기기에서 위치를 사용할 수 없습니다'); return; }
  toast('위치 확인 중...');
  navigator.geolocation.getCurrentPosition(function(pos){
    if(!hasXY){ state.checkedIn=true; render(); toast('체크인 완료 (경기장 좌표 없음 · 거리 미측정)'); return; }
    var dist = haversine_(pos.coords.latitude, pos.coords.longitude, Number(m.lat), Number(m.lng));
    if(dist<=radius){ state.checkedIn=true; render(); toast('출석 체크인 완료 · 경기장 '+Math.round(dist)+'m'); }
    else { toast('경기장에서 약 '+Math.round(dist)+'m 떨어져 있어요 (반경 '+radius+'m 밖)'); }
  }, function(err){
    toast('위치 권한이 필요합니다. 브라우저에서 위치 허용 후 다시 시도하세요.');
  }, {enableHighAccuracy:true, timeout:8000, maximumAge:0});
}

function handleImportFile_(file, type){
  loadXLSX_(function(ok){

      try{
        var wb=XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var rows=XLSX.utils.sheet_to_json(ws, {defval:''});

        if(type==='players') importPlayers_(rows);
        else importMatches_(rows);
      }catch(err){ toast('파일을 읽지 못했어요'); }
    };
    r.readAsArrayBuffer(file);
  });
}

function rowsToPlayers_(rows, cid){
  var out=[], t=Date.now();
  for(var i=0;i<rows.length;i++){
    var r=rows[i]; var name=s_(r['이름']); if(!name) continue;
    var pos=s_(r['포지션']).split(/[,\s/]+/).filter(function(x){return x;});
    var role=s_(r['역할']); if(role!=='임원') role='팀원';
    out.push({ id:'m'+t+'_'+i, clubId:cid, name:name, num:n_(r['등번호']),
      positions:pos, role:role, birth:s_(r['생년월일']), height:n_(r['키']),
      weight:n_(r['몸무게']), region:s_(r['지역']), size:s_(r['사이즈']) });
  }
  return out;

/* "이름:수, 이름" → [{name,count}] */
function parseStatCell_(cell){
  var out=[]; s_(cell).split(/[,\n]+/).forEach(function(part){
    part=part.trim(); if(!part) return;
    var m=part.split(':'); var nm=m[0].trim(); var c=m.length>1?(parseInt(m[1],10)||1):1;
    if(nm) out.push({name:nm, count:c});
  }); return out;
}
/* 행 → {matches, stats, unmatched} */
function rowsToMatches_(rows, cid, players){
  var byName={}; players.forEach(function(p){ byName[p.name]=p.id; });
  var matches=[], stats=[], unmatched={}, t=Date.now();
  for(var i=0;i<rows.length;i++){
    var r=rows[i]; var opp=s_(r['상대팀']); var date=s_(r['날짜']);
    if(!opp && !date) continue;
    var mid='g'+t+'_'+i;
    var os=n_(r['우리점수']), ps=n_(r['상대점수']);
    var mo={ id:mid, clubId:cid, date:date, time:s_(r['시간']), opponent:opp, venue:s_(r['장소']), venueUrl:'' };
    if(os!==null && ps!==null){ mo.ourScore=os; mo.oppScore=ps; mo.result=(os>ps?'W':(os<ps?'L':'D')); }
    matches.push(mo);
    var agg={};
    parseStatCell_(r['득점']).forEach(function(x){ var pid=byName[x.name]; if(!pid){unmatched[x.name]=1;return;} agg[pid]=agg[pid]||{g:0,a:0}; agg[pid].g+=x.count; });
    parseStatCell_(r['도움']).forEach(function(x){ var pid=byName[x.name]; if(!pid){unmatched[x.name]=1;return;} agg[pid]=agg[pid]||{g:0,a:0}; agg[pid].a+=x.count; });
    Object.keys(agg).forEach(function(pid){ stats.push({matchId:mid, playerId:pid, goals:agg[pid].g, assists:agg[pid].a}); });
  }
  return {matches:matches, stats:stats, unmatched:Object.keys(unmatched)};
}
/* Firestore 일괄 쓰기 + 메모리 반영 */
function bulkWrite_(key, arr){
  if(!arr.length) return Promise.resolve();
  DB[key]=(DB[key]||[]).concat(arr);
  if(!window.db || !FS.enabled) return Promise.resolve();
  var m=FS_MAP[key], b=db.batch();
  arr.forEach(function(x){ b.set(db.collection(m.coll).doc(String(m.id(x))), fsClean(x), {merge:true}); });
  return b.commit().catch(function(){});
}

  if(!confirm(players.length+'명의 팀원을 현재 팀에 등록할까요?')) return;

function importMatches_(rows){
  var cid=state.activeClubId;
  var players=(DB.players||[]).filter(function(p){return p.clubId===cid;});
  var res=rowsToMatches_(rows, cid, players);

  var msg=res.matches.length+'경기를 등록할까요?';

  if(!confirm(msg)) return;
  bulkWrite_('matches', res.matches).then(function(){
    return bulkWrite_('stats', res.stats);
  }).then(function(){
    toast('경기 '+res.matches.length+'건을 등록했어요');

}

function relTime(iso){
  if(!iso) return '';
  var d=new Date(iso); if(isNaN(d)) return '';
  var s=Math.floor((Date.now()-d.getTime())/1000);
  if(s<60) return '방금';
  if(s<3600) return Math.floor(s/60)+'분 전';
  if(s<86400) return Math.floor(s/3600)+'시간 전';
  if(s<2592000) return Math.floor(s/86400)+'일 전';
  return (d.getMonth()+1)+'/'+d.getDate();
}

        voteArea += '<button class="btn-ghost" style="margin-top:8px;" onclick="requestExtraJoin(\''+p.id+'\')">🙋 추가 참석 신청</button>';

  }
  // 추가 참석 신청 현황 (임원: 승인/거절)

    var rows=exs.map(function(x){
      var badge = x.status==='approved' ? '<span class="poll-flag" style="background:var(--ok);">승인</span>'

      var btns = (isAdmin() && x.status==='pending')
        ? '<button class="btn-mini" onclick="openApproveExtra(\''+x.id+'\',\''+esc(x.name).replace(/'/g,'')+'\',\''+p.id+'\')">승인</button>'
          + '<button class="btn-mini ghost" onclick="rejectExtraGo(\''+x.id+'\')">거절</button>'
        : '';
      return '<div class="tg-row" style="cursor:default;"><div style="flex:1;font-weight:700;font-size:14px;">'+esc(x.name)+'</div>'+badge+btns+'</div>';

      + '<button class="btn-ghost" style="margin-top:9px;" onclick="openApplyToMatch(\''+p.id+'\')">📋 경기별 참석자 인원 적용</button>'
    : '';

  var adminBtns = isAdmin() ? '<div style="display:flex;gap:9px;margin-top:14px;">'
    +     (p.status==='open'?'<button class="btn-ghost" style="flex:1;margin:0;" onclick="closePollConfirm(\''+p.id+'\')">투표 마감</button>':'')
    +     '<button class="btn-ghost btn-danger" style="flex:1;margin:0;" onclick="deletePollConfirm(\''+p.id+'\')">삭제</button>'
    +   '</div>' : '';

  var flags = (p.multi?'<span class="poll-flag">중복</span>':'')+(p.anon?'<span class="poll-flag">익명</span>':'');
  var html = '<div class="grabber"></div>'
   + '<div class="sheet-head"><h3>'+esc(p.title)+'</h3><button class="x" onclick="closeSheet()">✕</button></div>'
   + '<div class="sheet-body">'
   +   '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;"><span class="poll-badge '+st.c+'">'+st.t+'</span>'+flags
   +     (p.endAt?'<span class="poll-dl">~'+fmtDeadline(p.endAt)+' 마감</span>':'')
   +     '<span style="margin-left:auto;font-size:12px;color:var(--steel);">'+d.totalVotes+'/'+d.totalMembers+'명 참여</span></div>'
   +   '<div class="field"><label>결과'+(p.anon?' <span style="color:var(--steel-soft);font-weight:600;">(익명)</span>':'')+'</label>'+bars+'</div>'
   +   '<div class="field"><label>미투표자 · '+d.nonVoters.length+'명</label>'+nonV+'</div>'
   +   voteArea + extraSec + assignBtn + adminBtns
   + '</div>';
  showSheet(html);
}
function pickVoteOpt(btn, multi){
  var opt = btn.getAttribute('data-opt');
  if(multi){
    var i=state.voteChoices.indexOf(opt);
    if(i>=0) state.voteChoices.splice(i,1); else state.voteChoices.push(opt);
    btn.classList.toggle('on');
  } else {
    state.voteChoices=[opt];
    Array.prototype.forEach.call(document.querySelectorAll('.vote-opt'), function(b){ b.classList.toggle('on', b===btn); });
  }
}
/* ---- 투표 인원 경기 편성 (요청 1) ---- */
var assignPollId=null, assignOpt=null, applyTargetSquad=null;

function expandApplyPolls(){

  sel.innerHTML='<option value="">투표 선택</option>'+(state.polls||[]).map(function(p){ return '<option value="'+p.id+'"'+(p.id===cur?' selected':'')+'>'+esc(p.title)+'</option>'; }).join('');

function fillApplyOpts(){
  var pid=(document.getElementById('ap_poll')||{}).value; assignPollId=pid; assignOpt=null;

  box.innerHTML=(p.options||[]).map(function(o){ return '<div class="chip" data-as-opt="'+esc(o).replace(/"/g,'')+'" onclick="pickAssignOpt(this)">'+esc(o)+'</div>'; }).join('');

function pickAssignOpt(el){
  assignOpt = el.getAttribute('data-as-opt');
  Array.prototype.forEach.call(document.querySelectorAll('#ap_opts .chip, #sheet .chip'), function(c){ c.classList.toggle('on', c===el); });

function runApplyVoters(){
  if(!assignPollId){ toast('투표를 선택하세요'); return; }
  if(!assignOpt){ toast('참석 항목을 선택하세요'); return; }

    closeSheet(); render(); toast((r&&r.count||0)+'명을 스쿼드에 적용했습니다');
  }).catch(function(){ toast('적용 실패'); });
}
/* 투표 상세에서: 투표 고정 → 스쿼드+항목 선택 */
function openApplyToMatch(pollId){
  if(!requireAdmin()) return;
  assignPollId=pollId; assignOpt=null;
  var p=(state.polls||[]).filter(function(x){return x.id===pollId;})[0];
  var doIt=function(){
    var today=new Date().toISOString().slice(0,10);
    var ms=(state.matches||[]).slice().sort(function(a,b){return a.date.localeCompare(b.date);});
    var up=ms.filter(function(m){return m.date>=today;});
    var mlist=(up.length?up:ms).slice(0,12);
    if(!mlist.length){ toast('등록된 경기가 없습니다'); return; }
    var mopts=mlist.map(function(m){ return '<option value="'+m.id+'">'+fmtDateDot(m.date)+' vs '+esc(m.opponent||'상대 미정')+'</option>'; }).join('');
    var oopts=((p&&p.options)||[]).map(function(o){ return '<div class="chip" data-as-opt="'+esc(o).replace(/"/g,'')+'" onclick="pickAssignOpt(this)">'+esc(o)+'</div>'; }).join('');
    var html='<div class="grabber"></div>'
     + '<div class="sheet-head"><h3>경기별 참석자 인원 적용</h3><button class="x" onclick="closeSheet()">✕</button></div>'
     + '<div class="sheet-body">'
     +   '<p style="font-size:13px;color:var(--steel);margin:0 0 12px;line-height:1.55;">선택한 항목 투표자를 <b>그 경기의 참석 명단</b>으로 지정합니다.<br>지정하면 출석 탭에서 이 인원만 <b>출석·지각·불참</b>을 기록합니다.</p>'
     +   '<div class="field"><label>경기<span class="req">*</span></label><select id="am_match">'+mopts+'</select></div>'
     +   '<div class="field"><label>참석으로 볼 항목<span class="req">*</span></label><div id="ap_opts" class="chips">'+oopts+'</div></div>'
     +   '<button class="btn-primary" onclick="runApplyToMatch()">참석 명단 지정</button>'
     + '</div>';
    showSheet(html);
  };
  if(p && p.options){ doIt(); }
  else { API.run('getPolls').then(function(pl){ state.polls=pl||[]; p=(pl||[]).filter(function(x){return x.id===pollId;})[0]; doIt(); }); }
}
function runApplyToMatch(){
  if(!assignOpt){ toast('참석 항목을 선택하세요'); return; }
  var mid=(document.getElementById('am_match')||{}).value;
  if(!mid){ toast('경기를 선택하세요'); return; }
  API.run('applyVotersToMatch', assignPollId, assignOpt, mid).then(function(r){
    state.attLoaded=false;  // 출석 탭 갱신 유도
    closeSheet(); toast((r&&r.count||0)+'명을 경기 참석 명단으로 지정했습니다');
  }).catch(function(){ toast('적용 실패'); });
}

     +   '<div class="field"><label>적용할 스쿼드<span class="req">*</span></label><select id="ap_squad">'+sopts+'</select></div>'
     +   '<div class="field"><label>참석으로 볼 항목<span class="req">*</span></label><div id="ap_opts" class="chips">'+oopts+'</div></div>'

function runApplyToSquad(){

function copyVenueLink(url){
  if(!url){ toast('링크가 없습니다'); return; }

    navigator.clipboard.writeText(url).then(function(){ toast('링크가 복사되었습니다'); }).catch(function(){ fallbackCopy_(url); });
  } else { fallbackCopy_(url); }
}
function fallbackCopy_(text){
  var ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta);
  ta.select(); try{ document.execCommand('copy'); toast('링크가 복사되었습니다'); }catch(e){ toast('복사 실패'); }

}

function pickEmblem(input){
  var file = input.files && input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var c=document.createElement('canvas'); var sz=96; c.width=sz; c.height=sz;
      var ctx=c.getContext('2d');
      var r=Math.min(sz/img.width, sz/img.height);
      var w=img.width*r, h=img.height*r;
      ctx.drawImage(img,(sz-w)/2,(sz-h)/2,w,h);
      clubEmblemData = c.toDataURL('image/png');
      var pv=document.getElementById('cb_prev'); if(pv){ pv.innerHTML='<img src="'+clubEmblemData+'" style="width:100%;height:100%;object-fit:contain;border-radius:12px;">'; pv.classList.remove('club-emblem-empty'); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* 카카오맵 JavaScript 키 (클라이언트 공개용 · 도메인 화이트리스트로 보호) */
var KAKAO_JS_KEY = '2d591b6ef9c70f94f369b7c55c91baa3';
/* 카카오 로그인 백엔드 base URL (OAuth 토큰 교환 서버 · 배포 후 입력, 예: https://xxx.vercel.app) */
var KAKAO_BACKEND = 'https://kick-town.vercel.app';
var venueMap=null, venueMarker=null, venuePick=null, leafletTried=false, kakaoTried=false;
var kakaoMap=null, kakaoMarker=null, mapProvider=null;

function ensureKakao(cb){
  var done=false, fin=function(ok){ if(done) return; done=true; cb(ok); };
  if(!KAKAO_JS_KEY){ fin(false); return; }
  if(window.kakao && window.kakao.maps && window.kakao.maps.Map){ fin(true); return; }
  var start=function(){ try{ kakao.maps.load(function(){ fin(!!(window.kakao&&kakao.maps&&kakao.maps.Map)); }); }catch(e){ fin(false); } };
  if(window.kakao && window.kakao.maps){ start(); return; }
  if(kakaoTried){ setTimeout(function(){ fin(!!(window.kakao&&window.kakao.maps&&window.kakao.maps.Map)); }, 3000); return; }
  kakaoTried=true;
  var s=document.createElement('script');
  s.src='https://dapi.kakao.com/v2/maps/sdk.js?appkey='+KAKAO_JS_KEY+'&libraries=services&autoload=false';
  s.onload=function(){ start(); };
  s.onerror=function(){ fin(false); };
  document.head.appendChild(s);
  setTimeout(function(){ fin(!!(window.kakao&&window.kakao.maps&&window.kakao.maps.Map)); }, 5000);
}
function ensureLeaflet(cb){
  var done=false; var fin=function(ok){ if(done) return; done=true; cb(ok); };
  if(typeof L !== 'undefined'){ fin(true); return; }
  var waited=0;
  var poll=setInterval(function(){
    if(typeof L !== 'undefined'){ clearInterval(poll); fin(true); return; }
    waited+=150;
    if(waited>=1500){ clearInterval(poll); tryFallbackCdn(); }
  }, 150);
  function tryFallbackCdn(){
    if(leafletTried){ setTimeout(function(){ fin(typeof L!=='undefined'); }, 2500); return; }
    leafletTried=true;
    var css=document.createElement('link'); css.rel='stylesheet';
    css.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css'; document.head.appendChild(css);
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
    s.onload=function(){ fin(typeof L!=='undefined'); };
    s.onerror=function(){ fin(false); };
    document.head.appendChild(s);
    setTimeout(function(){ fin(typeof L!=='undefined'); }, 5000);
  }
}
function initVenueMap(){
  var el = document.getElementById('g_map');
  if(!el) return;
  mapProvider=null; kakaoMap=null; kakaoMarker=null;
  el.innerHTML = '<div class="map-fallback">지도 불러오는 중...</div>';
  ensureKakao(function(okK){
    var box = document.getElementById('g_map'); if(!box) return;
    if(okK){ box.innerHTML=''; buildKakaoMap(box); return; }
    // 카카오 실패 → OSM 폴백
    ensureLeaflet(function(okL){
      var b2 = document.getElementById('g_map'); if(!b2) return;
      if(okL){ b2.innerHTML=''; buildVenueMap(b2); }
      else {
        b2.innerHTML = '<div class="map-fallback">지도를 불러오지 못했습니다.<br>아래 “지도 링크 직접 입력”을 이용하세요.<br><span style="font-size:10px;color:#9aa;opacity:.8;">현재 도메인: '+esc(location.hostname)+'</span></div>';
      }
    });

/* ---- 카카오맵 ---- */
function buildKakaoMap(el){
  mapProvider='kakao';
  var start = venuePick || {lat:37.5665, lng:126.9780};
  kakaoMap = new kakao.maps.Map(el, {center:new kakao.maps.LatLng(start.lat, start.lng), level: venuePick?3:7});
  kakaoMarker = new kakao.maps.Marker({position:new kakao.maps.LatLng(start.lat, start.lng), draggable:true});
  if(venuePick) kakaoMarker.setMap(kakaoMap);
  kakao.maps.event.addListener(kakaoMap, 'click', function(e){ var ll=e.latLng; setKakaoMarker(ll.getLat(), ll.getLng(), true); });
  kakao.maps.event.addListener(kakaoMarker, 'dragend', function(){ var p=kakaoMarker.getPosition(); venuePick={lat:p.getLat(), lng:p.getLng()}; setVenueStatus(); reverseGeocode_(p.getLat(), p.getLng()); });
  [120,350,650].forEach(function(ms){ setTimeout(function(){ if(kakaoMap) kakaoMap.relayout(); }, ms); });
}
function setKakaoMarker(lat, lng, fillName){
  venuePick={lat:lat, lng:lng};
  var pos=new kakao.maps.LatLng(lat, lng);
  kakaoMarker.setPosition(pos); kakaoMarker.setMap(kakaoMap);
  setVenueStatus(); if(fillName) reverseGeocode_(lat, lng);
}
function reverseGeocode_(lat, lng){
  if(mapProvider!=='kakao' || !window.kakao || !kakao.maps.services) return;
  try{
    new kakao.maps.services.Geocoder().coord2Address(lng, lat, function(res, status){
      if(status===kakao.maps.services.Status.OK && res[0]){
        var nm=(res[0].road_address && res[0].road_address.building_name) || '';
        var v=document.getElementById('g_venue'); if(v && !v.value.trim() && nm) v.value=nm;
      }
    });
  }catch(e){}
}
function kakaoSearch_(q, box){
  try{
    new kakao.maps.services.Places().keywordSearch(q, function(data, status){
      if(!box) return;
      if(status!==kakao.maps.services.Status.OK || !data.length){ box.innerHTML='<div class="map-loading">검색 결과가 없습니다.</div>'; return; }
      window._venueHits={};
      box.innerHTML = data.slice(0,8).map(function(it,i){
        window._venueHits[i]={lat:Number(it.y), lng:Number(it.x), name:it.place_name};
        return '<div class="map-result" onclick="pickResultIdx('+i+')"><div class="mr-name">'+esc(it.place_name)+'</div><div class="mr-full">'+esc(it.road_address_name||it.address_name||'')+'</div></div>';
      }).join('');
    });
  }catch(e){ if(box) box.innerHTML='<div class="map-loading">검색에 실패했습니다.</div>'; }
}

/* ---- OSM (폴백) ---- */
function buildVenueMap(el){
  mapProvider='osm';
  if(venueMap){ try{ venueMap.remove(); }catch(e){} venueMap=null; venueMarker=null; }
  var start = venuePick || {lat:37.5665, lng:126.9780};
  venueMap = L.map(el, {zoomControl:true, attributionControl:false}).setView([start.lat, start.lng], venuePick?15:11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, crossOrigin:true}).addTo(venueMap);
  if(venuePick) placeMarker(venuePick.lat, venuePick.lng);
  venueMap.on('click', function(e){ placeMarker(e.latlng.lat, e.latlng.lng); setVenueStatus(); });
  [80,300,600].forEach(function(ms){ setTimeout(function(){ if(venueMap) venueMap.invalidateSize(); }, ms); });
}
function placeMarker(lat, lng){
  venuePick = {lat:lat, lng:lng};
  if(!venueMap) return;
  if(venueMarker){ venueMarker.setLatLng([lat,lng]); }
  else {
    venueMarker = L.marker([lat,lng], {draggable:true}).addTo(venueMap);
    venueMarker.on('dragend', function(){ var p=venueMarker.getLatLng(); venuePick={lat:p.lat,lng:p.lng}; setVenueStatus(); });
  }
}
function osmSearch_(q, box){
  var url = 'https://nominatim.openstreetmap.org/search?format=json&limit=6&accept-language=ko&countrycodes=kr&q='+encodeURIComponent(q);
  fetch(url, {headers:{'Accept':'application/json'}}).then(function(r){return r.json();}).then(function(list){
    if(!box) return;
    if(!list || !list.length){ box.innerHTML = '<div class="map-loading">검색 결과가 없습니다.</div>'; return; }
    window._venueHits={};
    box.innerHTML = list.map(function(it,i){

function saveMatch(id){
  var date = document.getElementById('g_date').value;
  var opp = document.getElementById('g_opp').value.trim();
  if(!date || !opp){ toast('날짜와 상대팀은 필수입니다'); return; }
  var prev = id ? (state.matches.filter(function(x){return x.id===id;})[0]||{}) : {};
  var lat = venuePick ? venuePick.lat : (prev.lat!=null?prev.lat:'');
  var lng = venuePick ? venuePick.lng : (prev.lng!=null?prev.lng:'');
  var url = venuePick ? ('https://www.google.com/maps?q='+venuePick.lat+','+venuePick.lng) : (prev.venueUrl||'');
  var data = {
    date: date,
    time: document.getElementById('g_time').value,
    opponent: opp,
    venue: document.getElementById('g_venue').value.trim(),
    lat: lat, lng: lng,
    venueUrl: url,
    useAtt: !!(document.getElementById('g_useAtt')||{checked:true}).checked
  };
  var fn = id ? 'updateMatch' : 'addMatch';
  if(id) data.id = id;
  closeSheet();
  toast(id?'경기를 수정했습니다':'경기를 등록했습니다');
  API.run(fn, data).then(function(list){
    state.matches = list;
    if(!id && list.length){
      var newest = list.filter(function(x){return x.date===date && x.opponent===opp;})[0] || list[0];
      state.squadMatchId = newest.id; state.currentSquadId = null;
    }
    return loadMatchSquads(state.squadMatchId);
  }).catch(function(){ toast('저장 실패 · 새로고침'); });
}
function deleteMatchConfirm(id){
  // 낙관적: 목록에서 즉시 제거
  state.matches = state.matches.filter(function(m){return m.id!==id;});
  if(state.squadMatchId===id){ state.squadMatchId = state.matches.length ? state.matches[0].id : null; state.currentSquadId=null; }
  closeSheet(); toast('경기를 삭제했습니다');
  if(state.squadMatchId){ loadMatchSquads(state.squadMatchId); } else { state.matchSquads=[]; state.currentMatch=null; state.squadDetail=null; render(); }
  API.run('deleteMatch', id).then(function(list){ state.matches = list; }).catch(function(){ toast('삭제 저장 실패 · 새로고침'); });
}

  Array.prototype.forEach.call(row.querySelectorAll('.att-opt'), function(b){

function saveResult(matchId){
  var our = parseInt(document.getElementById('r_our').value)||0;
  var opp = parseInt(document.getElementById('r_opp').value)||0;
  var stats = [];
  var att = [];
  state.players.forEach(function(p){
    var g = parseInt(document.getElementById('st_g_'+p.id).value)||0;
    var a = parseInt(document.getElementById('st_a_'+p.id).value)||0;
    if(g>0||a>0) stats.push({playerId:p.id, goals:g, assists:a});
    att.push({playerId:p.id, status:(state.formAtt[p.id]||'present')});
  });
  var btn=document.querySelector('.btn-primary'); if(btn){btn.textContent='저장 중...';btn.disabled=true;}
  API.run('recordMatchResult', matchId, our, opp).then(function(b){
    state.recMatches=b.matches; state.recStats=b.stats; state.recAtt=b.attendance||state.recAtt;
    return API.run('setMatchStats', matchId, stats);
  }).then(function(b2){
    state.recMatches=b2.matches; state.recStats=b2.stats; state.recAtt=b2.attendance||state.recAtt;
    return API.run('setMatchAttendance', matchId, att);
  }).then(function(b3){
    state.recMatches=b3.matches; state.recStats=b3.stats; state.recAtt=b3.attendance||[];
    closeSheet(); render(); toast('경기 결과를 저장했습니다');
  }).catch(function(){ if(btn){btn.textContent='다시 시도';btn.disabled=false;} toast('저장에 실패했습니다'); });
}

function handleKakaoReturn_(){
  var h = location.hash || '';
  var m = h.match(/[#&]ks=([^&]+)/);
  if(!m) return false;
  var ks = decodeURIComponent(m[1]);
  try{ history.replaceState(null, '', location.pathname + location.search); }catch(e){ location.hash=''; }
  var base = kakaoBackendBase_();
  toast('카카오 로그인 확인 중...');
  fetch(base + '/api/kakao/session', {
    method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ks:ks})
  }).then(function(r){ return r.json(); }).then(function(res){
    try{ console.log('kakao session 응답:', res); }catch(e){}
    if(!res || !res.ok){ toast('카카오 인증 실패: '+((res&&res.error)||'세션 확인 불가')); applyAppHeader(); showLogin(); hideSplash_(); return; }
    if(!res.kakaoId){ toast('카카오 프로필(kakaoId)을 받지 못했어요'); applyAppHeader(); showLogin(); hideSplash_(); return; }
    return API.run('ownerKakao', String(res.kakaoId), res.name||'카카오사용자').then(function(r){
      try{ console.log('ownerKakao 결과:', r); }catch(e){}
      if(r && r.ok){ toast(r.name+'님 환영합니다'); finishAuth_(r); hideSplash_(); }
      else { toast('로그인 처리 실패: '+((r&&r.error)||'알 수 없음')); applyAppHeader(); showLogin(); hideSplash_(); }
    });
  }).catch(function(e){ try{ console.error('kakao return 오류:', e); }catch(_){} toast('카카오 로그인 오류: '+((e&&e.message)||'네트워크')); applyAppHeader(); showLogin(); hideSplash_(); });
  return true;
}

/* ================= Firestore 데이터 계층 =================
 * 설계: 앱 시작 시 Firestore → 메모리(DB) 1회 로드.
 *   읽기 = 메모리에서 즉시(기존 mockHandler 재사용) → 매우 빠름
 *   쓰기 = 메모리 반영 + Firestore에 백그라운드 미러링(변경분만)
 *   비밀번호 = SHA-256 해시로 Firestore에 저장(평문 저장 안 함)
 */
var FS = { enabled:false, loadFailed:false };
